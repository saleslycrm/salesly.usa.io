<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Salesly">
<meta name="theme-color" content="#0f3d36">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Salesly v59</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@10..48,400;10..48,600;10..48,700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --paper:#f4f1ea; --surface:#ffffff; --surface-2:#faf8f3;
  --ink:#16211d; --ink-soft:#4b5a53; --ink-faint:#8a978f;
  --line:#e2ddd1; --line-strong:#cfc8b8;
  --teal:#23bfcd; --teal-deep:#0e6a73; --teal-wash:#dff5f7;
  --amber:#bf6b16; --amber-wash:#fbeede;
  --green:#2f7d3f; --green-wash:#e6f1e4;
  --danger:#b3402f; --danger-wash:#f7e6e2;
  --shadow:0 1px 2px rgba(22,33,29,.06),0 8px 24px rgba(22,33,29,.08);
  --shadow-lg:0 12px 48px rgba(22,33,29,.22);
  --sans:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --display:'Bricolage Grotesque',Georgia,serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --safe-top:env(safe-area-inset-top,0px);
  /* In a mobile-Chrome TAB, safe-area insets report 0, so bottom controls would
     collapse onto the screen edge — right under Chrome's bottom toolbar. Enforce a
     minimum floor so the Route/radius/Add-Office controls always clear it. In
     standalone (home-screen icon) the real inset is larger and wins via max(). */
  --safe-bottom:max(env(safe-area-inset-bottom,0px), 24px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;height:100dvh;}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;overscroll-behavior-y:none;line-height:1.45;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;font-size:16px;}
::-webkit-scrollbar{width:0;height:0;}
#app{display:flex;flex-direction:column;height:100%;height:100dvh;max-width:560px;margin:0 auto;background:var(--paper);position:relative;}

header{padding:calc(var(--safe-top) + 10px) 16px 8px;background:var(--teal-deep);color:#fff;position:sticky;top:0;z-index:20;}
header .ht{display:flex;flex-direction:column;gap:7px;}
.hdr-toggle{background:rgba(255,255,255,.14);color:#fff;border:none;border-radius:9px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;cursor:pointer;transition:transform .2s;}
.hdr-toggle svg{transition:transform .2s;}
/* Collapsed: hide everything in the top block except the title + toggle, and the
   filter bar stays. Reclaims most of the top space so the map dominates. */
body.hdr-collapsed header .sub,
body.hdr-collapsed header #btnSync,
body.hdr-collapsed header #meBadge,
body.hdr-collapsed header .hbtns,
body.hdr-collapsed header .searchbar,
body.hdr-collapsed #statbar,
body.hdr-collapsed #filterbar{display:none !important;}
body.hdr-collapsed header{padding-bottom:6px;}
body.hdr-collapsed .hdr-toggle svg{transform:rotate(180deg);}
header .ht>div:first-child{min-width:0;}
.hbtns{display:flex;gap:6px;flex:0 0 auto;flex-wrap:nowrap;justify-content:flex-start;}
.hbtn{white-space:nowrap;flex:1 1 0;justify-content:center;}
@media (max-width:360px){
  .hbtns{gap:4px;}
  .hbtn{padding:8px 8px;font-size:11px;gap:4px;}
  header h1{font-size:18px;}
  .iconrow{gap:5px;}
  .ficon,.morebtn{padding:7px 10px;font-size:12px;gap:5px;}
}
@media (max-width:400px){
  .route-btn{padding:9px 11px;font-size:12px;gap:5px;}
  .nearby-toggle{padding:9px 11px;font-size:12px;gap:5px;}
  .locate-btn{width:42px;height:42px;}
  .rad-btn{width:30px;height:36px;font-size:18px;}
  .rad-label{min-width:46px;font-size:11px;}
}
/* SHORT screens (older iPhone SE / 8 / mini are ~667-750px tall). The top region
   was eating too much height. Compact everything above the map so the map keeps
   most of the screen. Targets height, which the width queries above didn't. */
@media (max-height:850px){
  header{padding:calc(var(--safe-top) + 8px) 14px 7px;}
  header .ht{gap:6px;}
  header h1{font-size:16px;}
  header .sub{font-size:10px;margin-top:1px;}
  .synclink{font-size:9.5px;padding:2px 7px;margin-top:3px;}
  .hbtn{padding:6px 9px;font-size:11px;}
  .hbtn svg{width:13px;height:13px;}
  .searchbar{margin-top:7px;}
  .searchbar input{padding:9px 12px 9px 36px;font-size:15px;}
  .statbar .stat{padding:6px 4px;}
  .stat .sv{font-size:15px;}
  .stat .sl{font-size:9px;}
  .filterbar{padding:7px 14px;}
}
/* Very short screens get an even tighter pass. */
@media (max-height:670px){
  header{padding:calc(var(--safe-top) + 6px) 14px 6px;}
  header h1{font-size:15px;}
  .hbtn{padding:5px 8px;font-size:10.5px;}
  .stat .sv{font-size:14px;}
  .filterbar{padding:6px 12px;}
}
header h1{font-family:var(--display);font-weight:700;font-size:20px;margin:0;letter-spacing:-.01em;}
header .sub{font-size:11px;color:#9fc7be;font-family:var(--mono);margin-top:2px;}
.synclink{display:inline-flex;align-items:center;gap:5px;margin-top:5px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#cfe7e1;font-size:10.5px;font-family:var(--mono);padding:3px 8px;border-radius:20px;cursor:pointer;}
.synclink:active{background:rgba(255,255,255,.16);}
.syncdot{width:7px;height:7px;border-radius:50%;background:#8a978f;display:inline-block;}
.syncdot.on{background:#37d39b;box-shadow:0 0 0 2px rgba(55,211,155,.3);}
.hbtns{display:flex;gap:6px;}
.hbtn{background:rgba(255,255,255,.12);color:#fff;border-radius:10px;padding:8px 11px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;}
.hbtn:active{background:rgba(255,255,255,.25);}
.hbtn.sv{background:var(--amber);}
.searchbar{margin-top:10px;position:relative;}
.searchbar input{width:100%;background:rgba(255,255,255,.95);border:none;border-radius:12px;padding:11px 12px 11px 38px;font-size:15px;color:var(--ink);}
.searchbar svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.5;}

.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
.tab{flex:1;padding:11px 6px;font-size:12px;font-weight:600;color:var(--ink-faint);text-align:center;border-bottom:2px solid transparent;}
.tab.on{color:var(--teal);border-bottom-color:var(--teal);}

main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bottom) + 90px);}

.cityrow{border-bottom:1px solid var(--line);background:var(--surface);}
.cityhdr{display:flex;align-items:center;gap:10px;padding:14px 16px;width:100%;text-align:left;}
.cityhdr:active{background:var(--surface-2);}
.cityname{font-family:var(--display);font-weight:600;font-size:16px;flex:1;}
.citycount{font-family:var(--mono);font-size:12px;color:var(--ink-faint);background:var(--surface-2);padding:2px 9px;border-radius:20px;}
.chev{transition:transform .2s;opacity:.5;}
.cityrow.open .chev{transform:rotate(90deg);}
.officelist{display:none;background:var(--surface-2);}
.cityrow.open .officelist{display:block;}

.office{padding:13px 16px 13px 22px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;}
.pracgrp{border-top:1px solid var(--line);}
.prachdr{display:flex;align-items:center;gap:9px;padding:12px 16px 12px 22px;width:100%;text-align:left;background:none;border:none;cursor:pointer;}
.prachdr:active{background:var(--surface-2);}
.prachdr .chev2{flex:none;transition:transform .18s;color:var(--ink-soft);}
.pracgrp.open .prachdr .chev2{transform:rotate(90deg);}
.prachdr .pracnm{font-weight:600;font-size:14px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prachdr .praccnt{font-size:12px;font-weight:700;color:#fff;background:var(--brand,#0f766e);border-radius:999px;padding:1px 9px;}
.pracsub{display:none;}
.pracgrp.open .pracsub{display:block;}
.pracsub .office{padding-left:40px;background:var(--surface-2);}
.office:active{background:#f0ece2;}
.office .onm{flex:1;min-width:0;}
.office .otitle{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.office .oaddr{font-size:12px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.badges{display:flex;gap:4px;flex-shrink:0;}
.dot{width:8px;height:8px;border-radius:50%;}
.dot.visited{background:var(--green);}
.dot.scanner{background:var(--teal);}
.dot.note{background:var(--amber);}
.pill{font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:6px;font-weight:500;}
.pill.sc{background:var(--teal-wash);color:var(--teal-deep);}

.empty{text-align:center;padding:60px 30px;color:var(--ink-faint);}
.empty h3{font-family:var(--display);color:var(--ink-soft);margin:0 0 6px;}

.fab{position:fixed;bottom:calc(var(--safe-bottom) + 10px);left:50%;transform:translateX(-50%);max-width:560px;width:calc(100% - 32px);display:flex;gap:10px;z-index:650;pointer-events:none;}
body.cal-view .fab{display:none;}
.fab>*{pointer-events:auto;}
.fab-add{flex:1;background:var(--teal);color:#fff;border-radius:14px;padding:15px;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shadow-lg);}
.fab-add:active{background:var(--teal-deep);}
.fab-exp{background:var(--teal-deep);color:#fff;border-radius:14px;padding:15px 17px;font-weight:600;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:7px;}

.sheet-bg{position:fixed;inset:0;background:rgba(15,33,30,.45);z-index:4000;opacity:0;pointer-events:none;transition:opacity .25s;}
.sheet-bg.show{opacity:1;pointer-events:auto;}
.sheet{position:fixed;left:0;right:0;bottom:0;max-width:560px;margin:0 auto;background:var(--paper);border-radius:20px 20px 0 0;z-index:4001;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:calc(100dvh - var(--safe-top) - 12px);display:flex;flex-direction:column;box-shadow:var(--shadow-lg);overflow:hidden;}
.sheet.show{transform:translateY(0);}
.sheet-grip{width:38px;height:5px;background:var(--line-strong);border-radius:3px;margin:10px auto 4px;flex:0 0 auto;}
.sheet-hd{display:flex;align-items:center;gap:10px;padding:8px 16px 14px;border-bottom:1px solid var(--line);flex:0 0 auto;}
.sheet-hd h2{font-family:var(--display);font-size:19px;margin:0;flex:1;font-weight:700;}
.sheet-x{font-size:22px;color:var(--ink-faint);padding:2px 6px;line-height:1;}
.sheet-body{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 16px;padding-bottom:calc(var(--safe-bottom) + 28px);}

.fld{margin-bottom:20px;}
.fld label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-bottom:8px;}
.fld input,.fld textarea,.fld select{width:100%;background:var(--surface);border:1px solid var(--line-strong);border-radius:11px;padding:13px 12px;color:var(--ink);}
.fld textarea{min-height:80px;resize:vertical;line-height:1.5;}
.fld input:focus,.fld textarea:focus,.fld select:focus{outline:none;border-color:var(--teal);}
.dictate-hint{display:none;font-size:11.5px;color:var(--ink-soft);line-height:1.45;margin-top:6px;}
@media (hover:none) and (pointer:coarse){ .dictate-hint{display:block;} }
.pinbox{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.visitbox{display:flex;flex-direction:column;gap:9px;}
.visitadd{display:flex;gap:8px;align-items:center;}
.visitadd input[type=date]{flex:1;font-family:var(--mono);font-size:13px;padding:9px 10px;border:1.5px solid var(--line-strong);border-radius:9px;background:var(--surface);color:var(--ink);}
.visitbtn{flex:0 0 auto;width:auto;background:var(--teal-wash);border:1.5px solid var(--teal);color:var(--teal-deep);padding:9px 12px;}
.visitlist{display:flex;flex-direction:column;gap:6px;}
.visititem{display:flex;justify-content:space-between;align-items:center;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-size:14px;}
.visitdel{font-size:12px;color:var(--danger);background:none;border:none;cursor:pointer;padding:4px;}
.visitempty{font-size:13px;color:var(--ink-faint);font-style:italic;}
.activefld{margin-bottom:18px;}
.activetoggle{display:inline-flex;align-items:center;gap:10px;cursor:pointer;background:none;border:none;padding:0;width:auto;}
.activetoggle .activeknob{position:relative;width:46px;height:27px;border-radius:14px;background:var(--line-strong);transition:background .2s;flex:0 0 auto;}
.activetoggle .activeknob::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.activetoggle.on .activeknob{background:var(--green);}
.activetoggle.on .activeknob::after{transform:translateX(19px);}
.activetoggle .activelabel{font-size:15px;font-weight:600;color:var(--ink);}
.vcolorrow{display:flex;gap:7px;}
.vcolorbtn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:600;padding:9px 6px;border:1.5px solid var(--line-strong);border-radius:9px;background:var(--surface);color:var(--ink);cursor:pointer;}
.vcolorbtn.on{border-color:var(--ink);background:var(--surface-2);box-shadow:inset 0 0 0 1px var(--ink);}
.vnote{width:100%;font-size:13px;padding:9px 10px;border:1.5px solid var(--line-strong);border-radius:9px;background:var(--surface);color:var(--ink);}
.vdot{display:inline-block;width:11px;height:11px;border-radius:50%;flex:0 0 auto;vertical-align:middle;margin-right:6px;border:1px solid rgba(0,0,0,.1);}
.vleft{display:inline-flex;align-items:center;gap:2px;flex-wrap:wrap;}
.vnotetag{font-size:12px;color:var(--ink-soft);background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:1px 7px;margin-left:7px;}
.pinbtn{display:inline-flex;align-items:center;gap:7px;width:auto;flex:0 0 auto;background:var(--teal-wash);border:1.5px solid var(--teal);color:var(--teal-deep);padding:11px 14px;}
.pinbtn:active{background:#cfe7e1;}
.pinbtn:disabled{opacity:.6;}
.pinstatus{font-family:var(--mono);font-size:12px;color:var(--ink-soft);flex:1 1 auto;min-width:120px;}
.row2{display:flex;gap:10px;}
.row2>*{flex:1;}

.scanopts{display:flex;flex-wrap:wrap;gap:7px;}
.scanopt{padding:9px 13px;border-radius:10px;background:var(--surface);border:1.5px solid var(--line-strong);font-size:13px;font-weight:600;color:var(--ink-soft);}
.scanopt.on{background:var(--teal);border-color:var(--teal);color:#fff;}

.detail-map{width:100%;height:170px;border:none;border-radius:14px;background:var(--surface-2);margin-bottom:14px;}
.maplinks{display:flex;gap:8px;margin-bottom:16px;}
.maplink{flex:1;text-align:center;background:var(--teal-wash);color:var(--teal-deep);padding:11px;border-radius:11px;font-weight:600;font-size:13px;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;}
.maplink:active{background:#cfe6e0;}

.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.dcard{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 12px;}
.dcard .dl{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-faint);font-weight:700;}
.dcard .dv{font-size:14px;font-weight:600;margin-top:3px;word-break:break-word;}
.dcard.full{grid-column:1/-1;}
.dcard a.dv{color:var(--teal);text-decoration:none;}
.notebox{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:16px;white-space:pre-wrap;font-size:14px;line-height:1.55;color:var(--ink-soft);min-height:40px;}

.actions{display:flex;gap:9px;margin-top:4px;}
.btn{flex:1;border-radius:12px;padding:13px;font-weight:700;font-size:14px;text-align:center;display:flex;align-items:center;justify-content:center;gap:7px;}
.btn-primary{background:var(--teal);color:#fff;}
.btn-primary:active{background:var(--teal-deep);}
.btn-ghost{background:var(--surface);border:1.5px solid var(--line-strong);color:var(--ink-soft);}
.btn-danger{background:var(--danger-wash);color:var(--danger);}
.btn-danger:active{background:#f0d6cf;}

.toast{position:fixed;bottom:calc(var(--safe-bottom) + 96px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:80;opacity:0;transition:all .3s;pointer-events:none;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast .undo{color:var(--amber);font-weight:700;text-decoration:underline;pointer-events:auto;}

.statbar{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--line);}
.onbox{display:flex;flex-direction:column;gap:10px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
.onrow{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--ink);cursor:pointer;}
.onrow input[type=checkbox]{width:20px;height:20px;accent-color:var(--teal-deep);flex:0 0 auto;}
.onrow-pl{justify-content:space-between;gap:12px;}
.pl-select{flex:1;max-width:220px;padding:8px 10px;border:1px solid var(--line-strong);border-radius:9px;background:var(--surface);font-family:var(--sans);font-size:14px;color:var(--ink);}
.pl-other{width:100%;margin-top:8px;padding:9px 11px;border:1px solid var(--line-strong);border-radius:9px;font-family:var(--sans);font-size:14px;box-sizing:border-box;}
.popup-onbox{display:flex;flex-direction:column;gap:7px;margin:2px 0 8px;padding:8px 10px;background:var(--teal-wash);border-radius:9px;}
.popup-onrow{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink);cursor:pointer;}
.popup-onrow input[type=checkbox]{width:17px;height:17px;accent-color:var(--teal-deep);flex:0 0 auto;}
.stat{flex:1;text-align:center;padding:9px 4px;border-right:1px solid var(--line);}
.stat:last-child{border-right:none;}
.stat .sv{font-family:var(--display);font-weight:700;font-size:17px;}
.stat .sl{font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-faint);font-weight:600;}
.stat.v .sv{color:var(--green);}
.stat.s .sv{color:var(--teal);}

.exp-opt{display:flex;align-items:center;gap:13px;padding:15px;background:var(--surface);border:1px solid var(--line);border-radius:13px;margin-bottom:11px;width:100%;text-align:left;}
.exp-opt:active{background:var(--surface-2);}
.exp-ic{width:42px;height:42px;border-radius:11px;background:var(--teal-wash);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.exp-opt .et{font-weight:700;font-size:15px;}
.exp-opt .ed{font-size:12px;color:var(--ink-soft);margin-top:1px;}
.filterbar{display:flex;gap:7px;padding:10px 16px;background:var(--surface-2);border-bottom:1px solid var(--line);overflow-x:auto;}
.daterangebar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:10px 16px;background:var(--surface-2);border-bottom:1px solid var(--line);}
.daterangebar label{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-right:4px;}
.daterangebar input[type=date]{font-family:var(--mono);font-size:13px;padding:7px 9px;border:1.5px solid var(--line-strong);border-radius:9px;background:var(--surface);color:var(--ink);}

.fchip.expanded{background:var(--surface);color:var(--teal-deep);border-color:var(--teal-deep);box-shadow:inset 0 0 0 1px var(--teal-deep);}

/* ---------- Map view ---------- */
#mapview{display:none;flex:1;position:relative;z-index:1;}
#mapview.on{display:flex;}
body.sheet-open #mapview{z-index:0;}
/* ---- calendar view ---- */
#calview{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--paper);}
#calview.on{display:block;}
.cal-wrap{max-width:560px;margin:0 auto;padding:14px 14px calc(var(--safe-bottom) + 100px);}

.cal-nav{width:40px;height:40px;border-radius:12px;background:#fff;border:1px solid var(--line);font-size:22px;line-height:1;color:var(--teal-deep);font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);}

.cal-sub{font-family:var(--mono);font-size:12px;color:var(--ink-soft);margin-bottom:12px;}
.cal-pick-wrap{margin:8px 0 10px;}
.cal-pick{width:100%;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 14px;font-size:15px;font-weight:600;color:var(--ink);box-shadow:var(--shadow);-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%230e6a73' stroke-width='2.5'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 14px center;}
.cal-rep{flex:0 1 auto;min-width:0;max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px;font-weight:700;color:var(--teal-deep);background:var(--teal-wash);border-radius:8px;padding:3px 8px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.cal-dowrow{margin-bottom:5px;}
.cal-dow{text-align:center;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink-faint);padding:2px 0;}
.cal-cell{position:relative;aspect-ratio:1/1;border-radius:10px;background:#fff;border:1px solid var(--line);display:flex;align-items:flex-start;justify-content:flex-start;padding:5px 0 0 7px;}
.cal-cell.blank{background:transparent;border:none;}
.cal-cell .cal-dnum{font-size:13px;color:var(--ink-soft);font-weight:600;}
.cal-cell.has{background:var(--teal-wash);border-color:var(--teal);}
.cal-cell.has .cal-dnum{color:var(--teal-deep);font-weight:800;}
.cal-cell.today{box-shadow:0 0 0 2px var(--teal) inset;}
.cal-cell.sel{background:var(--teal);border-color:var(--teal-deep);}
.cal-cell.sel .cal-dnum{color:#fff;}
.cal-cell.sel .cal-badge{background:#fff;color:var(--teal-deep);}
.cal-badge{position:absolute;bottom:5px;right:6px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;background:var(--teal-deep);color:#fff;font-family:var(--mono);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.cal-day-detail{margin-top:16px;}
.cal-dd-head{font-weight:700;font-size:15px;color:var(--ink);margin-bottom:8px;}
.cal-dd-row{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:7px;}
.cal-dd-row:active{background:var(--teal-wash);}
.cal-dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;}
.cal-dd-nm{flex:1 1 auto;min-width:0;font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-vlabel{flex:0 0 auto;font-size:11px;font-weight:700;color:var(--teal-deep);background:var(--teal-wash);border-radius:8px;padding:3px 8px;}
.cal-note{flex:0 1 auto;min-width:0;font-size:11px;color:var(--ink-soft);background:var(--paper);border-radius:8px;padding:3px 8px;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-dd-empty,.cal-empty{text-align:center;color:var(--ink-soft);padding:24px 16px;}
.cal-empty h3{color:var(--ink);margin:0 0 6px;}
.cal-setme{margin-top:12px;background:var(--teal);color:#fff;border-radius:12px;padding:10px 18px;font-weight:700;}
body.sheet-open #mapview .leaflet-container{pointer-events:none;}
#map{flex:1;width:100%;height:100%;background:var(--surface-2);-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}

#mapcount{display:none;position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:500;background:var(--teal-deep);color:#fff;font-size:12px;font-weight:600;font-family:var(--mono);padding:6px 14px;border-radius:20px;box-shadow:var(--shadow);pointer-events:none;}
.routepin{width:26px;height:26px;border-radius:50%;background:var(--amber);color:#fff;font-family:var(--mono);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(22,33,29,.35);}
.routepin.first{width:32px;height:32px;font-size:15px;background:var(--green);border:3px solid #fff;box-shadow:0 3px 9px rgba(22,33,29,.5);}
#dropConfirm{position:fixed;left:14px;right:14px;bottom:calc(var(--safe-bottom) + 78px);z-index:660;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line-strong);border-radius:14px;box-shadow:var(--shadow-lg);padding:10px 12px;}
#dropConfirm .dc-msg{flex:1;font-size:12.5px;color:var(--ink-soft);line-height:1.35;}

.prox-banner{position:absolute;top:8px;left:14px;right:14px;z-index:500;margin:0 auto;max-width:360px;max-height:calc(100% - 8px - 180px - var(--safe-bottom));background:#fff;color:var(--ink);border-radius:14px;box-shadow:var(--shadow-lg);display:none;flex-direction:column;opacity:0;transition:opacity .2s;overflow:hidden;}
/* Expanded list is capped so the MAP stays clearly visible — at most ~45% of the
   map area, and never taller than it needs for its content. */

.prox-banner.show{display:flex;opacity:1;}
.prox-banner .pb-head{display:flex;flex-direction:column;gap:9px;padding:13px 16px;cursor:pointer;flex:0 0 auto;}
.prox-banner .pb-row{display:flex;align-items:center;gap:12px;}

.prox-banner .pbn{font-weight:700;font-size:15px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prox-banner .pbd{font-size:12px;color:var(--ink-soft);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prox-banner .pbd b{color:var(--teal-deep);}
.prox-banner .pb-more{display:inline-flex;align-items:center;align-self:flex-start;gap:5px;margin-left:46px;color:var(--teal-deep);font-weight:700;font-size:13.5px;font-family:var(--sans);background:var(--teal-wash);border:1px solid var(--teal);border-radius:16px;padding:7px 14px;line-height:1;white-space:nowrap;}
.prox-banner .pb-more:active{background:var(--teal);color:#fff;}
.prox-banner .pb-list{border-top:1px solid var(--line);flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;border-bottom-left-radius:14px;border-bottom-right-radius:14px;}
.prox-banner.expanded .pb-list{min-height:0;}
.prox-banner .pr-row{display:flex;align-items:center;gap:9px;width:100%;padding:10px 14px;border-bottom:1px solid var(--line);background:#fff;text-align:left;}
.prox-banner .pr-row:last-child{border-bottom:none;}
.prox-banner .pr-row:active{background:var(--teal-wash);}
.prox-banner .pr-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
.prox-banner .pr-nm{flex:1 1 auto;min-width:0;font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prox-banner .pr-ft{flex:0 0 auto;font-family:var(--mono);font-size:11.5px;color:var(--teal-deep);font-weight:700;}
.leaflet-container{font-family:var(--sans);}
.leaflet-popup-content-wrapper{border-radius:13px;box-shadow:var(--shadow-lg);}
.leaflet-popup-content{margin:12px 14px;}
.popup-nm{font-family:var(--display);font-weight:700;font-size:15px;color:var(--ink);margin-bottom:3px;line-height:1.25;}
.popup-ad{font-size:12px;color:var(--ink-soft);margin-bottom:8px;}
.popup-sc{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;background:var(--teal-wash);color:var(--teal-deep);padding:2px 7px;border-radius:6px;margin-bottom:8px;}
.popup-btn{display:block;width:100%;background:var(--teal);color:#fff;text-align:center;padding:9px;border-radius:9px;font-weight:700;font-size:13px;border:none;}
.popup-note{background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:12px;color:var(--ink-soft);margin-bottom:8px;max-height:80px;overflow-y:auto;white-space:pre-wrap;line-height:1.45;}
.popup-note .pnl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-faint);margin-bottom:3px;}
.popup-quick{width:100%;border:1px solid var(--line-strong);border-radius:8px;padding:7px 9px;font-size:13px;margin-bottom:7px;resize:vertical;min-height:36px;}
.popup-row{display:flex;gap:6px;}
.popup-btn.ghost{background:var(--surface);border:1.5px solid var(--line-strong);color:var(--ink-soft);flex:1;}
.popup-btn.add{flex:1;}
.popup-meta{font-size:11px;color:var(--teal-deep);font-weight:600;margin-bottom:7px;font-family:var(--mono);}
.locate-btn{position:absolute;bottom:calc(var(--safe-bottom) + 78px);left:50%;transform:translateX(-50%);z-index:600;width:46px;height:46px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-lg);}

@keyframes spin{to{transform:rotate(360deg);}}

.rad-ctrl.show{display:flex;}

.rad-btn:active{background:var(--teal-wash);}

.userdot{width:18px;height:18px;border-radius:50%;background:#1a73e8;border:3px solid #fff;box-shadow:0 0 0 4px rgba(26,115,232,.25),0 2px 6px rgba(0,0,0,.3);}
.nearby-toggle{position:absolute;bottom:calc(var(--safe-bottom) + 80px);left:14px;z-index:600;background:var(--teal-deep);color:#fff;border-radius:22px;padding:10px 14px;font-size:13px;font-weight:700;box-shadow:var(--shadow-lg);display:none;align-items:center;gap:6px;}
.nearby-toggle.show{display:flex;}
.route-btn{position:absolute;bottom:calc(var(--safe-bottom) + 80px);left:14px;z-index:600;background:var(--amber);color:#fff;border:none;border-radius:22px;padding:10px 14px;font-size:13px;font-weight:700;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:6px;cursor:pointer;}
.pin{background:var(--teal);width:16px;height:16px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2.5px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.3);}
.pin.visited{background:var(--green);}
.pin.scanner{background:var(--amber);}

/* ---- Lab pipeline status (written daily by the Lab→Salesly bridge) ---- */
.labchip{display:inline-flex;align-items:center;font-size:9.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:8px;color:#fff;flex:none;line-height:1.5;}
.lab-active{background:#5fbe7d;}   /* light green */
.lab-new{background:#12a5a0;}      /* teal */

.labset{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;}
.labseg{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--line-strong);background:var(--surface);color:var(--ink);font-weight:700;font-size:11.5px;padding:6px 10px;border-radius:10px;font-family:inherit;cursor:pointer;}
.labseg .ld{width:9px;height:9px;border-radius:50%;display:inline-block;flex:none;}
.labseg b{font-weight:800;font-variant-numeric:tabular-nums;}
.labseg.on{border-color:#0f3d36;background:rgba(18,165,160,.12);}

      <span>Visit</span><span class="cv">▾</span>

<script>
/* SEED_B64 removed — the office book now lives in Postgres, not baked into this file. */
const SK="ildental_v2";        // overrides+additions+deletions
const SCANNERS=["iTero","Trios","Dscore","Medit","Allied Star","Other","None"];

/* ---------- reps / users ----------
   Attribution, not authentication. The rep list is shared (kept in sync via the
   Sheet); "who am I" is chosen once per device and remembered locally. Every
   visit logged and office added is stamped with the current rep's name so you can
   see who did what and filter to "Mine". Roles: "admin" can manage the rep list;
   everyone can add/edit/visit. Territory (e.g. a US state) is an optional default
   filter that becomes useful when offices span multiple states.                */
const REPS_KEY="ildental_reps";   // rep registry
const ME_KEY="ildental_me";       // which rep THIS device is, chosen once
const DEFAULT_REPS=[
  {id:"ryan", name:"Ryan", role:"admin", territory:"Illinois", pin:"2468"},
  {id:"jason", name:"Jason", role:"rep", territory:"Illinois"}
];
let REPS=[];        // the live registry
let ME=null;        // {id,name,role,territory} for this device, or null until chosen
function loadReps(){
  try{const r=JSON.parse(localStorage.getItem(REPS_KEY)||"null"); REPS=Array.isArray(r)&&r.length?r:DEFAULT_REPS.slice();}
  catch(e){ REPS=DEFAULT_REPS.slice(); }
  // Ensure any admin account has a PIN (older saved data may predate the PIN lock).
  let changed=false;
  REPS.forEach(r=>{ if(r.role==="admin" && (!r.pin||!String(r.pin).trim())){ r.pin="2468"; changed=true; } });
  if(changed) saveReps();
}
const REPS_TS_KEY="ildental_reps_ts";
let REPS_TS=0; try{REPS_TS=parseInt(localStorage.getItem(REPS_TS_KEY)||"0",10)||0;}catch(e){}
function persistReps(ts){ REPS_TS=ts||Date.now();
  try{localStorage.setItem(REPS_KEY,JSON.stringify(REPS));localStorage.setItem(REPS_TS_KEY,String(REPS_TS));}catch(e){} }
function saveReps(){ persistReps(Date.now());
  // Reps ride team sync as a reserved "__reps__" row in the Sheet, so a rep
  // added or edited on one device shows up on every device within a poll.
  try{ if(cloudOn) setTimeout(()=>{try{cloudPush(true);}catch(e){}},400); }catch(e){} }
function repById(id){ return REPS.find(r=>r.id===id)||null; }
function repByName(n){ if(!n)return null; n=String(n).toLowerCase().trim(); return REPS.find(r=>String((r&&r.name)||"").toLowerCase()===n)||null; }
function loadMe(){
  try{const id=localStorage.getItem(ME_KEY); ME=id?repById(id):null;}catch(e){ME=null;}
  if(ME && !repById(ME.id)) ME=null;
}
function setMe(id){ const r=repById(id); if(!r)return; ME=r; try{localStorage.setItem(ME_KEY,id);}catch(e){} _calRepFilter="__me__"; }
function isAdmin(){ return !!(ME&&ME.role==="admin"); }
function meName(){ return ME?String(ME.name||"").replace(/\s+/g," ").trim():""; }
function repTerritory(){ return ME?(ME.territory||""):""; }
// ---- Territory matching helpers ----
// The Territory field is free text, so make matching forgiving: full state names
// and 2-letter abbreviations both work ("Illinois", "IL", "il." all match), extra
// spaces/punctuation are ignored, and a territory can list several states
// separated by commas/slashes ("Illinois, Wisconsin").
const ST_ABBR_FULL={al:"alabama",ak:"alaska",az:"arizona",ar:"arkansas",ca:"california",co:"colorado",ct:"connecticut",de:"delaware",fl:"florida",ga:"georgia",hi:"hawaii",id:"idaho",il:"illinois",in:"indiana",ia:"iowa",ks:"kansas",ky:"kentucky",la:"louisiana",me:"maine",md:"maryland",ma:"massachusetts",mi:"michigan",mn:"minnesota",ms:"mississippi",mo:"missouri",mt:"montana",ne:"nebraska",nv:"nevada",nh:"new hampshire",nj:"new jersey",nm:"new mexico",ny:"new york",nc:"north carolina",nd:"north dakota",oh:"ohio",ok:"oklahoma",or:"oregon",pa:"pennsylvania",ri:"rhode island",sc:"south carolina",sd:"south dakota",tn:"tennessee",tx:"texas",ut:"utah",vt:"vermont",va:"virginia",wa:"washington",wv:"west virginia",wi:"wisconsin",wy:"wyoming",dc:"district of columbia"};
function normStateName(s){
  s=String(s||"").toLowerCase().replace(/[^a-z ]/g," ").replace(/\s+/g," ").trim();
  if(!s)return "";
  return ST_ABBR_FULL[s]||s;
}
// Parse the rep's territory into a list of recognized state names. Unrecognized
// text ("Chicagoland") yields an empty list, and territoryPass falls back to the
// GPS behavior — a mistyped territory degrades to "show what's around me", never
// to an empty screen.
const ALL_STATE_NAMES=Object.values(ST_ABBR_FULL);
function territoryStates(){
  return repTerritory().split(/[,;/&|]+/).map(normStateName)
    .filter(s=>s&&ALL_STATE_NAMES.indexOf(s)>=0);
}
// LOCATION-BASED scoping: the rep sees offices for the state they're physically in.
// We detect that state from GPS (reverse-geocoded once, re-checked when they move far)
// and cache it here. Falls back to assigned territory until a fix is available.
let currentGeoState="";        // full state name detected from GPS, e.g. "Illinois"
let _geoStateAt=null;          // {lat,lng} where we last detected, to avoid re-querying
async function detectGeoState(lat,lng,force){
  if(lat==null||lng==null) return;
  // Skip if we already detected near here (within ~15 miles) unless forced.
  if(!force && _geoStateAt && haversine(lat,lng,_geoStateAt.lat,_geoStateAt.lng)<15 && currentGeoState) return;
  try{
    const url="https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat="+encodeURIComponent(lat)+"&lon="+encodeURIComponent(lng)+"&zoom=8&addressdetails=1";
    const res=await fetch(url,{headers:{"Accept":"application/json"}});
    if(!res.ok) return;
    const d=await res.json(); const a=d&&d.address?d.address:{};
    // Only accept a RECOGNIZED US state — nominatim can hand back a county or
    // blank, and storing that used to break state matching (a rep would see only
    // the 30-mile GPS cushion instead of their whole state).
    const raw=normStateName(a.state||"");
    const st=(raw&&ALL_STATE_NAMES.indexOf(raw)>=0)?raw.replace(/\b\w/g,c=>c.toUpperCase()):"";
    if(st){ const prev=currentGeoState; currentGeoState=st; _geoStateAt={lat,lng}; if(prev!==st){ try{render();}catch(e){} } }
  }catch(e){ /* keep whatever we had */ }
}
// Derive a US state (full name) from a ZIP code, using the standard 3-digit ZIP
// prefix ranges. Returns "" if unknown. Used so reps can be scoped to their state.
const ZIP_STATE_RANGES=[
  [["005","005"],"New York"],[["006","009"],"Puerto Rico"],[["010","027"],"Massachusetts"],
  [["028","029"],"Rhode Island"],[["030","038"],"New Hampshire"],[["039","049"],"Maine"],
  [["050","059"],"Vermont"],[["060","069"],"Connecticut"],[["070","089"],"New Jersey"],
  [["100","149"],"New York"],[["150","196"],"Pennsylvania"],[["197","199"],"Delaware"],
  [["200","205"],"District of Columbia"],[["206","219"],"Maryland"],[["220","246"],"Virginia"],
  [["247","268"],"West Virginia"],[["270","289"],"North Carolina"],[["290","299"],"South Carolina"],
  [["300","319"],"Georgia"],[["320","349"],"Florida"],[["350","369"],"Alabama"],
  [["370","385"],"Tennessee"],[["386","397"],"Mississippi"],[["398","399"],"Georgia"],
  [["400","427"],"Kentucky"],[["430","459"],"Ohio"],[["460","479"],"Indiana"],
  [["480","499"],"Michigan"],[["500","528"],"Iowa"],[["530","549"],"Wisconsin"],
  [["550","567"],"Minnesota"],[["570","577"],"South Dakota"],[["580","588"],"North Dakota"],
  [["590","599"],"Montana"],[["600","629"],"Illinois"],[["630","658"],"Missouri"],
  [["660","679"],"Kansas"],[["680","693"],"Nebraska"],[["700","714"],"Louisiana"],
  [["716","729"],"Arkansas"],[["730","749"],"Oklahoma"],[["750","799"],"Texas"],
  [["800","816"],"Colorado"],[["820","831"],"Wyoming"],[["832","838"],"Idaho"],
  [["840","847"],"Utah"],[["850","865"],"Arizona"],[["870","884"],"New Mexico"],
  [["889","898"],"Nevada"],[["900","961"],"California"],[["967","968"],"Hawaii"],
  [["970","979"],"Oregon"],[["980","994"],"Washington"],[["995","999"],"Alaska"]
];
function stateFromZip(zip){
  const z=String(zip||"").replace(/[^0-9]/g,"");
  if(z.length<3) return "";
  const p=z.substring(0,3);
  for(const [range,st] of ZIP_STATE_RANGES){ if(p>=range[0]&&p<=range[1]) return st; }
  return "";
}

/* ---------- Supabase backend (replaces the Google Apps Script sync) ----------
   The office book, the visit ledger and the rep registry all live in Postgres now.
   There is no local seed and no diff-store: every office is a real row.

   What changed vs the Apps Script era:
     • The map no longer holds 100k offices in memory. It holds every 'S' tier
       (your invoiced customers) plus whatever A/B prospects fall inside the
       current viewport, fetched via the get_offices_in_viewport RPC on moveend.
     • Writes go straight to Postgres (upsert), not a whole-sheet rewrite. The
       old "refused: would empty sheet" guards are gone because a single-row
       upsert can't wipe the book.
     • Realtime replaces the 15s poll.

   Settings ▸ Team Sync now takes:  URL = https://xxxx.supabase.co
                                    Key = the anon/public key
*/
const GS_CFG_KEY="ildental_sb";
let SB_URL="", SB_KEY="";
// OpenRouteService key — powers the road-following route line. Unchanged.
let ORS_KEY="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImE4MGQzNTA4ZjgyYzQwZjA5MGNmNzQ3MDZjMjEzZGQxIiwiaCI6Im11cm11cjY0In0=";
try{const c=JSON.parse(localStorage.getItem(GS_CFG_KEY)||"{}");SB_URL=c.url||"";SB_KEY=c.token||"";if(c.orsKey)ORS_KEY=c.orsKey;}catch(e){}

let sb=null, cloudOn=false, pulling=false, pushing=false;
let lastSyncAt=0, lastSyncErr="", lastRawRows=0, lastSyncJSON="";
let pollTimer=null, watchdog=null, sbChannel=null;
const DIRTY=new Set();            // office ids edited locally, not yet pushed
const VIEWPORT_LIMIT=4000;        // A/B pins per pan. Clustering handles this fine; dense metros (Chicago ~3,800 prospects) now load fully instead of stopping at a few hundred.
let _lastBox="";                  // dedupe identical viewport queries
let _didInitialFit=false;         // fit the map to the user ONCE on first load, then never yank them back

// Wait for the Supabase CDN script to finish loading. On a FIRST home-screen
// launch the app boots before the CDN lib is ready, so window.supabase is still
// undefined — that race is why the login prompt didn't appear until you closed
// and reopened. Poll briefly until it's there.
async function waitForSupabaseLib(maxMs){
  const start=Date.now();
  while(!window.supabase){
    if(Date.now()-start>(maxMs||6000)) return false;
    await new Promise(r=>setTimeout(r,80));
  }
  return true;
}
async function cloudInit(){
  cloudOn=false; sb=null; lastSyncErr="";
  if(SB_URL && SB_KEY){
    if(!window.supabase){ await waitForSupabaseLib(6000); }
    if(!window.supabase){ lastSyncErr="supabase library didn't load"; }
    else {
      try{ sb=window.supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true,storageKey:"salesly_auth",storage:window.localStorage}}); cloudOn=true; }
      catch(e){ lastSyncErr="bad Supabase URL or key"; }
    }
  }
  try{setSyncBadge();}catch(e){}
}
function cloudSaveConfig(url, token){
  SB_URL=(url||"").trim().replace(/\/+$/,"");
  if(typeof token==="string"){ const t=token.trim(); if(t) SB_KEY=t; }
  try{localStorage.setItem(GS_CFG_KEY,JSON.stringify({url:SB_URL,token:SB_KEY,orsKey:ORS_KEY}));}catch(e){}
}

/* ---------- row mapping: Postgres snake_case <-> app camelCase ----------
   The app has always spoken 'Yes'/'' for the onboarding flags and a packed
   pipe-delimited string for visits. Postgres stores real booleans. Translate
   at the boundary so none of the ~2,800 lines of UI below has to care. */
function dbToApp(r){
  return {
    id:String(r.id),
    name:r.name||"", addr:r.addr||"", city:r.city||"", zip:r.zip||"",
    lat:(r.lat==null?"":+r.lat), lng:(r.lng==null?"":+r.lng),
    county:r.county||"", state:r.state||"",
    phone:r.phone||"", email:r.email||"", scanner:r.scanner||"",
    lab:r.lab||"", drs:r.drs||"", hours:r.hours||"",
    visitDay:r.visit_day||"", notes:r.notes||"",
    starterKit:r.starter_kit?"Yes":"", welcomeEmail:r.welcome_email?"Yes":"",
    pricelist:r.pricelist||"",
    visits:r.visits||"",                       // parseVisits() unpacks this in rebuild()
    visited:!!(r.visits&&String(r.visits).trim()),
    active:r.active!==false,
    addedBy:r.added_by||"",
    tier:r.tier||"B",
    lastInvoiceDate:r.last_invoice_date||"",
    totalSales:r.total_sales==null?0:+r.total_sales,
    seed:false
  };
}
function appToDb(o){
  const num=v=>{ const n=parseFloat(v); return isFinite(n)?n:null; };
  return {
    id:String(o.id),
    name:o.name||"", addr:o.addr||"", city:o.city||"", zip:o.zip||"",
    lat:num(o.lat), lng:num(o.lng),
    county:o.county||"", state:o.state||"",
    phone:o.phone||"", email:o.email||"", scanner:o.scanner||"",
    lab:o.lab||"", drs:o.drs||"", hours:o.hours||"",
    visit_day:o.visitDay||"", notes:o.notes||"",
    starter_kit:String(o.starterKit||"")==="Yes",
    welcome_email:String(o.welcomeEmail||"")==="Yes",
    pricelist:o.pricelist||"",
    visits:visitsToString(parseVisits(o.visits)),
    active:o.active!==false,
    added_by:o.addedBy||""
    // tier is deliberately NOT written here. Tier is owned by the dashboard's
    // daily invoice upsert (S = invoiced customer). A rep editing an office in
    // the field must never silently demote a customer back to a prospect.
  };
}

/* ---------- read ----------
   loadViewport() is the whole performance story. 'S' tier comes back
   unconditionally (your customers stay pinned at any zoom); A/B prospects only
   come back if they're inside the box, capped. Panning replaces the A/B set. */
async function loadViewport(bounds, opts){
  if(!cloudOn||!sb) return false;
  opts=opts||{};
  let b=bounds;
  if(!b && typeof mapObj!=="undefined" && mapObj){ try{ b=mapObj.getBounds(); }catch(e){} }
  // No map yet (cold start on the list view): ask for a small box around Chicago
  // so we still get every S-tier office back, which is what the list needs.
  const sw=b?b.getSouthWest():{lat:41.6,lng:-88.1}, ne=b?b.getNorthEast():{lat:42.1,lng:-87.5};
  const key=[sw.lng.toFixed(3),sw.lat.toFixed(3),ne.lng.toFixed(3),ne.lat.toFixed(3)].join(",");
  if(key===_lastBox && !opts.force) return false;
  if(pulling) return false;
  pulling=true;
  try{
    const {data,error}=await sb.rpc("get_offices_in_viewport",{
      min_lng:sw.lng, min_lat:sw.lat, max_lng:ne.lng, max_lat:ne.lat, p_limit:VIEWPORT_LIMIT
    });
    if(error) throw error;
    // RPC now returns a jsonb array (one value) to dodge PostgREST's 1000-row
    // response cap. Normalize to a plain array whether it arrives parsed or as text.
    const rows = Array.isArray(data) ? data : (typeof data==="string" ? JSON.parse(data||"[]") : (data||[]));
    _lastBox=key;
    lastRawRows=rows.length;
    // Merge, don't replace: an office with unpushed local edits must not be
    // clobbered by the server's older copy on the next pan.
    const next={};
    rows.forEach(r=>{ const o=dbToApp(r); next[o.id]=DIRTY.has(o.id)?(store.offices[o.id]||o):o; });
    DIRTY.forEach(id=>{ if(store.offices[id]) next[id]=store.offices[id]; });
    store.offices=next;
    try{localStorage.setItem(SK,JSON.stringify(store));}catch(e){}
    lastSyncAt=Date.now(); lastSyncErr="";
    return true;
  }catch(e){
    lastSyncErr=(e&&e.message)?e.message:"connection error";
    return false;
  }finally{
    pulling=false;

// Kept for every existing caller (Team Sync dialog, boot, realtime).
async function cloudPull(){ return loadViewport(null,{force:true}); }

/* ---------- write ----------
   One upsert per edited office, plus an append to the visit_log ledger.
   log_id = "officeId|YYYY-MM-DD" is the same dedupe key the Apps Script used,
   so re-saving an office can't double-log the same day's visit. */
async function cloudPush(silent){
  if(!cloudOn||!sb||pushing||!DIRTY.size) return false;
  pushing=true;
  const ids=Array.from(DIRTY);
  try{
    const rows=ids.map(id=>store.offices[id]).filter(Boolean).map(appToDb);
    if(rows.length){
      const {error}=await sb.from("offices").upsert(rows,{onConflict:"id"});
      if(error) throw error;
    }
    const logs=[];
    ids.forEach(id=>{
      const o=store.offices[id]; if(!o) return;
      parseVisits(o.visits).forEach(v=>{
        if(!v||!v.date) return;
        logs.push({
          log_id:id+"|"+v.date, office_id:id,
          office:o.name||"", city:o.city||"", visit_date:v.date,
          status:v.color==="green"?"Good":v.color==="yellow"?"Okay":v.color==="red"?"Poor":"",
          note:v.note||"", rep:v.rep||"",
          // Without this the row fails the RLS check (rep_id = auth.uid()) and the
          // visit is silently dropped. The ledger is the source of truth for every
          // report — a dropped visit here is a visit that never happened.
          rep_id: sbUser ? sbUser.id : null
        });
      });
    });
    if(logs.length){
      // ignoreDuplicates: the ledger is append-only. An already-logged visit is
      // a no-op, never an overwrite.
      const {error}=await sb.from("visit_log").upsert(logs,{onConflict:"log_id",ignoreDuplicates:true});
      if(error) throw error;
    }
    ids.forEach(id=>DIRTY.delete(id));
    lastSyncAt=Date.now(); lastSyncErr="";
    if(!silent) toast("Synced to team");
    return true;
  }catch(e){
    lastSyncErr=(e&&e.message)?e.message:"push failed";
    if(!silent) toast("⚠️ Sync failed — saved on device");
    return false;
  }finally{
    pushing=false;
    try{setSyncBadge();}catch(e){}
  }
}

/* ---------- realtime (replaces the 15-second poll) ---------- */
function cloudSubscribe(){
  if(!cloudOn||!sb||sbChannel) return;
  try{
    sbChannel=sb.channel("offices-live")
      .on("postgres_changes",{event:"*",schema:"public",table:"offices"},payload=>{
        const r=payload.new||payload.old; if(!r||!r.id) return;
        const id=String(r.id);
        if(DIRTY.has(id)) return;                   // our own unpushed edit wins
        if(payload.eventType==="DELETE"){ delete store.offices[id]; }
        else if(store.offices[id]){ store.offices[id]=dbToApp(r); }  // only update what's loaded
        else return;                                // not in our viewport — ignore
        try{ rebuild(); renderActive(); }catch(e){}
      })
      .subscribe();
  }catch(e){ lastSyncErr="realtime unavailable"; }

  if(!pollTimer) pollTimer=setInterval(()=>{ if(DIRTY.size) cloudPush(true); },20000);
}

/* ---------- helpers ---------- */
function officeById(id){return DB.find(o=>o.id===id);}
/* ---- Lab pipeline status ----
   The Lab→Salesly bridge writes a maintained first line into notes:
   "📊 LAB: WINBACK · last case … · $… lifetime". We PARSE it (no schema change)
   so the app can tag, filter, and count these imported client offices. */
function labStatus(o){ const _ls=labStatuses(o); if(_ls.length) return _ls[0]; return _labStatusLegacy(o); }
function _labStatusLegacy(o){
  const nts=o&&o.notes; if(!nts)return "";
  const m=String(nts).match(/(?:^|\n)\s*📊\s*LAB:\s*([A-Za-z ]+?)\s*(?:·|\n|$)/);
  if(!m)return "";
  const w=m[1].trim().toLowerCase();
  if(w.indexOf("new")===0)return "new";
  if(w.indexOf("winback")===0)return "winback";
  if(w.indexOf("falloff")===0)return "falloff";
  if(w.indexOf("inactive")===0)return "inactive";
  if(w.indexOf("active")===0)return "active";
  return "";
}
const LAB_LABEL={active:"Active","new":"New",winback:"Winback",falloff:"Falloff",inactive:"Inactive"};
// ALL statuses on an office — one per 📊 LAB line. The bridge now writes one line
// per DOCTOR ("📊 LAB: WINBACK · Dr. Carol White · …"), so counting lines counts
// doctors, which makes the app's status dials match the Lab Dashboard's
// Current/New/Winback/Falloff/Inactive tab and its Salesly Bridge totals.
// Old-format single-line offices still count as one, exactly as before.
function labStatuses(o){
  const nts=o&&o.notes; if(!nts)return [];
  const out=[];
  // Match a "LAB:" line no matter what precedes it (📊 emoji, a mojibake version
  // of it, or nothing) and no matter what follows the status word (·, a re-encoded
  // separator, or end of line). Only the FIRST alphabetic word after LAB: is read,
  // so "ACTIVE · last case…" and a garbled separator both parse identically.
  String(nts).split("\n").forEach(l=>{
    const m=l.match(/LAB:\s*([A-Za-z]+)/i);
    if(!m)return;
    const w=m[1].toLowerCase();
    if(w.indexOf("new")===0)out.push("new");
    else if(w.indexOf("winback")===0)out.push("winback");
    else if(w.indexOf("falloff")===0)out.push("falloff");
    else if(w.indexOf("inactive")===0)out.push("inactive");
    else if(w.indexOf("active")===0)out.push("active");
    else if(w.indexOf("current")===0)out.push("active");   // dashboard may label it "Current"
  });
  return out;
}
function labChip(o){ const st=labStatus(o); return st?`<span class="labchip lab-${st}">${LAB_LABEL[st]}</span>`:""; }
// Notes are shown/edited WITHOUT the machine-written 📊 LAB line; the line stays
// in the stored value (it powers the tag + filters and the bridge maintains it).
function stripLab(nts){ if(!nts)return ""; return String(nts).split("\n").filter(l=>!/LAB:\s*[A-Za-z]/i.test(l)).join("\n").replace(/^\n+|\n+$/g,""); }
function labLines(nts){ if(!nts)return ""; return String(nts).split("\n").filter(l=>/LAB:\s*[A-Za-z]/i.test(l)).join("\n"); }

// with "b") — recognized so imports are never mistaken for rep activity.
function isImport(o){ return !!labStatus(o)||String((o&&o.id)||"").charAt(0)==="b"; }
/* ---- Visited ----
   STRICT for anything added after launch: only a logged visit, the visited flag,
   or a bridge-imported client (an earned account counts as visited) qualifies.
   A row merely having notes / a scanner value / import data is NOT a visit — so
   bulk prospect dumps land unvisited. Legacy "s" seed offices keep the original
   inference so the existing book's counts don't shift. */
function isVisited(o){
  if(o.visits&&o.visits.length)return true;
  if(o.visited)return true;
  if(labStatus(o))return true;
  if(String(o.id||"").charAt(0)==="s"){

}
// Date helpers. Internally a visit date is "YYYY-MM-DD".
function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function normDate(s){ // accept YYYY-MM-DD, MM/DD/YYYY, or Date-ish; return YYYY-MM-DD or ""
  if(!s)return ""; s=String(s).trim();
  // validate real calendar ranges, not just the shape, so a bad hand-edit like
  // "2026-13-45" is rejected (->"") rather than stored and breaking sort/display.
  const okYMD=(y,mo,da)=>{y=+y;mo=+mo;da=+da;return y>=1900&&y<=2100&&mo>=1&&mo<=12&&da>=1&&da<=31;};
  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m){ if(!okYMD(m[1],m[2],m[3]))return ""; return m[1]+"-"+m[2].padStart(2,"0")+"-"+m[3].padStart(2,"0"); }
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m){ if(!okYMD(m[3],m[1],m[2]))return ""; return m[3]+"-"+m[1].padStart(2,"0")+"-"+m[2].padStart(2,"0"); }
  const d=new Date(s); if(!isNaN(d))return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  return "";
}
function fmtDate(s){ // YYYY-MM-DD -> "Jun 4, 2026"
  const d=normDate(s); if(!d)return "";

  return dt.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});

function daysAgo(s){const d=normDate(s);if(!d)return Infinity;const p=d.split("-");const dt=new Date(+p[0],+p[1]-1,+p[2]);return Math.floor((Date.now()-dt.getTime())/86400000);}

// --- visit objects: {date:"YYYY-MM-DD", color:"green|yellow|red"|"", note:""} ---
const VCOLORS={green:"#2f7d3f",yellow:"#bf9b16",red:"#b3402f"};
const VLABEL={green:"Good",yellow:"Okay",red:"Poor"};
function parseVisits(v){
  let arr=[];
  if(v==null) arr=[];
  else if(Array.isArray(v)) arr=v.slice();
  else if(typeof v==="string") arr=v.split(/[|,]/).map(s=>s.trim()).filter(Boolean);
  const out=arr.map(item=>{
    if(item&&typeof item==="object"){ const d=normDate(item.date); if(!d)return null;
      return {date:d, color:(item.color||""), note:(item.note||""), rep:(item.rep||"")}; }
    // string form: "date" or "date~color~note" or "date~color~note~rep"
    const parts=String(item).split("~");
    const d=normDate(parts[0]); if(!d)return null;
    return {date:d, color:(parts[1]||"").trim(), note:(parts[2]||"").trim(), rep:(parts[3]||"").trim()};
  }).filter(Boolean);
  // newest first by date
  out.sort((a,b)=>a.date<b.date?1:a.date>b.date?-1:0);

}
function visitsToString(visits){
  if(!visits||!visits.length)return "";
  return visits.map(v=>{
    // ~ | and , are all structural separators in the stored format / parser,
    // so strip them from free-text fields to avoid splitting a visit into pieces
    // (a comma in "call, then email" would otherwise truncate the note on read).
    const clean=s=>(s||"").replace(/[~|,]/g," ").replace(/\s+/g," ").trim();
    const c=v.color||""; const n=clean(v.note); const r=clean(v.rep);
    if(!c&&!n&&!r)return v.date;
    // emit a 4th ~field only when a rep is present, so older readers still cope
    return r ? (v.date+"~"+c+"~"+n+"~"+r) : (n ? (v.date+"~"+c+"~"+n) : (v.date+"~"+c));

function lastColor(o){ if(!o.visits)return ""; for(const v of o.visits){ if(v.color)return v.color; } return ""; }
// Auto-visit on edit: when a rep changes anything about an office, treat that as
// a visit TODAY so they don't have to remember the "Log visit" button. We only
// add one if today isn't already logged (so repeated edits in a day don't pile
// up), we carry over the office's most recent status color, and we stamp the rep.
// `visits` is the working array (newest-first); `prevColor` is the last color
// before editing. Returns the (possibly extended) array.
function ensureVisitToday(visits, prevColor){
  const today=todayStr();
  visits=Array.isArray(visits)?visits.slice():[];
  if(visits.some(v=>v&&normDate(v.date)===today)) return visits;   // already logged today
  visits.unshift({date:today, color:(prevColor||""), note:"", rep:meName()});
  visits.sort((a,b)=>a.date<b.date?1:a.date>b.date?-1:0);

}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---------- filtering ---------- */
function isMine(o){
  const me=meName(); if(!me)return false;
  if((o.addedBy||"").toLowerCase()===me.toLowerCase())return true;

// Shared: do the three stackable priority groups pass for this office?
// They AND together; within Heat the selected colors OR together.
function groupsPass(o){
  if(state.gVisit==="visited"&&!isVisited(o))return false;
  if(state.gVisit==="unvisited"&&isVisited(o))return false;
  if(state.gVisit==="mine"&&!isMine(o))return false;
  if(state.gStatus==="active"&&o.active===false)return false;
  if(state.gStatus==="inactive"&&o.active!==false)return false;
  if(state.gHeat&&state.gHeat.length){ if(state.gHeat.indexOf(lastColor(o))<0)return false; }

    if(!labDialPass(o))return false;   // state first — Lab filters never widen to the whole book

// Secondary filters live in the "More" drawer (scanner/notes/added/dates).
// They are STACKABLE: every selected chip must pass (AND). The three date chips
// (Last 7 / Last 30 / Date range) are exclusive among themselves — picking one
// swaps out the others — but stack freely with scanner/notes/added and the rep
// chips, so "Rep: Ryan + Has scanner + Last 30 days" works as one query.
function secondaryPass(o){

// in a metro that straddles two states) stay visible when they cross.

// assigned territory (or territories), else the GPS-detected state — and
// nothing else. Rep selection, visited chips, search, and date filters never
// change these numbers, so every rep in the same state sees the same five
// totals, matching the Lab Dashboard's Bridge tab for that state.

// visible at a glance instead of silently widening to the whole book.
function labScope(){
  const terr=territoryStates();
  if(terr.length) return { states:terr, src:'territory' };
  const gps=normStateName(currentGeoState);

}

}

  if(isAdmin&&isAdmin())return true;

  // isn't a recognizable state — both fall back to the GPS behavior below.
  const terr=territoryStates();
  if(terr.length){
    // Territory is authoritative: every rep on the same territory sees the exact
    // same book (and the same status dials) no matter where they're standing.
    const os=normStateName(o.state);
    if(!os)return false;                        // unknown-state office: not in any state view
    return terr.indexOf(os)>=0;
  }
  // No usable territory → GPS mode: the state they're physically in, plus the
  // 30-mile cushion so border metros and road trips keep working.
  if(userPos && o.lat && o.lng){
    if(haversine(userPos.lat,userPos.lng,+o.lat,+o.lng)<=BORDER_MILES) return true;

  if(!groupsPass(o))return false;
  if(!secondaryPass(o))return false;
  if(!repPass(o))return false;
  return true;
}

  // Exclude junk coordinates (0,0 or out-of-range) that would otherwise pull the
  // nearest-next walk to the wrong place.
  const valid=o=>o.lat&&o.lng&&Math.abs(+o.lat)>0.01&&Math.abs(+o.lng)>0.01&&Math.abs(+o.lat)<=90&&Math.abs(+o.lng)<=180;
  const pts=offices.filter(valid).map(o=>({o,lat:+o.lat,lng:+o.lng}));
  const out=[]; let cLat=startLat, cLng=startLng;
  const pool=pts.slice();
  // Track placed coordinates so we don't plot the SAME spot twice. Two distinct
  // practices are essentially never at the identical lat/lng, so collapsing
  // near-identical points (~within 50ft) removes true duplicates only. This
  // affects the ROUTE only — it never edits or deletes stored office data.
  const placed=[];
  const isDup=(la,ln)=>placed.some(p=>feetBetween(p.lat,p.lng,la,ln)<60);
  while(pool.length){
    let bi=0, bd=Infinity;
    for(let i=0;i<pool.length;i++){ const d=haversine(cLat,cLng,pool[i].lat,pool[i].lng); if(d<bd){bd=d;bi=i;} }
    const next=pool.splice(bi,1)[0];
    if(isDup(next.lat,next.lng)){ continue; }   // skip a stop at an already-placed spot
    placed.push({lat:next.lat,lng:next.lng});
    out.push(next.o); cLat=next.lat; cLng=next.lng;
  }
  return out;
}
// Apple Maps multi-stop: daddr supports "to:" chained waypoints.
function routeAppleURL(ordered, startLat, startLng){
  if(!ordered.length) return "";
  const dests=ordered.map(o=>o.lat+","+o.lng);
  const daddr=dests.join("+to:");
  const saddr=(startLat!=null&&startLng!=null)?(startLat+","+startLng):"";
  return "https://maps.apple.com/?"+(saddr?("saddr="+encodeURIComponent(saddr)+"&"):"")+"daddr="+encodeURIComponent(daddr)+"&dirflg=d";
}
function buildMap(){
  if(mapBuilt) return;
  mapObj=L.map('map',{zoomControl:false,tap:true}).setView([41.85,-87.85],10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19, attribution:'© OpenStreetMap'
  }).addTo(mapObj);
  clusterLayer=L.markerClusterGroup({chunkedLoading:true,maxClusterRadius:50,spiderfyOnMaxZoom:true});
  mapObj.addLayer(clusterLayer);
  mapObj.on('popupopen', wirePopup);
  // THE BOTTLENECK FIX. Every pan/zoom re-asks Postgres for just what's on screen.
  // Debounced so a flick-pan fires one query, not thirty. S-tier always comes back;
  // A/B prospects are bounded by the box and capped at VIEWPORT_LIMIT, so the
  // marker cluster never sees anything close to 100k points.
  mapObj.on('moveend zoomend', ()=>{
    clearTimeout(mapObj._vpT);
    mapObj._vpT=setTimeout(async()=>{
      if(!cloudOn) return;
      if(_popupOpen||_spiderOpen) return;      // don't yank a pin out from under a tap
      const changed=await loadViewport();
      if(changed){ try{ rebuild(); renderActive(); }catch(e){} }
    }, 350);
  });
  // While a popup is open OR a cluster is spiderfied (expanded), DON'T let a GPS
  // refresh rebuild/recenter the map — that was collapsing the cluster before you
  // could tap a pin. Track both states and pause refresh accordingly.
  mapObj.on('popupopen', ()=>{ _popupOpen=true; _interactAt=Date.now(); });
  mapObj.on('popupclose', ()=>{ _popupOpen=false; });
  clusterLayer.on('spiderfied', ()=>{ _spiderOpen=true; _interactAt=Date.now(); userMovedMap=true; });
  clusterLayer.on('unspiderfied', ()=>{ _spiderOpen=false;
    clearTimeout(mapObj._resumeT); mapObj._resumeT=setTimeout(()=>{ userMovedMap=false; },6000); });
  // Tapping a cluster is a deliberate interaction — pause auto-recenter so the
  // expand/zoom isn't yanked back.
  clusterLayer.on('clusterclick', ()=>{ if(followMode){ userMovedMap=true; clearTimeout(mapObj._resumeT);
    mapObj._resumeT=setTimeout(()=>{ userMovedMap=false; },6000); } });
  // If you manually drag/zoom while following, pause auto-recenter for a bit so
  // the map doesn't fight you. It resumes (snaps back to you) after a short idle.
  mapObj.on('movestart zoomstart',()=>{
    if(followMode && !_selfMove){
      userMovedMap=true;
      clearTimeout(mapObj._resumeT);
      mapObj._resumeT=setTimeout(()=>{ userMovedMap=false; },6000);
    }
  });
  // ---- LONG-PRESS TO DROP A PIN AT A NEW OFFICE ----
  // Press and hold anywhere on the map (~600ms) to drop a pin at that exact spot.
  // We grab the lat/lng immediately, then look up the street address in the
  // background (free OpenStreetMap Nominatim) and open Add Office pre-filled.
  // NOTE: we use NATIVE touch events on the map container, not Leaflet's mouse
  // events — on iOS Safari the mouse events don't fire reliably for touch, which
  // is why the earlier version did nothing (iOS just highlighted the +/- button).
  let _lpTimer=null, _lpStart=null;
  function cancelLongPress(){ if(_lpTimer){ clearTimeout(_lpTimer); _lpTimer=null; } _lpStart=null; }
  function ptToLatLng(clientX, clientY){
    const rect=mapObj.getContainer().getBoundingClientRect();
    const pt=L.point(clientX-rect.left, clientY-rect.top);
    return mapObj.containerPointToLatLng(pt);
  }
  function beginLP(clientX, clientY){
    cancelLongPress();
    _lpStart={x:clientX,y:clientY};
    const ll=ptToLatLng(clientX, clientY);
    _lpTimer=setTimeout(()=>{ _lpTimer=null; _lpStart=null; if(navigator.vibrate){try{navigator.vibrate(20);}catch(e){}} dropPinAt(ll); }, 500);
  }
  function moveLP(clientX, clientY){
    if(_lpStart){ const dx=Math.abs(clientX-_lpStart.x), dy=Math.abs(clientY-_lpStart.y); if(dx>10||dy>10) cancelLongPress(); }
  }
  const mapEl=mapObj.getContainer();
  // Touch (phones/tablets) — the primary path.
  mapEl.addEventListener('touchstart', (ev)=>{ if(ev.target&&ev.target.closest&&ev.target.closest('.leaflet-control,.leaflet-marker-icon,.leaflet-popup')) return; if(ev.touches&&ev.touches.length===1){ const t=ev.touches[0]; beginLP(t.clientX, t.clientY); } else { cancelLongPress(); } }, {passive:true});
  mapEl.addEventListener('touchmove', (ev)=>{ if(ev.touches&&ev.touches.length){ const t=ev.touches[0]; moveLP(t.clientX, t.clientY); } }, {passive:true});
  mapEl.addEventListener('touchend', cancelLongPress, {passive:true});
  mapEl.addEventListener('touchcancel', cancelLongPress, {passive:true});
  // Stop iOS from interpreting the long-press as text selection / callout menu,
  // which was sometimes highlighting text instead of dropping a pin.
  mapEl.addEventListener('contextmenu', (ev)=>{ ev.preventDefault(); });
  // Mouse (desktop) — secondary fallback.
  mapEl.addEventListener('mousedown', (ev)=>{ if(ev.button) return; if(ev.target&&ev.target.closest&&ev.target.closest('.leaflet-control,.leaflet-marker-icon,.leaflet-popup')) return; beginLP(ev.clientX, ev.clientY); });
  mapEl.addEventListener('mousemove', (ev)=>{ moveLP(ev.clientX, ev.clientY); });
  mapEl.addEventListener('mouseup', cancelLongPress);
  // Any Leaflet pan/zoom also cancels a pending drop.
  mapObj.on('dragstart zoomstart movestart', cancelLongPress);
  mapBuilt=true;
}
// Reverse-geocode a point to a street address via OpenStreetMap Nominatim (free,
// no key). Returns {addr,city,zip} or {} on any failure — the pin still works
// even if the lookup fails, since lat/lng are captured regardless.
async function reverseGeocode(lat, lng){
  try{
    const url="https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat="+encodeURIComponent(lat)+"&lon="+encodeURIComponent(lng)+"&zoom=18&addressdetails=1";
    const res=await fetch(url,{headers:{"Accept":"application/json"}});
    if(!res.ok) return {};
    const d=await res.json(); const a=d&&d.address?d.address:{};
    const house=a.house_number||""; const road=a.road||"";
    const addr=(house?house+" ":"")+road;
    const city=a.city||a.town||a.village||a.hamlet||a.suburb||a.county||"";
    const zip=a.postcode||"";
    return {addr:addr.trim(), city:city, zip:zip};
  }catch(e){ return {}; }
}
let _dropMarker=null;
let _previewTimer=null, _previewSeq=0;
// Debounce: only look up after the pin pauses ~350ms, to respect the geocoder's
// rate limit while still feeling live as you drag.
function schedulePreview(lat,lng){
  setDropMsg("Finding address…");
  if(_previewTimer) clearTimeout(_previewTimer);
  _previewTimer=setTimeout(()=>{ livePreviewAddr(lat,lng); }, 350);
}
function setDropMsg(txt){
  if(_dropConfirmEl){ const m=_dropConfirmEl.querySelector('.dc-msg'); if(m) m.textContent=txt; }
}
async function livePreviewAddr(lat,lng){
  const seq=++_previewSeq;   // ignore out-of-order responses from earlier positions
  try{
    const info=await reverseGeocode(lat,lng);
    if(seq!==_previewSeq) return;   // a newer drag superseded this lookup
    const addr=(info&&info.addr)?info.addr:"";
    const city=(info&&info.city)?info.city:"";
    if(addr){ setDropMsg("📍 "+addr+(city?(", "+city):"")); }
    else { setDropMsg("No address here — try nearer the street"); }
  }catch(e){ if(seq===_previewSeq) setDropMsg("Drag the pin onto the exact spot"); }
}
function dropPinAt(latlng){
  let lat=+latlng.lat.toFixed(6), lng=+latlng.lng.toFixed(6);
  // Drop a DRAGGABLE pin so the rep can nudge it exactly onto the building before
  // confirming. We don't geocode or open the form until they tap "Use this spot".
  try{ if(_dropMarker) mapObj.removeLayer(_dropMarker); }catch(e){}
  try{
    _dropMarker=L.marker([lat,lng],{draggable:true,autoPan:true}).addTo(mapObj);
    _dropMarker.on('dragend',()=>{ const p=_dropMarker.getLatLng(); lat=+p.lat.toFixed(6); lng=+p.lng.toFixed(6); livePreviewAddr(lat,lng); });
    // Live address preview: as the pin is dragged, debounce-lookup the address at the
    // current spot and show it in the confirm bar, so the rep can stop where it resolves.
    _dropMarker.on('drag',()=>{ const p=_dropMarker.getLatLng(); schedulePreview(+p.lat.toFixed(6),+p.lng.toFixed(6)); });
    // Initial preview at the drop point.
    livePreviewAddr(lat,lng);
  }catch(e){}
  if(navigator.vibrate){ try{navigator.vibrate(15);}catch(e){} }
  // Confirmation bar: drag to fine-tune, then confirm or cancel.
  showDropConfirm(
    ()=>{   // CONFIRM
      const p=_dropMarker?_dropMarker.getLatLng():{lat,lng};
      const flat=+p.lat.toFixed(6), flng=+p.lng.toFixed(6);
      toast("📍 Looking up address…");
      reverseGeocode(flat,flng).then(info=>{
        openForm(null, {lat:flat, lng:flng, addr:info.addr||"", city:info.city||"", zip:info.zip||""});
        if(info.addr||info.city){ toast("Address found — check & name the office"); }
        else { toast("Couldn't find an address — pin saved, type the rest"); }
        try{ if(_dropMarker){ mapObj.removeLayer(_dropMarker); _dropMarker=null; } }catch(e){}
      });
    },
    ()=>{   // CANCEL
      try{ if(_dropMarker){ mapObj.removeLayer(_dropMarker); _dropMarker=null; } }catch(e){}
    }
  );
}

function makeMarker(o){

// ---- LIVE ROUTE PROGRESS ----
const ROUTE_KEY="ildental_route";
function saveRoute(){
  try{
    if(activeRoute&&activeRoute.active) localStorage.setItem(ROUTE_KEY,JSON.stringify(activeRoute));
    else localStorage.removeItem(ROUTE_KEY);
  }catch(e){}
}
function loadRoute(){
  try{
    const r=localStorage.getItem(ROUTE_KEY);
    if(r){ const a=JSON.parse(r);
      if(a&&Array.isArray(a.stops)&&Array.isArray(a.done)&&a.active){ activeRoute=a; } }
  }catch(e){ activeRoute=null; }
}
// Start tracking a generated route. stops = office objects in planned order.
function startLiveRoute(stops){
  const ids=(stops||[]).map(o=>o.id).filter(Boolean);
  if(ids.length<2){ activeRoute=null; saveRoute(); renderRouteBar(); return; }
  activeRoute={stops:ids, done:[], active:true};
  saveRoute(); renderRouteBar();
}
function endLiveRoute(){ activeRoute=null; saveRoute(); renderRouteBar(); }
// Remaining stops = planned order minus done, in order.
function routeRemaining(){
  if(!activeRoute) return [];
  return activeRoute.stops.filter(id=>activeRoute.done.indexOf(id)<0);
}
// Called whenever a visit is logged. If the logged office is on the route, mark it
// done. If the rep logged a LATER stop while earlier ones are still pending, those
// skipped earlier stops move to the END of the remaining order (deferred, not lost).
function routeCheckoff(officeId){
  if(!activeRoute||!activeRoute.active) return;
  const stops=activeRoute.stops, done=activeRoute.done;
  const idx=stops.indexOf(officeId);
  if(idx<0) return;                 // logged office isn't part of this route
  if(done.indexOf(officeId)>=0){ renderRouteBar(); return; }
  // Find earlier, still-pending stops (skipped) and move them after the rest.
  const remainingBefore=routeRemaining();
  const pos=remainingBefore.indexOf(officeId);
  if(pos>0){
    const skipped=remainingBefore.slice(0,pos);           // earlier, not yet done
    const after=remainingBefore.slice(pos+1);             // later than the one just logged
    // New planned tail: [just-logged removed via done], keep 'after' then skipped at end.
    const doneSet=done.concat([officeId]);
    const newOrder=doneSet.concat(after, skipped);
    activeRoute.stops=newOrder.slice();
    activeRoute.done=doneSet;
  } else {
    activeRoute.done=done.concat([officeId]);
  }
  if(routeRemaining().length===0){ toast("Route complete ✓"); activeRoute.active=false; }
  saveRoute();
  renderRouteBar();
}
function renderRouteBar(){

// Ask OpenRouteService to reorder stops by real DRIVING distance (TSP optimization).
// `stops` are office objects; `startLat/Lng` is the rep's start (null in anchor mode,
// where the anchor itself is already stops[0] and must stay first). Returns a new
// ordered array, or null on any failure (caller keeps the straight-line order).
function optimizeOrderORS(stops, startLat, startLng, anchorMode){
  return new Promise((resolve)=>{
    try{
      if(!ORS_KEY || !stops || stops.length<3){ resolve(null); return; }
      // In anchor mode the first stop is fixed; optimize the rest from there.
      const fixed = anchorMode ? stops[0] : null;
      const toOpt = anchorMode ? stops.slice(1) : stops.slice();
      if(toOpt.length<2){ resolve(null); return; }
      const startLngLat = anchorMode ? [ +fixed.lng, +fixed.lat ]
                        : (startLat!=null ? [ +startLng, +startLat ] : [ +toOpt[0].lng, +toOpt[0].lat ]);
      const jobs = toOpt.map((o,i)=>({id:i+1, location:[+o.lng, +o.lat]}));
      const vehicles = [{id:1, profile:"driving-car", start:startLngLat, end:startLngLat}];
      fetch("https://api.openrouteservice.org/optimization",{
        method:"POST",
        headers:{"Authorization":ORS_KEY,"Content-Type":"application/json"},
        body:JSON.stringify({jobs, vehicles})
      }).then(r=>r.ok?r.json():Promise.reject(r.status)).then(res=>{
        const steps=res&&res.routes&&res.routes[0]&&res.routes[0].steps;
        if(!steps){ resolve(null); return; }
        const order=steps.filter(s=>s.type==="job").map(s=>toOpt[s.id-1]).filter(Boolean);
        if(order.length!==toOpt.length){ resolve(null); return; }
        resolve(anchorMode ? [fixed].concat(order) : order);
      }).catch(()=>resolve(null));
    }catch(e){ resolve(null); }
  });
}
// Draw the planned route on the map: numbered pins in order + a line. The line
// follows actual ROADS via OpenRouteService when a key is set; if the service is
// unreachable or no key, it falls back to a straight line so it never breaks.
function _drawRouteBase(coordsLatLng, ordered){
  routeLayer=L.layerGroup();
  L.polyline(coordsLatLng,{color:'#0e6a73',weight:9,opacity:.55,lineCap:'round',lineJoin:'round'}).addTo(routeLayer); // casing
  L.polyline(coordsLatLng,{color:'#23bfcd',weight:5,opacity:.95,lineCap:'round',lineJoin:'round'}).addTo(routeLayer); // main
  ordered.forEach((o,i)=>{
    const first=(i===0);
    const icon=L.divIcon({className:'',html:`<div class="routepin${first?' first':''}">${i+1}</div>`,iconSize:first?[32,32]:[26,26],iconAnchor:first?[16,16]:[13,13],popupAnchor:[0,-14]});
    const m=L.marker([+o.lat,+o.lng],{icon,zIndexOffset:first?2000:1500});
    m.bindPopup(()=>popupHTML(o),{minWidth:230,maxWidth:260,autoPan:true,keepInView:true,autoPanPadding:L.point(24,90)});
    m.on('popupopen', function(){ try{ centerOnMarker(m); }catch(e){} });
    m._oid=o.id; m.addTo(routeLayer);
  });
  routeLayer.addTo(mapObj);
  const cb=document.getElementById('clearRoute'); if(cb) cb.style.display='block';
  try{ mapObj.fitBounds(L.latLngBounds(coordsLatLng),{padding:[60,60],maxZoom:15}); }catch(e){}
}
function drawRouteOverlay(ordered, startLat, startLng){
  if(!mapObj) return;
  clearRouteOverlay();
  const pts=(ordered||[]).filter(o=>o&&o.lat&&o.lng);
  if(!pts.length) return;
  // straight-line waypoints (used directly as fallback, and as the marker order)
  const straight=pts.map(o=>[+o.lat,+o.lng]);
  if(startLat!=null && startLng!=null) straight.unshift([+startLat,+startLng]);
  // Build ORS waypoints as [lng,lat]
  const orsCoords=straight.map(c=>[c[1],c[0]]);
  // Try road-following first; fall back to straight line on any failure.
  if(ORS_KEY && orsCoords.length>=2 && orsCoords.length<=50){
    const body=JSON.stringify({coordinates:orsCoords});
    fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson",{
      method:"POST",
      headers:{"Authorization":ORS_KEY,"Content-Type":"application/json"},
      body
    }).then(r=>r.ok?r.json():Promise.reject(r.status)).then(geo=>{
      const line=geo&&geo.features&&geo.features[0]&&geo.features[0].geometry&&geo.features[0].geometry.coordinates;
      if(line&&line.length){ _drawRouteBase(line.map(c=>[c[1],c[0]]), pts); }
      else { _drawRouteBase(straight, pts); }
