/* ---------- filtering ---------- */
function isMine(o){
  const me=meName(); if(!me)return false;
  if((o.addedBy||"").toLowerCase()===me.toLowerCase())return true;
  return !!(o.visits&&o.visits.some(v=>(v.rep||"").toLowerCase()===me.toLowerCase()));
}
// Shared: do the three stackable priority groups pass for this office?
// They AND together; within Heat the selected colors OR together.
function groupsPass(o){
  if(state.gVisit==="visited"&&!isVisited(o))return false;
  if(state.gVisit==="unvisited"&&isVisited(o))return false;
  if(state.gVisit==="mine"&&!isMine(o))return false;
  if(state.gStatus==="active"&&o.active===false)return false;
  if(state.gStatus==="inactive"&&o.active!==false)return false;
  if(state.gHeat&&state.gHeat.length){ if(state.gHeat.indexOf(lastColor(o))<0)return false; }
  if(state.gLab&&state.gLab.length){
    if(!labDialPass(o))return false;   // state first — Lab filters never widen to the whole book
    const sts=labStatuses(o); if(!sts.some(s=>state.gLab.indexOf(s)>=0))return false;
  }
  return true;
}
// Secondary filters live in the "More" drawer (scanner/notes/added/dates).
// They are STACKABLE: every selected chip must pass (AND). The three date chips
// (Last 7 / Last 30 / Date range) are exclusive among themselves — picking one
// swaps out the others — but stack freely with scanner/notes/added and the rep
// chips, so "Rep: Ryan + Has scanner + Last 30 days" works as one query.
function secondaryPass(o){
  const fs=Array.isArray(state.filter)?state.filter:[];
  for(const f of fs){
    if(f==="scanner"&&!(o.scanner&&o.scanner!=="None"&&o.scanner!==""))return false;
    if(f==="notes"&&!stripLab(o.notes))return false;
    if(f==="custom"&&(o.seed||isImport(o)))return false;
    if(f==="d7"&&!(lastVisit(o)&&daysAgo(lastVisit(o))<=7))return false;
    if(f==="d30"&&!(lastVisit(o)&&daysAgo(lastVisit(o))<=30))return false;
    if(f==="drange"){ const lv=lastVisit(o); if(!lv)return false;
      if(state.dFrom&&lv<state.dFrom)return false; if(state.dTo&&lv>state.dTo)return false; }
  }

}
function repPass(o){
  const rf=Array.isArray(state.repFilter)?state.repFilter:[];
  if(!rf.length)return true;
  const names=rf.map(n=>String(n).replace(/\s+/g," ").toLowerCase().trim());

// Location-based territory gate with a border cushion. A non-admin rep sees offices
// in the state they're physically in (from GPS), PLUS any office within BORDER_MILES
// of their current position regardless of state line — so accounts near a border (or
// in a metro that straddles two states) stay visible when they cross.
const BORDER_MILES=30;

// assigned territory (or territories), else the GPS-detected state — and
// nothing else. Rep selection, visited chips, search, and date filters never
// change these numbers, so every rep in the same state sees the same five
// totals, matching the Lab Dashboard's Bridge tab for that state.
function labDialPass(o){
  const os=normStateName(o.state);
  const terr=territoryStates();
  if(terr.length) return !!os && terr.indexOf(os)>=0;
  const st=normStateName(currentGeoState);
  if(!st) return true;              // no territory and no GPS fix yet -> whole book
  return os===st;
}
function territoryPass(o){
  if(isAdmin&&isAdmin())return true;
  // Recognized states from the rep's Territory field ("Illinois", "IL", or a
  // comma-separated list all work). Empty when no territory is set OR the text
  // isn't a recognizable state — both fall back to the GPS behavior below.
  const terr=territoryStates();
  if(terr.length){
    // Territory is authoritative: every rep on the same territory sees the exact
    // same book (and the same status dials) no matter where they're standing.
    const os=normStateName(o.state);
    if(!os)return false;                        // unknown-state office: not in any state view
    return terr.indexOf(os)>=0;
  }
  // No usable territory → GPS mode: the state they're physically in, plus the
  // 30-mile cushion so border metros and road trips keep working.
  if(userPos && o.lat && o.lng){
    if(haversine(userPos.lat,userPos.lng,+o.lat,+o.lng)<=BORDER_MILES) return true;
  }
  const activeState=normStateName(currentGeoState);

  return os===activeState;
}

  if(!repPass(o))return false;

  return true;
}

// NOT the city tab or search text (the anchor office defines location).
function poolMatch(o){
  if(!groupsPass(o))return false;
  if(!secondaryPass(o))return false;
  if(!repPass(o))return false;
  return true;
}

  const placed=[];
  const isDup=(la,ln)=>placed.some(p=>feetBetween(p.lat,p.lng,la,ln)<60);
  while(pool.length){
    let bi=0, bd=Infinity;
    for(let i=0;i<pool.length;i++){ const d=haversine(cLat,cLng,pool[i].lat,pool[i].lng); if(d<bd){bd=d;bi=i;} }
    const next=pool.splice(bi,1)[0];
    if(isDup(next.lat,next.lng)){ continue; }   // skip a stop at an already-placed spot
    placed.push({lat:next.lat,lng:next.lng});
    out.push(next.o); cLat=next.lat; cLng=next.lng;
  }
  return out;
}
// Apple Maps multi-stop: daddr supports "to:" chained waypoints.
function routeAppleURL(ordered, startLat, startLng){
  if(!ordered.length) return "";
  const dests=ordered.map(o=>o.lat+","+o.lng);
  const daddr=dests.join("+to:");
  const saddr=(startLat!=null&&startLng!=null)?(startLat+","+startLng):"";
  return "https://maps.apple.com/?"+(saddr?("saddr="+encodeURIComponent(saddr)+"&"):"")+"daddr="+encodeURIComponent(daddr)+"&dirflg=d";
}
function buildMap(){
  if(mapBuilt) return;
  mapObj=L.map('map',{zoomControl:false,tap:true}).setView([41.85,-87.85],10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19, attribution:'© OpenStreetMap'
  }).addTo(mapObj);
  clusterLayer=L.markerClusterGroup({chunkedLoading:true,maxClusterRadius:50,spiderfyOnMaxZoom:true});
  mapObj.addLayer(clusterLayer);
  mapObj.on('popupopen', wirePopup);
  // While a popup is open OR a cluster is spiderfied (expanded), DON'T let a GPS
  // refresh rebuild/recenter the map — that was collapsing the cluster before you
  // could tap a pin. Track both states and pause refresh accordingly.
  mapObj.on('popupopen', ()=>{ _popupOpen=true; _interactAt=Date.now(); });
  mapObj.on('popupclose', ()=>{ _popupOpen=false; });
  clusterLayer.on('spiderfied', ()=>{ _spiderOpen=true; _interactAt=Date.now(); userMovedMap=true; });
  clusterLayer.on('unspiderfied', ()=>{ _spiderOpen=false;
    clearTimeout(mapObj._resumeT); mapObj._resumeT=setTimeout(()=>{ userMovedMap=false; },6000); });
  // Tapping a cluster is a deliberate interaction — pause auto-recenter so the
  // expand/zoom isn't yanked back.
  clusterLayer.on('clusterclick', ()=>{ if(followMode){ userMovedMap=true; clearTimeout(mapObj._resumeT);
    mapObj._resumeT=setTimeout(()=>{ userMovedMap=false; },6000); } });
  // If you manually drag/zoom while following, pause auto-recenter for a bit so
  // the map doesn't fight you. It resumes (snaps back to you) after a short idle.
  mapObj.on('movestart zoomstart',()=>{
    if(followMode && !_selfMove){
      userMovedMap=true;
      clearTimeout(mapObj._resumeT);
      mapObj._resumeT=setTimeout(()=>{ userMovedMap=false; },6000);
    }
  });
  // ---- LONG-PRESS TO DROP A PIN AT A NEW OFFICE ----
  // Press and hold anywhere on the map (~600ms) to drop a pin at that exact spot.
  // We grab the lat/lng immediately, then look up the street address in the
  // background (free OpenStreetMap Nominatim) and open Add Office pre-filled.
  // NOTE: we use NATIVE touch events on the map container, not Leaflet's mouse
  // events — on iOS Safari the mouse events don't fire reliably for touch, which
  // is why the earlier version did nothing (iOS just highlighted the +/- button).
  let _lpTimer=null, _lpStart=null;
  function cancelLongPress(){ if(_lpTimer){ clearTimeout(_lpTimer); _lpTimer=null; } _lpStart=null; }
  function ptToLatLng(clientX, clientY){
    const rect=mapObj.getContainer().getBoundingClientRect();
    const pt=L.point(clientX-rect.left, clientY-rect.top);
    return mapObj.containerPointToLatLng(pt);
  }
  function beginLP(clientX, clientY){
    cancelLongPress();
    _lpStart={x:clientX,y:clientY};
    const ll=ptToLatLng(clientX, clientY);
    _lpTimer=setTimeout(()=>{ _lpTimer=null; _lpStart=null; if(navigator.vibrate){try{navigator.vibrate(20);}catch(e){}} dropPinAt(ll); }, 500);
  }
  function moveLP(clientX, clientY){
    if(_lpStart){ const dx=Math.abs(clientX-_lpStart.x), dy=Math.abs(clientY-_lpStart.y); if(dx>10||dy>10) cancelLongPress(); }
  }
  const mapEl=mapObj.getContainer();
  // Touch (phones/tablets) — the primary path.
  mapEl.addEventListener('touchstart', (ev)=>{ if(ev.target&&ev.target.closest&&ev.target.closest('.leaflet-control,.leaflet-marker-icon,.leaflet-popup')) return; if(ev.touches&&ev.touches.length===1){ const t=ev.touches[0]; beginLP(t.clientX, t.clientY); } else { cancelLongPress(); } }, {passive:true});
  mapEl.addEventListener('touchmove', (ev)=>{ if(ev.touches&&ev.touches.length){ const t=ev.touches[0]; moveLP(t.clientX, t.clientY); } }, {passive:true});
  mapEl.addEventListener('touchend', cancelLongPress, {passive:true});
  mapEl.addEventListener('touchcancel', cancelLongPress, {passive:true});
  // Stop iOS from interpreting the long-press as text selection / callout menu,
  // which was sometimes highlighting text instead of dropping a pin.
  mapEl.addEventListener('contextmenu', (ev)=>{ ev.preventDefault(); });
  // Mouse (desktop) — secondary fallback.
  mapEl.addEventListener('mousedown', (ev)=>{ if(ev.button) return; if(ev.target&&ev.target.closest&&ev.target.closest('.leaflet-control,.leaflet-marker-icon,.leaflet-popup')) return; beginLP(ev.clientX, ev.clientY); });
  mapEl.addEventListener('mousemove', (ev)=>{ moveLP(ev.clientX, ev.clientY); });
  mapEl.addEventListener('mouseup', cancelLongPress);
  // Any Leaflet pan/zoom also cancels a pending drop.
  mapObj.on('dragstart zoomstart movestart', cancelLongPress);
  mapBuilt=true;
}
// Reverse-geocode a point to a street address via OpenStreetMap Nominatim (free,
// no key). Returns {addr,city,zip} or {} on any failure — the pin still works
// even if the lookup fails, since lat/lng are captured regardless.
async function reverseGeocode(lat, lng){
  try{
    const url="https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat="+encodeURIComponent(lat)+"&lon="+encodeURIComponent(lng)+"&zoom=18&addressdetails=1";
    const res=await fetch(url,{headers:{"Accept":"application/json"}});
    if(!res.ok) return {};
    const d=await res.json(); const a=d&&d.address?d.address:{};
    const house=a.house_number||""; const road=a.road||"";
    const addr=(house?house+" ":"")+road;
    const city=a.city||a.town||a.village||a.hamlet||a.suburb||a.county||"";
    const zip=a.postcode||"";
    return {addr:addr.trim(), city:city, zip:zip};
  }catch(e){ return {}; }
}
let _dropMarker=null;
let _previewTimer=null, _previewSeq=0;
// Debounce: only look up after the pin pauses ~350ms, to respect the geocoder's
// rate limit while still feeling live as you drag.
function schedulePreview(lat,lng){
  setDropMsg("Finding address…");
  if(_previewTimer) clearTimeout(_previewTimer);
  _previewTimer=setTimeout(()=>{ livePreviewAddr(lat,lng); }, 350);
}
function setDropMsg(txt){
  if(_dropConfirmEl){ const m=_dropConfirmEl.querySelector('.dc-msg'); if(m) m.textContent=txt; }
}
async function livePreviewAddr(lat,lng){
  const seq=++_previewSeq;   // ignore out-of-order responses from earlier positions
  try{
    const info=await reverseGeocode(lat,lng);
    if(seq!==_previewSeq) return;   // a newer drag superseded this lookup
    const addr=(info&&info.addr)?info.addr:"";
    const city=(info&&info.city)?info.city:"";
    if(addr){ setDropMsg("📍 "+addr+(city?(", "+city):"")); }
    else { setDropMsg("No address here — try nearer the street"); }
  }catch(e){ if(seq===_previewSeq) setDropMsg("Drag the pin onto the exact spot"); }
}
function dropPinAt(latlng){
  let lat=+latlng.lat.toFixed(6), lng=+latlng.lng.toFixed(6);
  // Drop a DRAGGABLE pin so the rep can nudge it exactly onto the building before
  // confirming. We don't geocode or open the form until they tap "Use this spot".
  try{ if(_dropMarker) mapObj.removeLayer(_dropMarker); }catch(e){}
  try{
    _dropMarker=L.marker([lat,lng],{draggable:true,autoPan:true}).addTo(mapObj);
    _dropMarker.on('dragend',()=>{ const p=_dropMarker.getLatLng(); lat=+p.lat.toFixed(6); lng=+p.lng.toFixed(6); livePreviewAddr(lat,lng); });
    // Live address preview: as the pin is dragged, debounce-lookup the address at the
    // current spot and show it in the confirm bar, so the rep can stop where it resolves.
    _dropMarker.on('drag',()=>{ const p=_dropMarker.getLatLng(); schedulePreview(+p.lat.toFixed(6),+p.lng.toFixed(6)); });
    // Initial preview at the drop point.
    livePreviewAddr(lat,lng);
  }catch(e){}
  if(navigator.vibrate){ try{navigator.vibrate(15);}catch(e){} }
  // Confirmation bar: drag to fine-tune, then confirm or cancel.
  showDropConfirm(
    ()=>{   // CONFIRM
      const p=_dropMarker?_dropMarker.getLatLng():{lat,lng};
      const flat=+p.lat.toFixed(6), flng=+p.lng.toFixed(6);
      toast("📍 Looking up address…");
      reverseGeocode(flat,flng).then(info=>{
        openForm(null, {lat:flat, lng:flng, addr:info.addr||"", city:info.city||"", zip:info.zip||""});
        if(info.addr||info.city){ toast("Address found — check & name the office"); }
        else { toast("Couldn't find an address — pin saved, type the rest"); }
        try{ if(_dropMarker){ mapObj.removeLayer(_dropMarker); _dropMarker=null; } }catch(e){}
      });
    },
    ()=>{   // CANCEL
      try{ if(_dropMarker){ mapObj.removeLayer(_dropMarker); _dropMarker=null; } }catch(e){}
    }
  );
}

// ---- LIVE ROUTE PROGRESS ----
const ROUTE_KEY="ildental_route";
function saveRoute(){
  try{
    if(activeRoute&&activeRoute.active) localStorage.setItem(ROUTE_KEY,JSON.stringify(activeRoute));
    else localStorage.removeItem(ROUTE_KEY);
  }catch(e){}
}
function loadRoute(){
  try{
    const r=localStorage.getItem(ROUTE_KEY);
    if(r){ const a=JSON.parse(r);
      if(a&&Array.isArray(a.stops)&&Array.isArray(a.done)&&a.active){ activeRoute=a; } }
  }catch(e){ activeRoute=null; }
}
// Start tracking a generated route. stops = office objects in planned order.
function startLiveRoute(stops){
  const ids=(stops||[]).map(o=>o.id).filter(Boolean);
  if(ids.length<2){ activeRoute=null; saveRoute(); renderRouteBar(); return; }
  activeRoute={stops:ids, done:[], active:true};
  saveRoute(); renderRouteBar();
}
function endLiveRoute(){ activeRoute=null; saveRoute(); renderRouteBar(); }
// Remaining stops = planned order minus done, in order.
function routeRemaining(){
  if(!activeRoute) return [];
  return activeRoute.stops.filter(id=>activeRoute.done.indexOf(id)<0);
}
// Called whenever a visit is logged. If the logged office is on the route, mark it
// done. If the rep logged a LATER stop while earlier ones are still pending, those
// skipped earlier stops move to the END of the remaining order (deferred, not lost).
function routeCheckoff(officeId){
  if(!activeRoute||!activeRoute.active) return;
  const stops=activeRoute.stops, done=activeRoute.done;
  const idx=stops.indexOf(officeId);
  if(idx<0) return;                 // logged office isn't part of this route
  if(done.indexOf(officeId)>=0){ renderRouteBar(); return; }
  // Find earlier, still-pending stops (skipped) and move them after the rest.
  const remainingBefore=routeRemaining();
  const pos=remainingBefore.indexOf(officeId);
  if(pos>0){
    const skipped=remainingBefore.slice(0,pos);           // earlier, not yet done
    const after=remainingBefore.slice(pos+1);             // later than the one just logged
    // New planned tail: [just-logged removed via done], keep 'after' then skipped at end.
    const doneSet=done.concat([officeId]);
    const newOrder=doneSet.concat(after, skipped);
    activeRoute.stops=newOrder.slice();
    activeRoute.done=doneSet;
  } else {
    activeRoute.done=done.concat([officeId]);
  }
  if(routeRemaining().length===0){ toast("Route complete ✓"); activeRoute.active=false; }
  saveRoute();
  renderRouteBar();
}
function renderRouteBar(){

// Ask OpenRouteService to reorder stops by real DRIVING distance (TSP optimization).
// `stops` are office objects; `startLat/Lng` is the rep's start (null in anchor mode,
// where the anchor itself is already stops[0] and must stay first). Returns a new
// ordered array, or null on any failure (caller keeps the straight-line order).
function optimizeOrderORS(stops, startLat, startLng, anchorMode){
  return new Promise((resolve)=>{
    try{
      if(!ORS_KEY || !stops || stops.length<3){ resolve(null); return; }
      // In anchor mode the first stop is fixed; optimize the rest from there.
      const fixed = anchorMode ? stops[0] : null;
      const toOpt = anchorMode ? stops.slice(1) : stops.slice();
      if(toOpt.length<2){ resolve(null); return; }
      const startLngLat = anchorMode ? [ +fixed.lng, +fixed.lat ]
                        : (startLat!=null ? [ +startLng, +startLat ] : [ +toOpt[0].lng, +toOpt[0].lat ]);
      const jobs = toOpt.map((o,i)=>({id:i+1, location:[+o.lng, +o.lat]}));
      const vehicles = [{id:1, profile:"driving-car", start:startLngLat, end:startLngLat}];
      fetch("https://api.openrouteservice.org/optimization",{
        method:"POST",
        headers:{"Authorization":ORS_KEY,"Content-Type":"application/json"},
        body:JSON.stringify({jobs, vehicles})
      }).then(r=>r.ok?r.json():Promise.reject(r.status)).then(res=>{
        const steps=res&&res.routes&&res.routes[0]&&res.routes[0].steps;
        if(!steps){ resolve(null); return; }
        const order=steps.filter(s=>s.type==="job").map(s=>toOpt[s.id-1]).filter(Boolean);
        if(order.length!==toOpt.length){ resolve(null); return; }
        resolve(anchorMode ? [fixed].concat(order) : order);
      }).catch(()=>resolve(null));
    }catch(e){ resolve(null); }
  });
}
// Draw the planned route on the map: numbered pins in order + a line. The line
// follows actual ROADS via OpenRouteService when a key is set; if the service is
// unreachable or no key, it falls back to a straight line so it never breaks.
function _drawRouteBase(coordsLatLng, ordered){
  routeLayer=L.layerGroup();
  L.polyline(coordsLatLng,{color:'#0e6a73',weight:9,opacity:.55,lineCap:'round',lineJoin:'round'}).addTo(routeLayer); // casing
  L.polyline(coordsLatLng,{color:'#23bfcd',weight:5,opacity:.95,lineCap:'round',lineJoin:'round'}).addTo(routeLayer); // main
  ordered.forEach((o,i)=>{
    const first=(i===0);
    const icon=L.divIcon({className:'',html:`<div class="routepin${first?' first':''}">${i+1}</div>`,iconSize:first?[32,32]:[26,26],iconAnchor:first?[16,16]:[13,13],popupAnchor:[0,-14]});
    const m=L.marker([+o.lat,+o.lng],{icon,zIndexOffset:first?2000:1500});
    m.bindPopup(()=>popupHTML(o),{minWidth:230,maxWidth:260}); m._oid=o.id; m.addTo(routeLayer);
  });
  routeLayer.addTo(mapObj);
  const cb=document.getElementById('clearRoute'); if(cb) cb.style.display='block';
  try{ mapObj.fitBounds(L.latLngBounds(coordsLatLng),{padding:[60,60],maxZoom:15}); }catch(e){}
}
function drawRouteOverlay(ordered, startLat, startLng){
  if(!mapObj) return;
  clearRouteOverlay();
  const pts=(ordered||[]).filter(o=>o&&o.lat&&o.lng);
  if(!pts.length) return;
  // straight-line waypoints (used directly as fallback, and as the marker order)
  const straight=pts.map(o=>[+o.lat,+o.lng]);
  if(startLat!=null && startLng!=null) straight.unshift([+startLat,+startLng]);
  // Build ORS waypoints as [lng,lat]
  const orsCoords=straight.map(c=>[c[1],c[0]]);
  // Try road-following first; fall back to straight line on any failure.
  if(ORS_KEY && orsCoords.length>=2 && orsCoords.length<=50){
    const body=JSON.stringify({coordinates:orsCoords});
    fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson",{
      method:"POST",
      headers:{"Authorization":ORS_KEY,"Content-Type":"application/json"},
      body
    }).then(r=>r.ok?r.json():Promise.reject(r.status)).then(geo=>{
      const line=geo&&geo.features&&geo.features[0]&&geo.features[0].geometry&&geo.features[0].geometry.coordinates;
      if(line&&line.length){ _drawRouteBase(line.map(c=>[c[1],c[0]]), pts); }
      else { _drawRouteBase(straight, pts); }
    }).catch(()=>{ _drawRouteBase(straight, pts); });  // network/quota/key issue -> straight line
  } else {
    _drawRouteBase(straight, pts);
  }
}
// Inline onclick inside a Leaflet popup is unreliable, so bind real listeners on popupopen.

// Set an onboarding flag (starterKit / welcomeEmail) on an office and save. Used by

function setOnboarding(id, field, on){

  if(id[0]==="s"){
    const idx=parseInt(id.slice(1),10);
    const o=officeById(id)||{};
    // Base on a full copy of the office's current fields (existing override merged in),
    // so toggling a flag never drops notes, visits, or other onboarding flags.
    const existing=store.over[idx]||{};
    const base={name:o.name,addr:o.addr,city:o.city,zip:o.zip,lat:o.lat,lng:o.lng,

    const patch={}; patch[field]=val;

function refreshMap(filtered){
  buildMap();
  // FOLLOW MODE: if a popup is open or a cluster is expanded, a GPS refresh must
  // NOT rebuild the markers (that collapses what you're tapping). Just keep the
  // blue dot current and bail. Safety net: if a flag has been "open" for over 60s
  // (a close event was somehow missed), treat it as stale so the map can't freeze.
  if(followMode && (_popupOpen || _spiderOpen)){
    if(Date.now()-_interactAt > 60000){ _popupOpen=false; _spiderOpen=false; }
    else { drawUser(); return; }
  }
  // Recalculate the map's size reliably. A single fixed 60ms timeout can fire
  // BEFORE mobile Safari finishes laying out the (previously display:none) map
  // container, so Leaflet measures the wrong size and tiles render grey/blank
  // until a manual refresh. Instead invalidate on the next animation frame
  // (layout settled) and again on short backstops to cover slow layouts.
  const fixSize=()=>{ if(mapObj){ try{ mapObj.invalidateSize(false); }catch(e){} } };
  requestAnimationFrame(()=>{ fixSize(); requestAnimationFrame(fixSize); });
  setTimeout(fixSize,120); setTimeout(fixSize,350);
  // Older / slower phones can finish laying out the map container well after the
  // short backstops above, leaving Leaflet measured at the wrong size (tiles show
  // at the wrong zoom / off-center until a manual nudge). Add late backstops so
  // the map re-fits once the device catches up.
  setTimeout(fixSize,700); setTimeout(fixSize,1200); setTimeout(fixSize,2000);
  let pts=filtered.filter(o=>o.lat&&o.lng);

  // ---- FOLLOW (driving) MODE -------------------------------------------------
  // Show only offices within FOLLOW_RADIUS_FT of you, and DO NOT fitBounds — we
  // keep whatever zoom/position you (or the first lock) set, so logging a visit
  // or a background sync never throws you back to a zoomed-out view.
  if(followMode && userPos){
    const radMi=FOLLOW_RADIUS_FT/5280;
    // distance-tag each in-range office so we can find the nearest for the banner
    const tagged=pts.map(o=>({o,d:haversine(userPos.lat,userPos.lng,o.lat,o.lng)}))
                    .filter(x=>x.d<=radMi).sort((a,b)=>a.d-b.d);
    pts=tagged.map(x=>x.o);
    document.getElementById('mapcount').textContent =
      `${pts.length} within ${fmtRadius(FOLLOW_RADIUS_FT)}`;
    updateProxBanner(tagged);   // live "N nearby · nearest: Name" readout
    // Only rebuild the markers when the visible SET actually changed. A GPS
    // heartbeat that returns the same offices must not clear+re-add layers — that
    // flicker is what was collapsing clusters and dropping taps.
    const key=pts.map(o=>o.id).sort().join(",");
    if(key!==_lastFollowKey){
      clusterLayer.clearLayers();
      _popupOpen=false; _spiderOpen=false;   // clearing removes any open popup/spider
      clusterLayer.addLayers(pts.map(makeMarker));
      _lastFollowKey=key;
    }
    // Recenter on you ONLY if you haven't manually panned away. Never change zoom
    // here — hold the user's current zoom so the view stays where they left it.
    if(!userMovedMap && !_popupOpen && !_spiderOpen){
      _selfMove=true;
      try{ mapObj.setView([userPos.lat,userPos.lng], mapObj.getZoom(), {animate:false}); }catch(e){}
      _selfMove=false;
    }
    drawUser();
    return;
  }

  // ---- NEARBY MODE (legacy "Nearest 25") ------------------------------------
  // Not following: always rebuild from scratch (and reset the follow signature).
  clusterLayer.clearLayers();
  _popupOpen=false; _spiderOpen=false;   // no popup/spider survives a full clear
  _lastFollowKey="";
  if(nearbyMode && userPos){
    pts=pts.map(o=>({o,d:haversine(userPos.lat,userPos.lng,o.lat,o.lng)}))
           .sort((a,b)=>a.d-b.d).slice(0,NEARBY_N).map(x=>x.o);
  }
  document.getElementById('mapcount').textContent =
    (nearbyMode&&userPos ? `${pts.length} nearest` : `${pts.length.toLocaleString()} offices`);
  const markers=pts.map(makeMarker);
  clusterLayer.addLayers(markers);
  // fit bounds (only when NOT following — following holds the view)
  if(nearbyMode && userPos && pts.length){
    const b=L.latLngBounds(pts.map(o=>[o.lat,o.lng])); b.extend([userPos.lat,userPos.lng]);
    try{ mapObj.fitBounds(b.pad(0.12),{maxZoom:15}); }catch(e){}
  } else if(pts.length){
    // Default (not-following) view priority:
    //   1. a ~5-mile window around the user's position (their working area)
    //   2. the pins in their state (GPS state, else assigned territory)
    //   3. otherwise leave the map where it is — never yank out to a
    //      whole-country fit now that offices exist in many states.
    if(userPos){
      try{ mapObj.fitBounds(L.latLng(userPos.lat,userPos.lng).toBounds(8047)); }catch(e){}
    } else {
      const stv=String(currentGeoState||repTerritory()||"").toLowerCase().trim();
      const inSt=stv?pts.filter(o=>String(o.state||"").toLowerCase().trim()===stv):[];
      if(inSt.length){ try{ mapObj.fitBounds(L.latLngBounds(inSt.map(o=>[o.lat,o.lng])).pad(0.05),{maxZoom:13}); }catch(e){} }
    }
  }
  drawUser();
}
// Pretty-print the radius for the map label. Show feet up to 1000 ft, then miles
// (so the 0.4 mi and 0.5 mi steps read as miles, not "2640 ft").
function fmtRadius(ft){
  if(ft<=1000) return ft+" ft";
  const mi=ft/5280;
  return (Math.abs(mi-Math.round(mi))<1e-9 ? Math.round(mi) : mi.toFixed(1))+" mi";
}
// Distance in feet for the banner readout.
function feetBetween(lat1,lng1,lat2,lng2){ return Math.round(haversine(lat1,lng1,lat2,lng2)*5280); }

  return `<button class="pr-row" data-proxid="${esc(o.id)}">`+
    `${dot}<span class="pr-nm">${esc(o.name||'(unnamed office)')}</span>`+
    `<span class="pr-ft">${ftDist.toLocaleString()} ft</span></button>`;
}
function renderProxList(){

}
function updateProxBanner(tagged){

    _proxOpen=false; _proxFrozen=null; return;

  // rebuild the banner DOM (that would drop a tap on a row, same class of bug as
  // the date picker). Just patch the header's live distance in place and return.

    const nearest=_proxFrozen[0].o;
    const ft=userPos?feetBetween(userPos.lat,userPos.lng,nearest.lat,nearest.lng):0;
    _proxNearestId=nearest.id;
    const ftEl=bn.querySelector('.pbd b'); if(ftEl) ftEl.textContent=ft.toLocaleString()+" ft";
    return;
  }

  const live = _proxOpen && _proxFrozen ? _proxFrozen : tagged;
  const n=live.length;

  const ft=userPos?feetBetween(userPos.lat,userPos.lng,nearest.lat,nearest.lng):0;
  _proxNearestId=nearest.id;

    ? `<div class="pb-more">${_proxOpen?'▲ show less':'+'+(n-1)+' more offices'}</div>`
    : "";

    `<div class="pb-head" id="pbHead">`+
      `<div class="pb-row">`+
        `<span class="pbi"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--teal-deep)" stroke-width="2.2"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 1118 0z"/><circle cx="12" cy="10" r="3"/></svg></span>`+
        `<span class="pbt"><div class="pbn">${esc(nearest.name||'(unnamed office)')}</div>`+
        `<div class="pbd"><b>${ft.toLocaleString()} ft</b> · ${n} within ${fmtRadius(FOLLOW_RADIUS_FT)}</div></span>`+
      `</div>`+
      `${moreTxt}`+

function drawUser(){
  if(!userPos||!mapObj) return;
  if(userMarker){ userMarker.setLatLng([userPos.lat,userPos.lng]); }
  else{
    const ic=L.divIcon({className:'',html:'<div class="userdot"></div>',iconSize:[18,18],iconAnchor:[9,9]});
    userMarker=L.marker([userPos.lat,userPos.lng],{icon:ic,zIndexOffset:1000,interactive:false}).addTo(mapObj);

function locateMe(){
  // Tap the locate button toggles DRIVING/FOLLOW mode on and off.
  // Edge case (iOS Chrome): auto-start may have set followMode=true but the
  // automatic geolocation request was silently ignored, so no fix ever arrived
  // (userPos is null). In that case a tap should RESTART follow via this real
  // user gesture — not stop a mode that never actually engaged.
  if(followMode && userPos){ stopFollow(); toast("Stopped following"); return; }
  if(followMode && !userPos){ stopFollow(); }   // clear the half-started state, then start fresh below
  startFollow();
}
function startFollow(){
  if(!navigator.geolocation){ toast("Location not supported on this device"); return; }
  // iOS Safari blocks geolocation on insecure origins (file:// or http://).
  if(window.isSecureContext===false){ toast("Open the https:// site to use location"); return; }
  const btn=document.getElementById('locateBtn');
  btn.classList.add('locating');
  if(state.view!=="map") setView("map");
  followMode=true; nearbyMode=false; userMovedMap=false;
  btn.classList.add('following');
  showRadiusUI(true);
  const nb=document.getElementById('nearbyBtn'); if(nb) nb.classList.remove('show');
  try{ if(watchId!=null) navigator.geolocation.clearWatch(watchId); }catch(e){}
  let firstFix=true, lastFixAt=0;
  const apply=pos=>{
    btn.classList.remove('locating');
    lastFixAt=Date.now();
    userPos={lat:pos.coords.latitude,lng:pos.coords.longitude,acc:pos.coords.accuracy};
    // Keep the location-based office scoping in sync with where the rep actually is.
    try{ detectGeoState(userPos.lat,userPos.lng); }catch(e){}
    if(firstFix){
      firstFix=false; userMovedMap=false;
      // On the FIRST lock only, snap to a tight neighborhood zoom centered on you.
      _selfMove=true;
      try{ mapObj.setView([userPos.lat,userPos.lng], FOLLOW_ZOOM, {animate:false}); }catch(e){}
      _selfMove=false;
      toast("Following you — offices within "+fmtRadius(FOLLOW_RADIUS_FT));
    }
    drawUser();
    render(); // re-filter to the radius and recenter (no zoom change, no fitBounds)
  };
  const onErr=err=>{
    btn.classList.remove('locating');
    // Don't kill tracking on a transient timeout mid-drive; only bail on first fix.
    if(firstFix){
      let msg="Couldn't get your location";
      if(err.code===1) msg="Location blocked — allow it in Settings ▸ Safari";
      else if(err.code===2) msg="Location unavailable right now";
      else if(err.code===3) msg="Location timed out — try again";
      toast(msg); stopFollow();
    }
  };
  // Primary: continuous watch. maximumAge:0 forces a FRESH fix each time (no stale
  // cached position), so the dot actually moves as you drive.
  watchId=navigator.geolocation.watchPosition(apply,onErr,{enableHighAccuracy:true,timeout:15000,maximumAge:0});
  // Heartbeat backstop: iOS Safari sometimes throttles watchPosition and stops
  // firing even while moving. If no fresh fix in ~4s, actively request one.
  try{ if(followHeartbeat) clearInterval(followHeartbeat); }catch(e){}

    if(!followMode){ clearInterval(followHeartbeat); followHeartbeat=null; return; }
    if(Date.now()-lastFixAt>4000){

    }

}
function stopFollow(){
  followMode=false;
  try{ if(watchId!=null) navigator.geolocation.clearWatch(watchId); }catch(e){}
  watchId=null;
  try{ if(followHeartbeat) clearInterval(followHeartbeat); }catch(e){}
  followHeartbeat=null;
  const lb=document.getElementById('locateBtn'); if(lb){ lb.classList.remove('following'); lb.classList.remove('locating'); }
  showRadiusUI(false);
  const bn=document.getElementById('proxBanner'); if(bn){ bn.classList.remove('show'); bn.innerHTML=""; }
  _proxNearestId=null;
  render();
}

function changeRadius(dir){

// ---- CALENDAR VIEW: month grid of visits -----------------------------------
// Reps see their own visits. Admins see everyone, with a rep filter (All / name).
let _calYear=null, _calMonth=null, _calSelDay=null;
let _calRepFilter="__me__";  // "__me__" = current rep, "__all__" = everyone, else a rep name
const _MNAMES=["January","February","March","April","May","June","July","August","September","October","November","December"];
const _DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
// Resolve the rep a visit belongs to: its recorded rep, else the office's addedBy,
// else "" (unattributable).
function visitRep(o,v){
  const vr=String(v.rep||"").replace(/\s+/g," ").trim();
  if(vr) return vr;
  const ab=String(o.addedBy||"").trim();
  return ab;
}
// Build {dateStr -> [{o,v}]} honoring the active filter.
//  - non-admins: always just their own visits (filter ignored)
//  - admin "All": everyone; admin <name>: that rep only
function repVisitsByDate(){
  const admin=isAdmin();
  const me=meName().toLowerCase();
  let want=null;            // null = all; otherwise lowercase rep name to match
  if(!admin){ want=me; }    // reps locked to themselves
  else if(_calRepFilter==="__me__"){ want=me; }
  else if(_calRepFilter==="__all__"){ want=null; }
  else { want=String(_calRepFilter||"").toLowerCase(); }
  const map={};
  (DB||[]).forEach(o=>{
    if(!o.visits) return;
    o.visits.forEach(v=>{
      if(!v||!v.date) return;
      const rep=visitRep(o,v).toLowerCase();
      if(want!==null){ if(rep!==want) return; }   // specific rep
      (map[v.date]=map[v.date]||[]).push({o,v});
    });
  });
  return map;
}
function renderCalendar(){

  const daysInMonth=new Date(_calYear,_calMonth+1,0).getDate();

      `<span class="cal-dnum">${d}</span>`+

                `<option value="__all__"${_calRepFilter==="__all__"?' selected':''}>Everyone</option>`]
      .concat((REPS||[]).map(r=>{ const nm=String(r.name||""); return `<option value="${esc(nm)}"${_calRepFilter.toLowerCase()===nm.toLowerCase()?' selected':''}>${esc(nm)}</option>`; }));
    pickerHTML=`<div class="cal-pick-wrap"><select class="cal-pick" id="calRepPick">${opts.join('')}</select></div>`;
    whoLabel = _calRepFilter==="__all__" ? "Everyone" : (_calRepFilter==="__me__"?meName():_calRepFilter);
  }
  host.innerHTML=
    `<div class="cal-wrap">`+
      `<div class="cal-top">`+
        `<button class="cal-nav" id="calPrev" aria-label="Previous month">‹</button>`+
        `<div class="cal-title">${_MNAMES[_calMonth]} ${_calYear}</div>`+
        `<button class="cal-nav" id="calNext" aria-label="Next month">›</button>`+
      `</div>`+
      pickerHTML+
      `<div class="cal-sub">${esc(whoLabel)} · ${monthVisits} visit${monthVisits===1?'':'s'} on ${monthDays} day${monthDays===1?'':'s'}</div>`+
      `<div class="cal-grid cal-dowrow">${dowHead}</div>`+
      `<div class="cal-grid cal-days">${cells}</div>`+
      `<div class="cal-day-detail" id="calDayDetail"></div>`+
    `</div>`;

  document.getElementById('calNext').onclick=()=>{ _calMonth++; if(_calMonth>11){_calMonth=0;_calYear++;} _calSelDay=null; renderCalendar(); };
  const pick=document.getElementById('calRepPick');
  if(pick) pick.onchange=(e)=>{ _calRepFilter=e.target.value; _calSelDay=null; renderCalendar(); };

    _calSelDay = (_calSelDay===ds)?null:ds; renderCalendar(); }; });

}
function renderCalDayDetail(items, ds){
  const host=document.getElementById('calDayDetail'); if(!host) return;
  if(!items.length){ host.innerHTML=`<div class="cal-dd-empty">No visits logged on ${esc(fmtDate(ds))}.</div>`; return; }
  // Show the rep name on each row when viewing everyone or another rep (admin).
  const showRep = isAdmin() && _calRepFilter!=="__me__";
  const sorted=items.slice().sort((a,b)=>String(a.o.name||"").localeCompare(String(b.o.name||"")));
  const rows=sorted.map(({o,v})=>{
    const dot=v.color?`<span class="cal-dot" style="background:${VCOLORS[v.color]||'#ccc'}"></span>`:`<span class="cal-dot" style="background:var(--line-strong)"></span>`;
    const note=v.note?`<span class="cal-note">${esc(v.note)}</span>`:'';
    const lbl=v.color&&VLABEL[v.color]?`<span class="cal-vlabel">${esc(VLABEL[v.color])}</span>`:'';
    const who = showRep ? `<span class="cal-rep">${esc(visitRep(o,v)||'Unknown')}</span>` : '';
    return `<button class="cal-dd-row" data-oid="${esc(o.id)}">${dot}<span class="cal-dd-nm">${esc(o.name||'(unnamed office)')}</span>${who}${lbl}${note}</button>`;
  }).join('');
  host.innerHTML=`<div class="cal-dd-head">${esc(fmtDate(ds))} · ${items.length} visit${items.length===1?'':'s'}</div>${rows}`;
  host.querySelectorAll('[data-oid]').forEach(b=>{ b.onclick=()=>openDetail(b.getAttribute('data-oid')); });
}
function mapEmbed(o){
  if(o.lat&&o.lng) return `https://maps.google.com/maps?q=${o.lat},${o.lng}&z=16&output=embed`;
  return `https://maps.google.com/maps?q=${encodeURIComponent(o.name+' '+o.addr+' '+o.city+' IL '+o.zip)}&z=15&output=embed`;
}
function mapAppleLink(o){ return o.lat&&o.lng?`https://maps.apple.com/?q=${encodeURIComponent(o.name)}&ll=${o.lat},${o.lng}`:`https://maps.apple.com/?q=${encodeURIComponent(o.name+' '+o.addr+' '+o.city+' IL')}`; }
function mapGLink(o){ return o.lat&&o.lng?`https://www.google.com/maps/search/?api=1&query=${o.lat},${o.lng}`:`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(o.name+' '+o.addr+' '+o.city+' IL '+o.zip)}`; }

/* ---------- edit / add form ---------- */
function openForm(id, prefill){
  if(mapObj){try{mapObj.closePopup();}catch(e){}}
  const isNew=!id;
  const o=isNew?{name:"",addr:"",city:"",zip:"",lat:"",lng:"",phone:"",email:"",scanner:"",lab:"",drs:"",hours:"",visitDay:"",notes:"",starterKit:"",welcomeEmail:"",pricelist:"",visits:[]}:officeById(id);
  if(isNew && prefill){ if(prefill.lat!=null)o.lat=prefill.lat; if(prefill.lng!=null)o.lng=prefill.lng;
    if(prefill.addr)o.addr=prefill.addr; if(prefill.city)o.city=prefill.city; if(prefill.zip)o.zip=prefill.zip; }
  document.getElementById('sheetTitle').textContent=isNew?"Add Office":"Edit Office";
  document.getElementById('sheetBody').innerHTML=`
    <div class="fld"><label>Practice Name *</label><input id="f_name" value="${esc(o.name)}" placeholder="e.g. Smile Dental"></div>
    <div class="fld activefld"><label>Status</label>
      <button type="button" id="f_active" class="activetoggle ${o.active===false?'':'on'}" role="switch" aria-checked="${o.active===false?'false':'true'}">
        <span class="activeknob"></span><span class="activelabel">${o.active===false?'Inactive':'Active'}</span>
      </button>
    </div>
    <div class="fld"><label>Street Address</label><input id="f_addr" value="${esc(o.addr)}" placeholder="123 Main St"></div>
    <div class="row2"><div class="fld"><label>City *</label><input id="f_city" value="${esc(o.city)}" placeholder="Chicago"></div>
      <div class="fld"><label>ZIP</label><input id="f_zip" value="${esc(o.zip)}" inputmode="numeric" placeholder="60601"></div></div>
    <div class="fld"><label>Location (pin)</label>
      <div class="pinbox">
        <button type="button" class="btn btn-ghost pinbtn" id="f_pin">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 21s-6-5.5-6-10a6 6 0 1112 0c0 4.5-6 10-6 10z"/><circle cx="12" cy="11" r="2"/></svg>
          <span id="f_pinlabel">Drop pin at my location</span>
        </button>
        <div class="pinstatus" id="f_pinstatus">${(o.lat&&o.lng)?("📍 "+(+o.lat).toFixed(5)+", "+(+o.lng).toFixed(5)):"No pin set"}</div>
      </div>
      <div class="dictate-hint" style="display:block;">Tip: you can also press &amp; hold anywhere on the map to drop a pin there — it'll fill in the address automatically.</div>
      <div class="row2" style="margin-top:8px;">
        <div class="fld" style="margin-bottom:0;"><label>Latitude</label><input id="f_lat" value="${esc(String(o.lat||''))}" inputmode="decimal" placeholder="41.88"></div>
        <div class="fld" style="margin-bottom:0;"><label>Longitude</label><input id="f_lng" value="${esc(String(o.lng||''))}" inputmode="decimal" placeholder="-87.63"></div>
      </div>
    </div>
    <div class="fld"><label>Phone</label><input id="f_phone" value="${esc(o.phone)}" inputmode="tel" placeholder="(312) 555-0100"></div>
    <div class="fld"><label>Email</label><input id="f_email" value="${esc(o.email)}" inputmode="email" placeholder="office@example.com"></div>
    <div class="fld"><label>Scanner</label><div class="scanopts" id="f_scanwrap">
      ${SCANNERS.map(s=>`<button type="button" class="scanopt${o.scanner===s?' on':''}" data-scan="${s}">${s}</button>`).join('')}
    </div></div>
    <div class="fld"><label>Current Lab Used</label><input id="f_lab" value="${esc(o.lab||'')}" placeholder="e.g. Glidewell, local lab, in-house…"></div>
    <div class="fld"><label>Doctor(s)</label><input id="f_drs" value="${esc(o.drs)}" placeholder="Dr. Jane Smith"></div>
    <div class="fld"><label>Office Hours</label><input id="f_hours" value="${esc(o.hours)}" placeholder="Mon–Fri 8–5"></div>
    <div class="fld"><label>Visit Day / Time</label><input id="f_visit" value="${esc(o.visitDay)}" placeholder="Tue 10am"></div>
    <div class="fld"><label>Notes</label><textarea id="f_notes" placeholder="Add notes…">${esc(stripLab(o.notes))}</textarea><div class="dictate-hint">🎤 To talk instead of type, tap the field, then tap the microphone on your keyboard (next to the spacebar).</div></div>
    <div class="fld"><label>Visit history</label>
      <div class="visitbox">
        <div class="visitadd">
          <input type="date" id="f_visitdate" value="${todayStr()}">
          <button type="button" class="btn btn-ghost visitbtn" id="f_visitadd">+ Log visit</button>
        </div>
        <div class="vcolorrow" id="f_vcolor">
          <button type="button" class="vcolorbtn" data-vc="green"><span class="vdot" style="background:${VCOLORS.green}"></span>Good</button>
          <button type="button" class="vcolorbtn" data-vc="yellow"><span class="vdot" style="background:${VCOLORS.yellow}"></span>Okay</button>
          <button type="button" class="vcolorbtn" data-vc="red"><span class="vdot" style="background:${VCOLORS.red}"></span>Poor</button>
        </div>
        <input id="f_vnote" class="vnote" type="text" placeholder="Optional note (e.g. uses competitor, follow up)">
        <div id="f_visitlist" class="visitlist"></div>
      </div>
    </div>
    <div class="fld"><label>Onboarding</label>
      <div class="onbox">
        <label class="onrow"><input type="checkbox" id="f_starterkit" ${o.starterKit==='Yes'?'checked':''}> <span>Send Starter Kit</span></label>
        <label class="onrow"><input type="checkbox" id="f_welcomeemail" ${o.welcomeEmail==='Yes'?'checked':''}> <span>Send Welcome Email</span></label>
        <div class="onrow onrow-pl">
          <span>Pricelist</span>
          <select id="f_pricelist" class="pl-select">
            ${['Retail','Corporate','Volume','Heartland','MB2','Midwest','EDA','ADI'].map(v=>`<option value="${v}"${(o.pricelist===v)?' selected':''}>${v}</option>`).join('')}
            <option value="Other"${(o.pricelist&&['Retail','Corporate','Volume','Heartland','MB2','Midwest','EDA','ADI',''].indexOf(o.pricelist)<0)?' selected':''}>Other</option>
            <option value=""${(!o.pricelist)?' selected':''}>—</option>
          </select>
        </div>
        <input type="text" id="f_pricelist_other" class="pl-other" placeholder="Type the pricelist name" value="${(o.pricelist&&['Retail','Corporate','Volume','Heartland','MB2','Midwest','EDA','ADI',''].indexOf(o.pricelist)<0)?String(o.pricelist).replace(/"/g,'&quot;'):''}" style="${(o.pricelist&&['Retail','Corporate','Volume','Heartland','MB2','Midwest','EDA','ADI',''].indexOf(o.pricelist)<0)?'':'display:none;'}">
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-ghost" id="f_cancel">Cancel</button>
      <button class="btn btn-primary" id="f_save" data-id="${id||''}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><path d="M5 13l4 4L19 7"/></svg> Save</button>
    </div>`;
  let scan=o.scanner||"";
  let activeState=(o.active!==false);
  const atog=document.getElementById('f_active');
  if(atog) atog.onclick=()=>{ activeState=!activeState;
    atog.classList.toggle('on',activeState); atog.setAttribute('aria-checked',activeState?'true':'false');
    atog.querySelector('.activelabel').textContent=activeState?'Active':'Inactive'; };
  const scanwrap=document.getElementById('f_scanwrap');
  if(scanwrap) scanwrap.querySelectorAll('[data-scan]').forEach(b=>{
    b.onclick=()=>{const v=b.getAttribute('data-scan');scan=(scan===v)?"":v;document.querySelectorAll('#f_scanwrap .scanopt').forEach(x=>x.classList.toggle('on',x.getAttribute('data-scan')===scan));};
  });
  // Pricelist dropdown: show the free-text box only when "Other" is selected.
  const plSel=document.getElementById('f_pricelist');
  const plOther=document.getElementById('f_pricelist_other');
  if(plSel&&plOther){
    plSel.onchange=()=>{
      if(plSel.value==='Other'){ plOther.style.display=''; plOther.focus(); }
      else { plOther.style.display='none'; }
    };
  }
  const pinBtn=document.getElementById('f_pin');
  if(pinBtn) pinBtn.onclick=function(){
    const btn=this, st=document.getElementById('f_pinstatus');
    if(!navigator.geolocation){ if(st)st.textContent="Location not supported on this device"; return; }
    if(window.isSecureContext===false){ if(st)st.textContent="Open the https:// site to use location"; return; }
    btn.disabled=true; if(st)st.textContent="Getting your location…";
    navigator.geolocation.getCurrentPosition(pos=>{
      const la=pos.coords.latitude, ln=pos.coords.longitude, acc=Math.round(pos.coords.accuracy||0);
      const latEl=document.getElementById('f_lat'), lngEl=document.getElementById('f_lng'), lblEl=document.getElementById('f_pinlabel');
      if(latEl)latEl.value=la.toFixed(6);
      if(lngEl)lngEl.value=ln.toFixed(6);
      if(st)st.innerHTML="📍 "+la.toFixed(5)+", "+ln.toFixed(5)+(acc?(' <span style="color:var(--ink-faint)">±'+acc+'m</span>'):'');
      btn.disabled=false; if(lblEl)lblEl.textContent="Pin dropped — update";
      toast("Pinned your current location");
    }, err=>{
      btn.disabled=false;
      if(st)st.textContent = err.code===1 ? "Location blocked — allow it in Settings ▸ Safari"
        : err.code===3 ? "Location timed out — try again" : "Couldn't get your location";
    }, {enableHighAccuracy:true, timeout:20000, maximumAge:0});
  };
  const cancelBtn=document.getElementById('f_cancel');
  if(cancelBtn) cancelBtn.onclick=()=>{ if(id)openDetail(id); else hideSheet(); };
  // Visit history: editable working copy of {date,color,note}, newest first.
  let visits=parseVisits(o.visits);
  let pickColor="";
  const vcwrap=document.getElementById('f_vcolor');
  if(vcwrap) vcwrap.querySelectorAll('[data-vc]').forEach(b=>{
    b.onclick=()=>{ const c=b.getAttribute('data-vc'); pickColor=(pickColor===c)?"":c;
      vcwrap.querySelectorAll('.vcolorbtn').forEach(x=>x.classList.toggle('on',x.getAttribute('data-vc')===pickColor)); };
  });
  const renderVisits=()=>{
    const box=document.getElementById('f_visitlist');
    if(!box) return;
    if(!visits.length){ box.innerHTML='<div class="visitempty">No visits logged yet.</div>'; return; }
    box.innerHTML=visits.map((v,i)=>{
      const dot=v.color?`<span class="vdot" style="background:${VCOLORS[v.color]||'#ccc'}" title="${VLABEL[v.color]||''}"></span>`:'';
      const note=v.note?`<span class="vnotetag">${esc(v.note)}</span>`:'';
      const rep=v.rep?`<span class="vnotetag" style="background:var(--teal-wash);color:var(--teal-deep);">${esc(v.rep)}</span>`:'';
      return `<div class="visititem"><span class="vleft">${dot}${esc(fmtDate(v.date))}${note}${rep}</span><button type="button" data-vi="${i}" class="visitdel">Remove</button></div>`;
    }).join('');
    box.querySelectorAll('[data-vi]').forEach(b=>{ b.onclick=()=>{ visits.splice(+b.getAttribute('data-vi'),1); renderVisits(); }; });
  };
  renderVisits();
  const addBtn=document.getElementById('f_visitadd');
  if(addBtn) addBtn.onclick=()=>{
    const dEl=document.getElementById('f_visitdate'); const v=normDate(dEl?dEl.value:"");
    if(!v){toast("Pick a date first");return;}
    const vnEl=document.getElementById('f_vnote'); const note=vnEl?vnEl.value.trim():"";
    // one entry per date: update existing date's color/note, else add.
    // Stamp the current rep so the team can see who logged each visit.
    const ex=visits.find(x=>x.date===v);
    if(ex){ ex.color=pickColor||ex.color; if(note)ex.note=note; if(!ex.rep&&meName())ex.rep=meName(); toast("Updated visit on "+fmtDate(v)); }
    else { visits.push({date:v,color:pickColor,note,rep:meName()}); toast("Visit logged"+(meName()?(" by "+meName()):"")+" — tap Save to keep it"); }
    visits.sort((a,b)=>a.date<b.date?1:a.date>b.date?-1:0);
    pickColor=""; if(vcwrap) vcwrap.querySelectorAll('.vcolorbtn').forEach(x=>x.classList.remove('on'));
    if(vnEl) vnEl.value="";
    renderVisits();
  };
  const saveBtn=document.getElementById('f_save');
  if(saveBtn) saveBtn.onclick=function(){ this.disabled=true; saveForm(id,()=>scan,()=>visits,()=>activeState); };
  showSheet();
}

function saveForm(id,getScan,getVisits,getActive){
  const g=x=>{const el=document.getElementById(x);return el?el.value.trim():"";};
  // For an EXISTING office, fall back to its stored name/city if the field is
  // blank — so logging a visit never gets discarded just because a base record
  // happened to have an empty city. Only a brand-new office must type them in.
  const existing=id?officeById(id):null;
  let name=g('f_name'), city=g('f_city');
  if(!name&&existing)name=existing.name||"";
  if(!city&&existing)city=existing.city||"";
  if(!id){
    if(!name){toast("Name is required");return;}
    if(!city){toast("City is required");return;}
  } else if(!name){
    // editing but the name somehow blanked out — keep whatever was there
    name=(existing&&existing.name)||"Untitled office";
  }
  let visits=parseVisits(getVisits?getVisits():[]);
  // Auto-fill: a brand-new office implies a visit today if the rep didn't log one.
  if(!id && !visits.length) visits=[{date:todayStr(),color:"",note:"",rep:meName()}];
  const data={name,addr:g('f_addr'),city,zip:g('f_zip'),
    lat:parseFloat(g('f_lat'))||"",lng:parseFloat(g('f_lng'))||"",
    phone:g('f_phone'),email:g('f_email'),scanner:getScan(),lab:g('f_lab'),
    drs:g('f_drs'),hours:g('f_hours'),visitDay:g('f_visit'),
    notes:(function(){ const prev=id?(officeById(id)||{}).notes:""; const keep=labLines(prev); const typed=g('f_notes');
      return keep?(typed?keep+"\n"+typed:keep):typed; })(),
    visits,
    starterKit:(document.getElementById('f_starterkit')&&document.getElementById('f_starterkit').checked)?'Yes':'',
    welcomeEmail:(document.getElementById('f_welcomeemail')&&document.getElementById('f_welcomeemail').checked)?'Yes':'',
    pricelist:(function(){ const sel=document.getElementById('f_pricelist'); if(!sel)return ""; const v=sel.value; if(v==='Other'){ return g('f_pricelist_other'); } return v; })(),
    active:(getActive?getActive():true)};
  // AUTO-LOG A VISIT ON EDIT: if this is an existing office and the rep actually
  // changed a field (note, scanner, hours, etc. — or the visit list itself),
  // record a visit dated today (carrying the last status color), so they don't
  // have to tap "Log visit". One per day max (ensureVisitToday guards that).
  if(id && existing){
    const fields=["name","addr","city","zip","phone","email","scanner","lab","drs","hours","visitDay","notes","starterKit","welcomeEmail","pricelist"];
    const fieldChanged=fields.some(k=>String((data[k]==null?"":data[k]))!==String((existing[k]==null?"":existing[k])));
    const visitsChanged=visitsToString(visits)!==visitsToString(parseVisits(existing.visits));
    if(fieldChanged||visitsChanged){
      data.visits=ensureVisitToday(data.visits, lastColor(existing));
    }
  }
  pushUndo(id?"edit "+name:"add "+name);
  if(!id){
    data.id="c"+Date.now().toString(36)+Math.random().toString(36).slice(2,8);
    data.visited=true;
    data.addedBy=meName();   // stamp who created this office
    store.add.push(data);
  } else if(id[0]==="s"){
    const idx=parseInt(id.slice(1),10);
    store.over[idx]=Object.assign({},store.over[idx],data,{visited:true});
  } else {
    const a=store.add.find(x=>x.id===id); if(a)Object.assign(a,data);
  }
  save(true); rebuild(); render();
  toast("Saved",true);
  const newId=id||data.id;
  routeCheckoff(newId);
  openDetail(newId);
}

function delOffice(id){
  const o=officeById(id); if(!o)return;
  if(!confirm("Delete \""+o.name+"\"? This can be undone.")) return;
  pushUndo("delete "+o.name);
  if(id[0]==="s"){ store.del.push(parseInt(id.slice(1),10)); delete store.over[parseInt(id.slice(1),10)]; }
  else { store.add=store.add.filter(x=>x.id!==id); }
  save(true); rebuild(); render(); hideSheet();
  toast("Deleted",true);
}

// Add/append a note straight from a map pin popup (visiting a practice in the field)
function quickNote(id){
  const o=officeById(id); if(!o) return;
  const ta=document.getElementById('pq_'+id);
  const txt=(ta?ta.value:'').trim();
  if(!txt){ toast("Type a note first"); return; }
  pushUndo("note "+o.name);
  const stamp=new Date().toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
  const line=`[${stamp}] ${txt}`;
  const newNotes = o.notes ? (o.notes.trimEnd()+"\n"+line) : line;
  // A quick-note from the field IS a visit — auto-log today (carry last color, max one/day).
  const newVisits=ensureVisitToday(o.visits, lastColor(o));
  if(id[0]==="s"){
    const idx=parseInt(id.slice(1),10);
    // IMPORTANT: base the override on the office's CURRENT full fields. If this is
    // the first edit to this seed office, store.over[idx] is empty — writing only
    // {notes,visited,visits} would later serialize a BLANK name to the Sheet and
    // erase the office name on sync. Seeding from `o` keeps name/addr/city/coords.
    const base=store.over[idx]||{name:o.name,addr:o.addr,city:o.city,zip:o.zip,lat:o.lat,lng:o.lng,
      phone:o.phone,email:o.email,scanner:o.scanner,lab:o.lab,drs:o.drs,hours:o.hours,visitDay:o.visitDay,addedBy:o.addedBy,starterKit:o.starterKit,welcomeEmail:o.welcomeEmail};
    // Preserve onboarding flags: take whatever is currently set (override or live office)
    // so saving a note never clears a ticked Starter Kit / Welcome Email.
    const keepKit=(base.starterKit!=null&&base.starterKit!=="")?base.starterKit:(o.starterKit||"");
    const keepWel=(base.welcomeEmail!=null&&base.welcomeEmail!=="")?base.welcomeEmail:(o.welcomeEmail||"");
    store.over[idx]=Object.assign({},base,{notes:newNotes,visited:true,visits:newVisits,starterKit:keepKit,welcomeEmail:keepWel});
  } else {
    const a=store.add.find(x=>x.id===id); if(a){ a.notes=newNotes; a.visited=true; a.visits=newVisits; }
  }
  save(true); rebuild(); render();
  routeCheckoff(id);
  // re-open this marker's popup with the freshly saved note
  if(clusterLayer){
    clusterLayer.eachLayer(m=>{ if(m._oid===id){ try{ clusterLayer.zoomToShowLayer(m,()=>m.openPopup()); }catch(e){ m.openPopup(); } } });
  }
  toast("Note saved",true);
}

/* ---------- export / email ---------- */
function buildCSV(onlyVisited){
  const rows=DB.filter(o=>onlyVisited?isVisited(o):true);
  const head=["Practice Name","Address","City","State","ZIP","Latitude","Longitude","County","Phone","Email","Scanner","Current Lab","Doctors","Office Hours","Visit Day/Time","Visited","Active","Added By","Last Visited","Latest Status","Logged By (latest)","Visit Count","All Visit Dates","Notes","Lab Status"];
  const q=v=>{v=(v==null?"":String(v));return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const lines=[head.join(",")];
  rows.forEach(o=>lines.push([o.name,o.addr,o.city,"IL",o.zip,o.lat,o.lng,o.county||"",o.phone,o.email,o.scanner,o.lab||"",o.drs,o.hours,o.visitDay,isVisited(o)?"Yes":"No",o.active===false?"Inactive":"Active",o.addedBy||"",lastVisit(o)?fmtDate(lastVisit(o)):"",lastColor(o)?VLABEL[lastColor(o)]:"",(o.visits&&o.visits.length&&o.visits[0].rep)?o.visits[0].rep:"",(o.visits&&o.visits.length)||0,(o.visits&&o.visits.length)?o.visits.map(v=>fmtDate(v.date)+(v.color?" ("+VLABEL[v.color]+")":"")+(v.rep?" "+v.rep:"")).join(" | "):"",stripLab(o.notes),LAB_LABEL[labStatus(o)]||""].map(q).join(",")));
  return {csv:lines.join("\r\n"),count:rows.length};
}
function downloadCSV(onlyVisited){
  const {csv,count}=buildCSV(onlyVisited);
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=`IL-Dental-CRM-${onlyVisited?'visited':'all'}-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast(`Exported ${count} offices`);
}
function emailCSV(){
  const {csv,count}=buildCSV(true);
  // try Web Share with file (iOS Safari supports navigator.share files)
  const file=new File([csv],`IL-Dental-visited-${new Date().toISOString().slice(0,10)}.csv`,{type:"text/csv"});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    navigator.share({files:[file],title:"Salesly — Visited Offices",text:`${count} visited offices for marketing.`}).catch(()=>{});
  } else {
    // fallback: mailto with summary (CSV body truncated by mail clients, so also trigger download)
    downloadCSV(true);
    const body=encodeURIComponent(`${count} visited dental offices attached (downloaded as CSV — please attach the file).\n\nGenerated by Salesly.`);
    location.href=`mailto:?subject=${encodeURIComponent('Salesly — Visited Offices ('+count+')')}&body=${body}`;
  }
}
function openRoute(){
  // Two ways to route:
  //  (A) anchor on a specific office (searchable) -> route nearest-next from it,
  //      drawing from ALL offices that match active status/rep filters (location-agnostic).
  //  (B) no anchor -> route the current on-screen filter, starting from GPS.
  const curSet=DB.filter(matchFilter).filter(o=>o.lat&&o.lng);
  document.getElementById('sheetTitle').textContent="Build Route";
  const haveGPS=!!userPos;
  let anchorId=null;           // chosen anchor office id (anchor mode) or null
  let stopN=9;

  document.getElementById('sheetBody').innerHTML=`
    <div class="fld"><label>Start from a specific office</label>
      <input type="text" id="rt_search" placeholder="Type an office name…" autocomplete="off" style="width:100%;">
      <div id="rt_results" style="margin-top:6px;"></div>
      <div id="rt_anchor" style="margin-top:6px;"></div>
    </div>
    <div id="rt_gpsnote" style="font-size:12px;color:var(--ink-faint);line-height:1.45;margin:2px 0 14px;"></div>
    <div class="fld"><label>How many stops?</label>
      <select id="rt_n"></select></div>
    <p style="color:var(--ink-faint);font-size:12px;line-height:1.45;margin:8px 0 16px;">Search an office to anchor the route there (stop #1) — it then fills in the nearest offices around it. Any Status/Rep filter still applies to the pool. Maps apps reliably handle ~9–10 stops; above that some may be dropped.</p>
    <div id="rt_list" style="margin-bottom:16px;"></div>
    <button class="btn btn-primary" id="rt_apple" style="width:100%;">Open in Apple Maps</button>`;

  const $=id=>document.getElementById(id);

  function currentPool(){
    if(anchorId) return DB.filter(poolMatch).filter(o=>o.lat&&o.lng);
    return curSet;
  }
  function rebuildStopOptions(poolLen){
    const maxN=Math.min(Math.max(poolLen,2),25);
    const sel=$('rt_n'); const prev=stopN;
    let html="";
    for(let n=2;n<=maxN;n++){ html+=`<option value="${n}">${n} stops${n>10?' — apps may drop some':''}</option>`; }
    sel.innerHTML=html;
    stopN=Math.min(prev,maxN); if(stopN<2)stopN=Math.min(2,maxN); sel.value=String(stopN);
  }
  // Final safety pass: remove duplicate stops from an ordered list by exact
// coordinates OR exact (normalized) address — independent of name — so the same
// place never appears twice in the list OR in the Apple Maps hand-off. Runs on the
// FINAL list both display and Apple Maps use, so they can never diverge.
function dedupeStops(list){
  const out=[]; const seenAddr=new Set(); const placed=[];
  const norm=v=>String(v||"").toLowerCase().replace(/[^a-z0-9]/g,"");
  for(const o of (list||[])){
    if(!o) continue;
    const addrKey=norm(o.addr);
    if(addrKey && seenAddr.has(addrKey)) continue;                    // same street address
    if(o.lat&&o.lng&&placed.some(p=>feetBetween(p.lat,p.lng,+o.lat,+o.lng)<60)) continue; // same spot
    if(addrKey) seenAddr.add(addrKey);
    if(o.lat&&o.lng) placed.push({lat:+o.lat,lng:+o.lng});
    out.push(o);
  }
  return out;
}
function computeOrdered(){
    const pool=currentPool();
    if(anchorId){
      const anchor=DB.find(o=>o.id===anchorId);
      if(!anchor||!anchor.lat||!anchor.lng) return [];
      const rest=pool.filter(o=>o.id!==anchorId);
      // Select stopN-1 offices closest to the anchor, deduped by address AND against
      // the anchor itself, so we always end up with stopN distinct stops (anchor + rest).
      const near=selectNearest(rest, +anchor.lat, +anchor.lng, Math.max(stopN-1,0), [anchor]);
      return routeOptimize(near, +anchor.lat, +anchor.lng, anchor);
    }
    if(haveGPS){
      const near=selectNearest(pool, userPos.lat, userPos.lng, stopN);
      return routeOptimize(near, userPos.lat, userPos.lng, null);
    }
    if(!pool.length) return [];
    const near=selectNearest(pool, +pool[0].lat, +pool[0].lng, stopN);
    return routeOptimize(near, +pool[0].lat, +pool[0].lng, null);
  }
  function renderRoute(){
    rebuildStopOptions(currentPool().length);
    let ordered=computeOrdered();
    // Always start the route from the rep's current location when we have GPS —
    // even with an anchor (the anchor becomes the first office to visit, but the
    // trip still begins where the rep physically is).
    const sLat=haveGPS?userPos.lat:null;
    const sLng=haveGPS?userPos.lng:null;
    paintRoute();
    // Ask ORS to optimize the stop ORDER by real driving distance, then re-render
    // with the better order so it flows into the list, the map, AND Apple Maps.
    // Anchor stays first. Falls back silently to the straight-line order on any failure.
    optimizeOrderORS(ordered, sLat, sLng, !!anchorId).then(better=>{
      if(better && better.length===ordered.length){ ordered=better; paintRoute(); }
    }).catch(()=>{});
    function paintRoute(){
    drawRouteOverlay(ordered, sLat, sLng);
    $('rt_list').innerHTML=ordered.length?ordered.map((o,i)=>`<div style="display:flex;gap:9px;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--line);">
      <span style="font-family:var(--mono);font-weight:700;color:var(--amber);min-width:20px;">${i+1}</span>
      <span style="font-size:13.5px;"><b>${esc(o.name||'(no name)')}</b> <span style="color:var(--ink-soft)">— ${esc(o.city||'')}</span></span></div>`).join('')
      :`<p style="color:var(--ink-soft);font-size:13px;">No mappable offices to route. Pick an anchor office or adjust your filters.</p>`;
    $('rt_gpsnote').textContent = anchorId
      ? "Routing from your chosen office through the nearest offices around it."
      : (haveGPS?"Routing from your current location. Or search an office above to anchor the route there."
                :"Tip: tap the locate button on the map to start from where you are, or search an office above to anchor the route.");
    $('rt_apple').onclick=()=>{ const u=routeAppleURL(ordered,sLat,sLng); startLiveRoute(ordered); if(u){ try{ location.href=u; }catch(e){ window.open(u,'_blank'); } } };
    }
  }
  function showAnchorChip(){
    const a=anchorId?DB.find(o=>o.id===anchorId):null;
    $('rt_anchor').innerHTML = a
      ? `<span class="subchip on" style="display:inline-flex;align-items:center;gap:7px;">Anchor: ${esc(a.name||'(no name)')} — ${esc(a.city||'')} <span id="rt_clear" style="cursor:pointer;font-weight:700;">✕</span></span>`
      : "";
    const clr=$('rt_clear'); if(clr) clr.onclick=()=>{ anchorId=null; $('rt_search').value=""; $('rt_results').innerHTML=""; showAnchorChip(); renderRoute(); };
  }
  $('rt_search').oninput=()=>{
    const q=$('rt_search').value.toLowerCase().trim();
    const box=$('rt_results');
    if(q.length<2){ box.innerHTML=""; return; }
    const S=v=>(v==null?"":String(v)).toLowerCase();
    const hits=DB.filter(o=>o.lat&&o.lng&&(S(o.name).includes(q)||S(o.city).includes(q)||S(o.addr).includes(q))).slice(0,8);
    box.innerHTML=hits.length?hits.map(o=>`<div class="rt-hit" data-id="${esc(o.id)}" style="padding:8px 10px;border:1px solid var(--line);border-radius:9px;margin-bottom:5px;cursor:pointer;font-size:13.5px;"><b>${esc(o.name||'(no name)')}</b> <span style="color:var(--ink-soft)">— ${esc(o.city||'')}</span></div>`).join('')
      :`<div style="font-size:13px;color:var(--ink-soft);padding:6px 2px;">No matches.</div>`;
    box.querySelectorAll('.rt-hit').forEach(el=>{ el.onclick=()=>{
      anchorId=el.getAttribute('data-id');
      $('rt_search').value=""; box.innerHTML="";
      showAnchorChip(); renderRoute();
    };});
  };
  $('rt_n').onchange=()=>{ stopN=parseInt($('rt_n').value,10)||9; renderRoute(); };

  showAnchorChip();
  renderRoute();
  showSheet();
}

    rebuild(); render(); setSyncBadge();
    toast("Synced");
  };
  const offBtn=document.getElementById('sy_off');
  if(offBtn) offBtn.onclick=()=>{
    cloudSaveConfig(""); cloudOn=false; cloudUnsubscribe();

    setSyncBadge(); hideSheet(); toast("Team sync turned off");
  };

/* ---------- who am I (rep identity) ---------- */
function updateMeBadge(){
  const el=document.getElementById('meBadge');
  if(!el) return;
  if(ME){ el.textContent="I am: "+ME.name+(ME.role==="admin"?" (Admin)":""); }
  else { el.textContent="Set who you are"; }
  el.style.display="";
}
// First-open / switch-identity picker. Pick once; remembered on this device.
function openWhoAmI(){
  document.getElementById('sheetTitle').textContent="Who are you?";
  const opts=REPS.map(r=>`<button class="exp-opt" data-me="${esc(r.id)}">
      <span class="exp-ic" style="font-family:var(--display);font-weight:700;color:var(--teal-deep);">${esc((r.name||'?').slice(0,1).toUpperCase())}</span>
      <span><span class="et">${esc(r.name)}${r.role==="admin"?' · Admin':''}</span><span class="ed">${esc(r.territory||'No territory set')}${ME&&ME.id===r.id?' · current':''}</span></span>
    </button>`).join('');
  document.getElementById('sheetBody').innerHTML=`
    <div style="font-size:13px;color:var(--ink-soft);line-height:1.55;margin-bottom:14px;">
      Pick who's using this device. Your visits and added offices get stamped with your name so the team can see who did what. You can switch anytime in Team settings. (This identifies you on this device — it isn't a password.)
    </div>
    ${opts}
    ${isAdmin()?`<button class="btn btn-ghost" id="wai_manage" style="width:100%;margin-top:8px;">Manage reps</button>`:''}`;
  REPS.forEach(r=>{
    const b=document.querySelector('[data-me="'+r.id+'"]');
    if(b) b.onclick=()=>{
      // Admin accounts are PIN-protected: a rep can't switch into admin without it.
      if(r.role==="admin" && r.pin && !(ME&&ME.id===r.id)){
        const entry=prompt("Enter the admin PIN to use "+r.name+":");
        if(entry===null) return;                 // cancelled
        if(String(entry).trim()!==String(r.pin).trim()){ toast("Incorrect PIN"); return; }
      }
      setMe(r.id); updateMeBadge(); rebuild(); render(); hideSheet(); toast("You're set as "+r.name);
    };
  });
  const mng=document.getElementById('wai_manage');
  if(mng) mng.onclick=openManageReps;
  showSheet();
}
function openManageReps(){
  if(!isAdmin()){ toast("Only an admin can manage reps"); return; }
  document.getElementById('sheetTitle').textContent="Manage Reps";
  const rows=REPS.map(r=>`<div class="dcard full" style="display:flex;align-items:center;gap:10px;">
      <div style="flex:1;"><div class="dv">${esc(r.name)}${r.role==="admin"?' · Admin':''}</div><div class="dl">${esc(r.territory||'No territory')}</div></div>
      ${r.id!=="ryan"?`<button class="visitdel" data-delrep="${esc(r.id)}">Remove</button>`:'<span class="dl">primary</span>'}
    </div>`).join('');
