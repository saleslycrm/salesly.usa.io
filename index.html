    <div style="font-size:13px;color:var(--ink-soft);line-height:1.5;margin-bottom:12px;">Add the reps on your team. Each picks their own name on their device. Territory is an optional state used as a default view filter when you expand to other states.</div>
    ${rows}
    <div class="dl" style="margin:16px 0 6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);">Add a rep</div>
    <div class="fld" style="margin-bottom:8px;"><input id="nr_name" placeholder="Name (e.g. Bill)"></div>
    <div class="row2" style="margin-bottom:8px;">
      <div class="fld" style="margin-bottom:0;"><input id="nr_terr" placeholder="Territory — state name or abbrev. (e.g. Illinois or IL)"></div>
      <div class="fld" style="margin-bottom:0;"><select id="nr_role"><option value="rep">Rep</option><option value="admin">Admin</option></select></div>
    </div>
    <div class="actions">
      <button class="btn btn-ghost" id="nr_back">Back</button>
      <button class="btn btn-primary" id="nr_add">Add rep</button>
    </div>
    <div class="dl" style="margin:18px 0 6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);">Security</div>
    <button class="btn btn-ghost" id="nr_pin" style="width:100%;">Change admin PIN</button>`;
  REPS.forEach(r=>{ const b=document.querySelector('[data-delrep="'+r.id+'"]');
    if(b) b.onclick=()=>{ if(!confirm("Remove "+r.name+"? Their past visits stay stamped with their name."))return;
      REPS=REPS.filter(x=>x.id!==r.id); saveReps(); if(ME&&ME.id===r.id){ME=null;try{localStorage.removeItem(ME_KEY);}catch(e){}} updateMeBadge(); openManageReps(); }; });
  const back=document.getElementById('nr_back'); if(back) back.onclick=openWhoAmI;
  const pinBtn=document.getElementById('nr_pin');
  if(pinBtn) pinBtn.onclick=()=>{
    const me=REPS.find(r=>r.role==="admin");
    if(!me){ toast("No admin account"); return; }
    const cur=prompt("Enter the CURRENT admin PIN:");
    if(cur===null) return;
    if(String(cur).trim()!==String(me.pin||"").trim()){ toast("Incorrect PIN"); return; }
    const np=prompt("Enter a NEW admin PIN (4+ digits):");
    if(np===null) return;
    if(!/^\d{4,}$/.test(String(np).trim())){ toast("PIN must be at least 4 digits"); return; }
    me.pin=String(np).trim(); saveReps(); toast("Admin PIN updated");
  };
  const add=document.getElementById('nr_add'); if(add) add.onclick=()=>{
    const name=((document.getElementById('nr_name')||{}).value||"").trim();
    if(!name){toast("Enter a name");return;}
    if(repByName(name)){toast("That name already exists");return;}
    const terr=((document.getElementById('nr_terr')||{}).value||"").trim();
    const role=((document.getElementById('nr_role')||{}).value||"rep");
    const id=name.toLowerCase().replace(/[^a-z0-9]+/g,"")+Math.random().toString(36).slice(2,5);
    const newRep={id,name,role,territory:terr};
    if(role==="admin"){
      const np=prompt("Set a PIN for this admin account (4+ digits):");
      if(np===null) return;
      if(!/^\d{4,}$/.test(String(np).trim())){ toast("Admin needs a 4+ digit PIN"); return; }
      newRep.pin=String(np).trim();
    }
    REPS.push(newRep); saveReps(); openManageReps(); toast("Added "+name);
  };
  showSheet();
}

function showSheet(){document.body.classList.add('sheet-open');document.getElementById('sheetBg').classList.add('show');document.getElementById('sheet').classList.add('show');}
function hideSheet(){document.body.classList.remove('sheet-open');document.getElementById('sheetBg').classList.remove('show');document.getElementById('sheet').classList.remove('show');if(state.view==="map"&&mapObj){requestAnimationFrame(()=>{try{mapObj.invalidateSize(false);}catch(e){}});}}

/* ---------- events ---------- */
function wire(){
  const on=(id,ev,fn)=>{ const el=document.getElementById(id); if(el) el.addEventListener(ev,fn); };
  const mainEl=document.getElementById('main');
  if(mainEl) mainEl.addEventListener('click',e=>{
    const ch=e.target.closest('[data-cityhdr]');
    if(ch){const c=ch.getAttribute('data-cityhdr');state.openCity=(state.openCity===c)?null:c;
      const row=ch.closest('.cityrow');
      if(row.classList.contains('open')&&state.openCity!==c){row.classList.remove('open');}
      else if(state.openCity===c){document.querySelectorAll('.cityrow.open').forEach(r=>{if(r!==row)r.classList.remove('open');});row.classList.add('open');}
      else{row.classList.toggle('open');}
      return;}
    const op=e.target.closest('[data-open]');
    if(op){openDetail(op.getAttribute('data-open'));return;}
  });
  on('sheetBody','click',e=>{
    const ed=e.target.closest('[data-edit]'); if(ed){openForm(ed.getAttribute('data-edit'));return;}
    const dl=e.target.closest('[data-del]'); if(dl){delOffice(dl.getAttribute('data-del'));return;}
  });
  on('btnAdd','click',()=>openForm(null));
  on('btnExport','click',openExport);
  on('btnSync','click',openSync);
  on('meBadge','click',openWhoAmI);
  on('hdrToggle','click',()=>{
    const collapsed=document.body.classList.toggle('hdr-collapsed');
    try{ localStorage.setItem('hdr_collapsed', collapsed?'1':'0'); }catch(e){}
    _refitMapSoon(); setTimeout(_refitMapSoon,260);
  });
  on('btnView','click',()=>setView(state.view==="map"?"list":"map"));
  on('btnCal','click',()=>setView(state.view==="calendar"?"list":"calendar"));
  on('locateBtn','click',locateMe);
  on('nearbyBtn','click',toggleNearby);
  on('routeBtn','click',openRoute);
  on('clearRoute','click',clearRouteOverlay);
  on('rb_end','click',endLiveRoute);
  { const h=document.getElementById('rb_head'), endBtn=document.getElementById('rb_end');
    if(endBtn) endBtn.addEventListener('click',e=>e.stopPropagation());  // End shouldn't toggle
    if(h) h.addEventListener('click',()=>{
      const list=document.getElementById('rb_list'), car=document.getElementById('rb_caret');
      if(!list) return;
      const open=list.style.display!=='none' && list.style.display!=='';
      list.style.display=open?'none':'block';
      if(car) car.textContent=open?'▾':'▴';
    });
  }
  on('radMinus','click',()=>changeRadius(-1));
  on('radPlus','click',()=>changeRadius(1));
  on('btnEmail','click',()=>{hideSheet();setTimeout(emailCSV,200);});
  on('sheetX','click',hideSheet);
  on('sheetBg','click',hideSheet);
  let st;
  on('search','input',e=>{clearTimeout(st);st=setTimeout(()=>{state.q=e.target.value.trim();render();},180);});
  on('filterbar','click',e=>{
    // Icon row — expand/collapse a group's panel (multiple can stay open)
    const fi=e.target.closest('.ficon[data-grp]');
    if(fi){ const g=fi.getAttribute('data-grp'); const i=state.openGroups.indexOf(g);
      if(i>=0) state.openGroups.splice(i,1); else state.openGroups.push(g); render(); return; }
    // Visit group — exclusive within the group; tap the active one again to clear
    const gv=e.target.closest('[data-gv]');
    if(gv){ const v=gv.getAttribute('data-gv'); state.gVisit=(state.gVisit===v)?"":v; render(); return; }
    // Status group — exclusive; tap again to clear
    const gs=e.target.closest('[data-gs]');
    if(gs){ const v=gs.getAttribute('data-gs'); state.gStatus=(state.gStatus===v)?"":v; render(); return; }
    // Heat group — multi-select (toggle each color in/out of the set)
    const gh=e.target.closest('[data-gh]');
    if(gh){ const c=gh.getAttribute('data-gh'); const i=state.gHeat.indexOf(c);
      if(i>=0) state.gHeat.splice(i,1); else state.gHeat.push(c); render(); return; }
    // Lab pipeline group — multi-select (Active / New / Winback / Falloff / Inactive)
    const gl=e.target.closest('[data-gl]');
    if(gl){ const c=gl.getAttribute('data-gl'); const i=state.gLab.indexOf(c);
      if(i>=0) state.gLab.splice(i,1); else state.gLab.push(c); render(); return; }
    // More drawer toggle
    if(e.target.closest('#moreBtn')){ state.showMore=!state.showMore; render(); return; }
    // Clear all
    if(e.target.closest('#clearBtn')){
      state.gVisit=""; state.gStatus=""; state.gHeat=[]; state.gLab=[]; state.filter=[];
      state.repFilter=[]; state.dFrom=""; state.dTo=""; render(); return;
    }
  });
  // autosave safety on hide/blur
  window.addEventListener('beforeunload',()=>{try{save(true);}catch(e){}});
  window.addEventListener('pagehide',()=>{try{save(true);}catch(e){}});
  document.addEventListener('visibilitychange',async ()=>{
    if(document.hidden) return;
    // Coming back to the foreground: if we're on the map but tracking stopped
    // (iOS pauses watchPosition when backgrounded), resume following.
    if(state.view==="map" && !followMode){
      setTimeout(()=>{ try{ if(state.view==="map" && !followMode) startFollow(); }catch(e){} }, 150);
    }
    if(!cloudOn) return;
    pulling=false; pushing=false;
    try{ const changed=await cloudPull(); if(changed){ rebuild(); renderActive(); } }catch(e){}
    if(!pollTimer) cloudSubscribe();
  });
  window.addEventListener('focus',()=>{ if(cloudOn&&!pollTimer) cloudSubscribe(); });
}

/* ---------- boot ---------- */
// Header starts COLLAPSED so the map is prominent; remember the user's choice.
try{ if(localStorage.getItem('hdr_collapsed')!=='0') document.body.classList.add('hdr-collapsed'); }catch(e){ document.body.classList.add('hdr-collapsed'); }
// Expose popup-invoked handlers globally as a safety net.
window.openDetail=openDetail; window.quickNote=quickNote; window.openForm=openForm;
(async function init(){
  load();
  loadReps(); loadMe();           // rep registry + this device's identity
  // For non-admin reps, detect their current state from GPS once on load so the
  // location-based office scoping is ready without needing to start Follow mode.
  try{
    if(ME && !(isAdmin&&isAdmin()) && navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        p=>{ try{ detectGeoState(p.coords.latitude,p.coords.longitude,true); }catch(e){} },
        ()=>{}, {enableHighAccuracy:false,timeout:12000,maximumAge:300000});
    }
  }catch(e){}
  cloudInit();
  setSyncBadge();                 // reflect saved sync state immediately

  // Wire up all buttons/handlers IMMEDIATELY, before any heavy work. The sync
  // pill, Add, Export, search, filters etc. must respond even while the office
  // list is still decompressing (or if decompression stalls). Previously wire()
  // ran only AFTER decompressSeed(), so a slow/stuck decompress left every
  // button dead — which looked like "clicking sync does nothing" / blank app.
  wire();
  setSyncBadge();

  // Start cloud sync in parallel — it doesn't depend on the base list being ready.
  if(cloudOn){
    (async()=>{ try{ await cloudPull(); }catch(e){} cloudSubscribe(); try{rebuild();render();}catch(e){} setSyncBadge(); })();
  }

  // Build the base list. If it stalls/fails, the UI above is already alive and
  // usable; show whatever synced data exists rather than a dead blank screen.
  try{ SEED=await decompressSeed(); }
  catch(e){ SEED=[]; try{rebuild();render();}catch(_){}
    const m=document.getElementById('main');
    if(m && !DB.length){ m.innerHTML='<div class="empty"><h3>Couldn\'t load the office list</h3><p>Pull to refresh or reopen the app. Your synced offices and the menu still work.</p></div>'; }
    setSyncBadge(); return; }
  rebuild(); render();
  loadRoute(); renderRouteBar();   // restore an in-progress route after reopen/refresh
  setSyncBadge();
  updateMeBadge();
  if(!ME) setTimeout(openWhoAmI,400);   // first-open identity prompt

  // ---- Startup: open straight to the map and begin following your location ----
  // Runs on every launch / reopen / refresh. The map shows immediately; we then
  // try to start GPS follow mode. iOS Safari may require a tap for the FIRST
  // location permission, so if the auto-start can't get a fix we leave you on the
  // map with the locate button ready (one tap then begins following).
  startOnMapFollowing();
})();

// Open the map and kick off follow mode. Safe to call repeatedly.
function startOnMapFollowing(){
  try{
    if(state.view!=="map") setView("map");
    // Give the map container a beat to lay out, then start following.
    setTimeout(()=>{ try{ if(!followMode) startFollow(); }catch(e){} }, 250);
    // iOS Chrome often silently ignores a geolocation request that wasn't started
    // by a user tap, so the auto-start can leave us "following" with no fix ever
    // arriving (banner never appears, button stuck pulsing). If that happens,
    // reset to a clean state after a few seconds so the user's first tap on the
    // locate button cleanly starts follow via a real gesture (which Chrome honors).
    setTimeout(()=>{
      try{ if(followMode && !userPos){ stopFollow(); } }catch(e){}
    }, 5200);
  }catch(e){}
}

// Re-assert map+follow when the app is brought back to the foreground (iOS
// "reopen" from the home-screen icon often fires pageshow rather than a full
// reload). Only re-follows if you'd been on the map.
window.addEventListener('pageshow',(e)=>{
  if(state.view==="map" && !followMode){ startOnMapFollowing(); }
});

// Mobile Chrome (and Safari) show/hide their toolbars as you scroll, which changes
// the VISIBLE viewport height. Leaflet measures its container once and won't notice,
// so the map can end up sized to the wrong height — tiles overflow / controls overlap.
// Re-fit the map (debounced) whenever the viewport changes or the device rotates.
let _vpResizeT=null;
function _refitMapSoon(){
  if(_vpResizeT) clearTimeout(_vpResizeT);
  _vpResizeT=setTimeout(()=>{
    try{ if(mapObj && state.view==="map"){ mapObj.invalidateSize(false); } }catch(e){}
  },180);
}
window.addEventListener('resize', _refitMapSoon);
window.addEventListener('orientationchange', ()=>{ _refitMapSoon(); setTimeout(_refitMapSoon,500); });
if(window.visualViewport){ window.visualViewport.addEventListener('resize', _refitMapSoon); }
// ---- PWA: register the offline service worker ----
// Defensive: if the browser lacks support, or sw.js is missing, or registration
// fails, the app keeps working exactly as before — this only ADDS offline/caching.
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* no-op: app works without it */ });
  });
}
</script>
