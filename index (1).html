    vis=scoped.filter(isVisited).length;
    sc=scoped.filter(o=>o.scanner&&o.scanner!=="None"&&o.scanner!=="").length;
    added=scoped.filter(o=>!o.seed).length;
  }
  document.getElementById('subline').textContent=tot.toLocaleString()+" "+CONFIG.entityPlural.toLowerCase()+" · "+new Set(scoped.map(o=>o.city)).size+" cities · wl1";
  document.getElementById('statbar').innerHTML=
    `<div class="stat"><div class="sv">${tot.toLocaleString()}</div><div class="sl">${esc(CONFIG.entityPlural)}</div></div>
     <div class="stat v"><div class="sv">${vis}</div><div class="sl">${repName?esc(repName.split(" ")[0])+" visited":"Visited"}</div></div>
     <div class="stat s"><div class="sv">${sc}</div><div class="sl">${esc(cfgChoiceLabel()||"Tagged")}</div></div>
     <div class="stat"><div class="sv">${added}</div><div class="sl">Added</div></div>`;

  const main=document.getElementById('main');
  if(state.view==="map"){ refreshMap(filtered); }
  if(!filtered.length){
    if(!DB.length){ main.innerHTML=`<div class="empty"><h3>No ${esc(CONFIG.entityPlural.toLowerCase())} yet</h3><p>${(isAdmin&&isAdmin())?"Tap Export ▸ Import "+esc(CONFIG.entityPlural)+" (CSV) to load your list, or use the + button to add one.":"Ask your admin to import the "+esc(CONFIG.entityPlural.toLowerCase())+" list, or use the + button to add one."}</p></div>`; }
    else { main.innerHTML=`<div class="empty"><h3>No ${esc(CONFIG.entityPlural.toLowerCase())} found</h3><p>Try a different search or filter.</p></div>`; }
    return;
  }

  // group by city (null-safe: synced/added offices may have blank fields)
  const cities={};
  filtered.forEach(o=>{const c=(o.city||"Uncategorized");(cities[c]=cities[c]||[]).push(o);});
  const names=Object.keys(cities).sort((a,b)=>cities[b].length-cities[a].length||a.localeCompare(b));
  // auto-open when searching/filtering narrows things
  const forceOpen=(state.q||state.filter!=="all")&&filtered.length<120;

  let html="";
  names.forEach(city=>{
    const list=cities[city].sort((a,b)=>String(a.name||"").localeCompare(String(b.name||"")));
    const open=forceOpen||state.openCity===city;
    html+=`<div class="cityrow${open?' open':''}" data-city="${esc(city)}">
      <button class="cityhdr" data-cityhdr="${esc(city)}">
        <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg>
        <span class="cityname">${esc(city)}</span>
        <span class="citycount">${list.length}</span>
      </button>
      <div class="officelist">`;
    list.forEach(o=>{
      const scOn=o.scanner&&o.scanner!=="None"&&o.scanner!=="";
      html+=`<button class="office" data-open="${o.id}">
        <div class="badges">
          <span class="dot ${isVisited(o)?'visited':''}" style="${isVisited(o)?'':'background:var(--line-strong)'}"></span>
        </div>
        <div class="onm"><div class="otitle">${esc(o.name)}</div><div class="oaddr">${esc(o.addr)}${o.zip?' · '+esc(o.zip):''}</div></div>
        ${scOn?`<span class="pill sc">${esc(o.scanner)}</span>`:''}
        ${o.notes?'<span class="dot note"></span>':''}
      </button>`;
    });
    html+=`</div></div>`;
  });
  main.innerHTML=html;
}

/* ---------- Map view ---------- */
function pinClass(o){ const scOn=o.scanner&&o.scanner!=="None"&&o.scanner!==""; return isVisited(o)?"visited":(scOn?"scanner":""); }
function pinStyle(o){ const c=lastColor(o); return c?`style="background:${VCOLORS[c]};border-color:#fff"`:""; }
function haversine(lat1,lng1,lat2,lng2){
  const R=3958.8, toRad=x=>x*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
// Order offices nearest-next ("greedy") starting from a given point.
// Not a perfect shortest-path, but a sensible drive order that cuts backtracking.
// Pick the N offices geographically CLOSEST to a point (start/anchor), dropping
// junk coords and same-spot duplicates. Selection only — ordering is done by
// routeOptimize so we avoid the greedy zig-zag.
function selectNearest(offices, lat, lng, n, preSeed){
  const valid=o=>o.lat&&o.lng&&Math.abs(+o.lat)>0.01&&Math.abs(+o.lng)>0.01&&Math.abs(+o.lat)<=90&&Math.abs(+o.lng)<=180;
  const norm=v=>String(v||"").toLowerCase().replace(/[^a-z0-9]/g,"");
  const keyOf=o=>norm(o.addr);   // dedup by ADDRESS; selection keeps going until N unique
  const scored=offices.filter(valid).map(o=>({o,lat:+o.lat,lng:+o.lng,key:keyOf(o),d:haversine(lat,lng,+o.lat,+o.lng)}))
                       .sort((a,b)=>a.d-b.d);
  const out=[]; const placed=[]; const keys=new Set();
  // Seed dedup state with offices already in the route (e.g. the anchor), so we
  // don't pick a duplicate of them and we still return the full N.
  (preSeed||[]).forEach(o=>{ if(o){ const k=keyOf(o); if(k)keys.add(k); if(o.lat&&o.lng)placed.push({lat:+o.lat,lng:+o.lng}); } });
  for(const s of scored){
    // Same office if within ~60ft OR identical name+address (handles duplicates
    // whose geocoded coordinates differ slightly but are really the same place).
    if(placed.some(p=>feetBetween(p.lat,p.lng,s.lat,s.lng)<60)) continue;
    if(s.key!=="|" && keys.has(s.key)) continue;
    placed.push(s); keys.add(s.key); out.push(s.o);
    if(out.length>=n) break;

function buildMap(){

  mapObj.addLayer(clusterLayer);

  // refresh rebuild/recenter the map — that was collapsing the cluster before you
  // could tap a pin. Track both states and pause refresh accordingly.
  mapObj.on('popupopen', ()=>{ _popupOpen=true; _interactAt=Date.now(); });
  mapObj.on('popupclose', ()=>{ _popupOpen=false; });
  clusterLayer.on('spiderfied', ()=>{ _spiderOpen=true; _interactAt=Date.now(); userMovedMap=true; });
  clusterLayer.on('unspiderfied', ()=>{ _spiderOpen=false;
    clearTimeout(mapObj._resumeT); mapObj._resumeT=setTimeout(()=>{ userMovedMap=false; },6000); });

  // expand/zoom isn't yanked back.

    mapObj._resumeT=setTimeout(()=>{ userMovedMap=false; },6000); } });

  // the map doesn't fight you. It resumes (snaps back to you) after a short idle.

      userMovedMap=true;

    }
  });
  // ---- LONG-PRESS TO DROP A PIN AT A NEW OFFICE ----
  // Press and hold anywhere on the map (~600ms) to drop a pin at that exact spot.
  // We grab the lat/lng immediately, then look up the street address in the
  // background (free OpenStreetMap Nominatim) and open the Add form pre-filled.
  // NOTE: we use NATIVE touch events on the map container, not Leaflet's mouse
  // events — on iOS Safari the mouse events don't fire reliably for touch, which
  // is why the earlier version did nothing (iOS just highlighted the +/- button).

    const rect=mapObj.getContainer().getBoundingClientRect();
    const pt=L.point(clientX-rect.left, clientY-rect.top);
    return mapObj.containerPointToLatLng(pt);
  }
  function beginLP(clientX, clientY){
    cancelLongPress();
    _lpStart={x:clientX,y:clientY};
    const ll=ptToLatLng(clientX, clientY);

  }
  function moveLP(clientX, clientY){
    if(_lpStart){ const dx=Math.abs(clientX-_lpStart.x), dy=Math.abs(clientY-_lpStart.y); if(dx>10||dy>10) cancelLongPress(); }
  }
  const mapEl=mapObj.getContainer();
  // Touch (phones/tablets) — the primary path.
  mapEl.addEventListener('touchstart', (ev)=>{ if(ev.target&&ev.target.closest&&ev.target.closest('.leaflet-control,.leaflet-marker-icon,.leaflet-popup')) return; if(ev.touches&&ev.touches.length===1){ const t=ev.touches[0]; beginLP(t.clientX, t.clientY); } else { cancelLongPress(); } }, {passive:true});
  mapEl.addEventListener('touchmove', (ev)=>{ if(ev.touches&&ev.touches.length){ const t=ev.touches[0]; moveLP(t.clientX, t.clientY); } }, {passive:true});
  mapEl.addEventListener('touchend', cancelLongPress, {passive:true});
  mapEl.addEventListener('touchcancel', cancelLongPress, {passive:true});

  // which was sometimes highlighting text instead of dropping a pin.
  mapEl.addEventListener('contextmenu', (ev)=>{ ev.preventDefault(); });
  // Mouse (desktop) — secondary fallback.
  mapEl.addEventListener('mousedown', (ev)=>{ if(ev.button) return; if(ev.target&&ev.target.closest&&ev.target.closest('.leaflet-control,.leaflet-marker-icon,.leaflet-popup')) return; beginLP(ev.clientX, ev.clientY); });

// Reverse-geocode a point to a street address via OpenStreetMap Nominatim (free,

// even if the lookup fails, since lat/lng are captured regardless.
async function reverseGeocode(lat, lng){
  try{
    const url="https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat="+encodeURIComponent(lat)+"&lon="+encodeURIComponent(lng)+"&zoom=18&addressdetails=1";
    const res=await fetch(url,{headers:{"Accept":"application/json"}});
    if(!res.ok) return {};
    const d=await res.json(); const a=d&&d.address?d.address:{};
    const house=a.house_number||""; const road=a.road||"";
    const addr=(house?house+" ":"")+road;
    const city=a.city||a.town||a.village||a.hamlet||a.suburb||a.county||"";

let _dropMarker=null;

// Debounce: only look up after the pin pauses ~350ms, to respect the geocoder's

function schedulePreview(lat,lng){

function setDropMsg(txt){

}

  const seq=++_previewSeq;   // ignore out-of-order responses from earlier positions
  try{
    const info=await reverseGeocode(lat,lng);
    if(seq!==_previewSeq) return;   // a newer drag superseded this lookup
    const addr=(info&&info.addr)?info.addr:"";
    const city=(info&&info.city)?info.city:"";
    if(addr){ setDropMsg("📍 "+addr+(city?(", "+city):"")); }

function dropPinAt(latlng){

const ROUTE_KEY="ildental_route";
function saveRoute(){

    else localStorage.removeItem(ROUTE_KEY);
  }catch(e){}
}

// Start tracking a generated route. stops = office objects in planned order.
function startLiveRoute(stops){
  const ids=(stops||[]).map(o=>o.id).filter(Boolean);
  if(ids.length<2){ activeRoute=null; saveRoute(); renderRouteBar(); return; }
  activeRoute={stops:ids, done:[], active:true};
  saveRoute(); renderRouteBar();

function endLiveRoute(){ activeRoute=null; saveRoute(); renderRouteBar(); }

function routeRemaining(){

// Called whenever a visit is logged. If the logged office is on the route, mark it
// done. If the rep logged a LATER stop while earlier ones are still pending, those
// skipped earlier stops move to the END of the remaining order (deferred, not lost).
function routeCheckoff(officeId){
  if(!activeRoute||!activeRoute.active) return;

  if(done.indexOf(officeId)>=0){ renderRouteBar(); return; }
  // Find earlier, still-pending stops (skipped) and move them after the rest.
  const remainingBefore=routeRemaining();
  const pos=remainingBefore.indexOf(officeId);
  if(pos>0){
    const skipped=remainingBefore.slice(0,pos);           // earlier, not yet done
    const after=remainingBefore.slice(pos+1);             // later than the one just logged
    // New planned tail: [just-logged removed via done], keep 'after' then skipped at end.
    const doneSet=done.concat([officeId]);

// Ask OpenRouteService to reorder stops by real DRIVING distance (TSP optimization).
// `stops` are office objects; `startLat/Lng` is the rep's start (null in anchor mode,
// where the anchor itself is already stops[0] and must stay first). Returns a new
// ordered array, or null on any failure (caller keeps the straight-line order).
function optimizeOrderORS(stops, startLat, startLng, anchorMode){
  return new Promise((resolve)=>{
    try{
      if(!ORS_KEY || !stops || stops.length<3){ resolve(null); return; }
      // In anchor mode the first stop is fixed; optimize the rest from there.
      const fixed = anchorMode ? stops[0] : null;
      const toOpt = anchorMode ? stops.slice(1) : stops.slice();
      if(toOpt.length<2){ resolve(null); return; }
      const startLngLat = anchorMode ? [ +fixed.lng, +fixed.lat ]
                        : (startLat!=null ? [ +startLng, +startLat ] : [ +toOpt[0].lng, +toOpt[0].lat ]);
      const jobs = toOpt.map((o,i)=>({id:i+1, location:[+o.lng, +o.lat]}));
      const vehicles = [{id:1, profile:"driving-car", start:startLngLat, end:startLngLat}];
      fetch("https://api.openrouteservice.org/optimization",{
        method:"POST",
        headers:{"Authorization":ORS_KEY,"Content-Type":"application/json"},
        body:JSON.stringify({jobs, vehicles})
      }).then(r=>r.ok?r.json():Promise.reject(r.status)).then(res=>{
        const steps=res&&res.routes&&res.routes[0]&&res.routes[0].steps;
        if(!steps){ resolve(null); return; }
        const order=steps.filter(s=>s.type==="job").map(s=>toOpt[s.id-1]).filter(Boolean);
        if(order.length!==toOpt.length){ resolve(null); return; }
        resolve(anchorMode ? [fixed].concat(order) : order);
      }).catch(()=>resolve(null));
    }catch(e){ resolve(null); }
  });
}
// Draw the planned route on the map: numbered pins in order + a line. The line

function _drawRouteBase(coordsLatLng, ordered){

    const first=(i===0);

  });

function drawRouteOverlay(ordered, startLat, startLng){

  // straight-line waypoints (used directly as fallback, and as the marker order)
  const straight=pts.map(o=>[+o.lat,+o.lng]);
  if(startLat!=null && startLng!=null) straight.unshift([+startLat,+startLng]);
  // Build ORS waypoints as [lng,lat]

// Set an onboarding flag (starterKit / welcomeEmail) on an office and save. Used by

function setOnboarding(id, field, on){
  if(!id) return;
  const val=on?'Yes':'';
  if(id[0]==="s"){
    const idx=parseInt(id.slice(1),10);
    const o=officeById(id)||{};
    // Base on a full copy of the office's current fields (existing override merged in),
    // so toggling a flag never drops notes, visits, or other onboarding flags.
    const existing=store.over[idx]||{};
    const base={name:o.name,addr:o.addr,city:o.city,zip:o.zip,lat:o.lat,lng:o.lng,
      phone:o.phone,email:o.email,scanner:o.scanner,lab:o.lab,drs:o.drs,hours:o.hours,
      visitDay:o.visitDay,notes:o.notes,visits:o.visits,visited:o.visited,active:o.active,
      starterKit:o.starterKit,welcomeEmail:o.welcomeEmail,addedBy:o.addedBy};
    const patch={}; patch[field]=val;
    // Re-read the override at WRITE time (not captured earlier) so two rapid ticks
    // on different boxes both land — the second tick must build on the first's result.
    const current=store.over[idx]||existing;

    const a=store.add.find(x=>x.id===id); if(a)a[field]=val;

function refreshMap(filtered){
  buildMap();
  // FOLLOW MODE: if a popup is open or a cluster is expanded, a GPS refresh must
  // NOT rebuild the markers (that collapses what you're tapping). Just keep the
  // blue dot current and bail. Safety net: if a flag has been "open" for over 60s
  // (a close event was somehow missed), treat it as stale so the map can't freeze.
  if(followMode && (_popupOpen || _spiderOpen)){
    if(Date.now()-_interactAt > 60000){ _popupOpen=false; _spiderOpen=false; }
    else { drawUser(); return; }
  }
  // Recalculate the map's size reliably. A single fixed 60ms timeout can fire
  // BEFORE mobile Safari finishes laying out the (previously display:none) map
  // container, so Leaflet measures the wrong size and tiles render grey/blank
  // until a manual refresh. Instead invalidate on the next animation frame
  // (layout settled) and again on short backstops to cover slow layouts.
  const fixSize=()=>{ if(mapObj){ try{ mapObj.invalidateSize(false); }catch(e){} } };
  requestAnimationFrame(()=>{ fixSize(); requestAnimationFrame(fixSize); });
  setTimeout(fixSize,120); setTimeout(fixSize,350);
  // Older / slower phones can finish laying out the map container well after the
  // short backstops above, leaving Leaflet measured at the wrong size (tiles show
  // at the wrong zoom / off-center until a manual nudge). Add late backstops so
  // the map re-fits once the device catches up.
  setTimeout(fixSize,700); setTimeout(fixSize,1200); setTimeout(fixSize,2000);
  let pts=filtered.filter(o=>o.lat&&o.lng);

  // ---- FOLLOW (driving) MODE -------------------------------------------------
  // Show only offices within FOLLOW_RADIUS_FT of you, and DO NOT fitBounds — we
  // keep whatever zoom/position you (or the first lock) set, so logging a visit
  // or a background sync never throws you back to a zoomed-out view.
  if(followMode && userPos){
    const radMi=FOLLOW_RADIUS_FT/5280;
    // distance-tag each in-range office so we can find the nearest for the banner
    const tagged=pts.map(o=>({o,d:haversine(userPos.lat,userPos.lng,o.lat,o.lng)}))
                    .filter(x=>x.d<=radMi).sort((a,b)=>a.d-b.d);
    pts=tagged.map(x=>x.o);
    document.getElementById('mapcount').textContent =
      `${pts.length} within ${fmtRadius(FOLLOW_RADIUS_FT)}`;
    updateProxBanner(tagged);   // live "N nearby · nearest: Name" readout
    // Only rebuild the markers when the visible SET actually changed. A GPS
    // heartbeat that returns the same offices must not clear+re-add layers — that
    // flicker is what was collapsing clusters and dropping taps.
    const key=pts.map(o=>o.id).sort().join(",");
    if(key!==_lastFollowKey){
      clusterLayer.clearLayers();
      _popupOpen=false; _spiderOpen=false;   // clearing removes any open popup/spider
      clusterLayer.addLayers(pts.map(makeMarker));
      _lastFollowKey=key;
    }
    // Recenter on you ONLY if you haven't manually panned away. Never change zoom
    // here — hold the user's current zoom so the view stays where they left it.
    if(!userMovedMap && !_popupOpen && !_spiderOpen){
      _selfMove=true;
      try{ mapObj.setView([userPos.lat,userPos.lng], mapObj.getZoom(), {animate:false}); }catch(e){}
      _selfMove=false;
    }
    drawUser();
    return;
  }

  // ---- NEARBY MODE (legacy "Nearest 25") ------------------------------------
  // Not following: always rebuild from scratch (and reset the follow signature).
  clusterLayer.clearLayers();
  _popupOpen=false; _spiderOpen=false;   // no popup/spider survives a full clear
  _lastFollowKey="";
  if(nearbyMode && userPos){
    pts=pts.map(o=>({o,d:haversine(userPos.lat,userPos.lng,o.lat,o.lng)}))
           .sort((a,b)=>a.d-b.d).slice(0,NEARBY_N).map(x=>x.o);
  }
  document.getElementById('mapcount').textContent =
    (nearbyMode&&userPos ? `${pts.length} nearest` : `${pts.length.toLocaleString()} offices`);
  const markers=pts.map(makeMarker);
  clusterLayer.addLayers(markers);
  // fit bounds (only when NOT following — following holds the view)
  if(nearbyMode && userPos && pts.length){
    const b=L.latLngBounds(pts.map(o=>[o.lat,o.lng])); b.extend([userPos.lat,userPos.lng]);
    try{ mapObj.fitBounds(b.pad(0.12),{maxZoom:15}); }catch(e){}
  } else if(pts.length){
    try{ mapObj.fitBounds(L.latLngBounds(pts.map(o=>[o.lat,o.lng])).pad(0.05),{maxZoom:13}); }catch(e){}
  }
  drawUser();
}
// Pretty-print the radius for the map label. Show feet up to 1000 ft, then miles

function fmtRadius(ft){
  if(ft<=1000) return ft+" ft";
  const mi=ft/5280;
  return (Math.abs(mi-Math.round(mi))<1e-9 ? Math.round(mi) : mi.toFixed(1))+" mi";
}
// Distance in feet for the banner readout.

        `<span class="pbt"><div class="pbn">${esc(nearest.name||'(unnamed office)')}</div>`+
        `<div class="pbd"><b>${ft.toLocaleString()} ft</b> · ${n} within ${fmtRadius(FOLLOW_RADIUS_FT)}</div></span>`+

function locateMe(){

  // Edge case (iOS Chrome): auto-start may have set followMode=true but the

  // (userPos is null). In that case a tap should RESTART follow via this real
  // user gesture — not stop a mode that never actually engaged.
  if(followMode && userPos){ stopFollow(); toast("Stopped following"); return; }
  if(followMode && !userPos){ stopFollow(); }   // clear the half-started state, then start fresh below

function startFollow(){
  if(!navigator.geolocation){ toast("Location not supported on this device"); return; }
  // iOS Safari blocks geolocation on insecure origins (file:// or http://).
  if(window.isSecureContext===false){ toast("Open the https:// site to use location"); return; }
  const btn=document.getElementById('locateBtn');
  btn.classList.add('locating');
  if(state.view!=="map") setView("map");
  followMode=true; nearbyMode=false; userMovedMap=false;
  btn.classList.add('following');
  showRadiusUI(true);
  const nb=document.getElementById('nearbyBtn'); if(nb) nb.classList.remove('show');
  try{ if(watchId!=null) navigator.geolocation.clearWatch(watchId); }catch(e){}
  let firstFix=true, lastFixAt=0;
  const apply=pos=>{
    btn.classList.remove('locating');
    lastFixAt=Date.now();
    userPos={lat:pos.coords.latitude,lng:pos.coords.longitude,acc:pos.coords.accuracy};
    // Keep the location-based office scoping in sync with where the rep actually is.
    try{ detectGeoState(userPos.lat,userPos.lng); }catch(e){}
    if(firstFix){
      firstFix=false; userMovedMap=false;
      // On the FIRST lock only, snap to a tight neighborhood zoom centered on you.
      _selfMove=true;
      try{ mapObj.setView([userPos.lat,userPos.lng], FOLLOW_ZOOM, {animate:false}); }catch(e){}
      _selfMove=false;
      toast("Following you — offices within "+fmtRadius(FOLLOW_RADIUS_FT));
    }
    drawUser();
    render(); // re-filter to the radius and recenter (no zoom change, no fitBounds)
  };
  const onErr=err=>{
    btn.classList.remove('locating');
    // Don't kill tracking on a transient timeout mid-drive; only bail on first fix.
    if(firstFix){
      let msg="Couldn't get your location";
      if(err.code===1) msg="Location blocked — allow it in Settings ▸ Safari";
      else if(err.code===2) msg="Location unavailable right now";
      else if(err.code===3) msg="Location timed out — try again";
      toast(msg); stopFollow();
    }
  };
  // Primary: continuous watch. maximumAge:0 forces a FRESH fix each time (no stale
  // cached position), so the dot actually moves as you drive.
  watchId=navigator.geolocation.watchPosition(apply,onErr,{enableHighAccuracy:true,timeout:15000,maximumAge:0});

  // firing even while moving. If no fresh fix in ~4s, actively request one.
  try{ if(followHeartbeat) clearInterval(followHeartbeat); }catch(e){}

    if(!followMode){ clearInterval(followHeartbeat); followHeartbeat=null; return; }
    if(Date.now()-lastFixAt>4000){

    }

}
function stopFollow(){
  followMode=false;
  try{ if(watchId!=null) navigator.geolocation.clearWatch(watchId); }catch(e){}
  watchId=null;
  try{ if(followHeartbeat) clearInterval(followHeartbeat); }catch(e){}
  followHeartbeat=null;
  const lb=document.getElementById('locateBtn'); if(lb){ lb.classList.remove('following'); lb.classList.remove('locating'); }
  showRadiusUI(false);
  const bn=document.getElementById('proxBanner'); if(bn){ bn.classList.remove('show'); bn.innerHTML=""; }
  _proxNearestId=null;
  render();
}

const _DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
// Resolve the rep a visit belongs to: its recorded rep, else the office's addedBy,
// else "" (unattributable).
function visitRep(o,v){
  const vr=String(v.rep||"").replace(/\s+/g," ").trim();
  if(vr) return vr;
  const ab=String(o.addedBy||"").trim();
  return ab;
}
// Build {dateStr -> [{o,v}]} honoring the active filter.
//  - non-admins: always just their own visits (filter ignored)
//  - admin "All": everyone; admin <name>: that rep only
function repVisitsByDate(){
  const admin=isAdmin();
  const me=meName().toLowerCase();
  let want=null;            // null = all; otherwise lowercase rep name to match
  if(!admin){ want=me; }    // reps locked to themselves
  else if(_calRepFilter==="__me__"){ want=me; }
  else if(_calRepFilter==="__all__"){ want=null; }
  else { want=String(_calRepFilter||"").toLowerCase(); }
  const map={};
  (DB||[]).forEach(o=>{
    if(!o.visits) return;
    o.visits.forEach(v=>{
      if(!v||!v.date) return;
      const rep=visitRep(o,v).toLowerCase();
      if(want!==null){ if(rep!==want) return; }   // specific rep
      (map[v.date]=map[v.date]||[]).push({o,v});
    });
  });
  return map;
}

        `<div class="cal-title">${_MNAMES[_calMonth]} ${_calYear}</div>`+
        `<button class="cal-nav" id="calNext" aria-label="Next month">›</button>`+
      `</div>`+
      pickerHTML+
      `<div class="cal-sub">${esc(whoLabel)} · ${monthVisits} visit${monthVisits===1?'':'s'} on ${monthDays} day${monthDays===1?'':'s'}</div>`+
      `<div class="cal-grid cal-dowrow">${dowHead}</div>`+
      `<div class="cal-grid cal-days">${cells}</div>`+
      `<div class="cal-day-detail" id="calDayDetail"></div>`+
    `</div>`;
  document.getElementById('calPrev').onclick=()=>{ _calMonth--; if(_calMonth<0){_calMonth=11;_calYear--;} _calSelDay=null; renderCalendar(); };
  document.getElementById('calNext').onclick=()=>{ _calMonth++; if(_calMonth>11){_calMonth=0;_calYear++;} _calSelDay=null; renderCalendar(); };
  const pick=document.getElementById('calRepPick');
  if(pick) pick.onchange=(e)=>{ _calRepFilter=e.target.value; _calSelDay=null; renderCalendar(); };
  host.querySelectorAll('[data-day]').forEach(b=>{ b.onclick=()=>{ const ds=b.getAttribute('data-day');
    _calSelDay = (_calSelDay===ds)?null:ds; renderCalendar(); }; });
  if(_calSelDay) renderCalDayDetail(byDate[_calSelDay]||[], _calSelDay);
}
function renderCalDayDetail(items, ds){
  const host=document.getElementById('calDayDetail'); if(!host) return;
  if(!items.length){ host.innerHTML=`<div class="cal-dd-empty">No visits logged on ${esc(fmtDate(ds))}.</div>`; return; }
  // Show the rep name on each row when viewing everyone or another rep (admin).
  const showRep = isAdmin() && _calRepFilter!=="__me__";
  const sorted=items.slice().sort((a,b)=>String(a.o.name||"").localeCompare(String(b.o.name||"")));
  const rows=sorted.map(({o,v})=>{
    const dot=v.color?`<span class="cal-dot" style="background:${VCOLORS[v.color]||'#ccc'}"></span>`:`<span class="cal-dot" style="background:var(--line-strong)"></span>`;
    const note=v.note?`<span class="cal-note">${esc(v.note)}</span>`:'';
    const lbl=v.color&&VLABEL[v.color]?`<span class="cal-vlabel">${esc(VLABEL[v.color])}</span>`:'';
    const who = showRep ? `<span class="cal-rep">${esc(visitRep(o,v)||'Unknown')}</span>` : '';
    return `<button class="cal-dd-row" data-oid="${esc(o.id)}">${dot}<span class="cal-dd-nm">${esc(o.name||'(unnamed office)')}</span>${who}${lbl}${note}</button>`;
  }).join('');
  host.innerHTML=`<div class="cal-dd-head">${esc(fmtDate(ds))} · ${items.length} visit${items.length===1?'':'s'}</div>${rows}`;
  host.querySelectorAll('[data-oid]').forEach(b=>{ b.onclick=()=>openDetail(b.getAttribute('data-oid')); });
}
function mapEmbed(o){

}
function mapAppleLink(o){ return o.lat&&o.lng?`https://maps.apple.com/?q=${encodeURIComponent(o.name)}&ll=${o.lat},${o.lng}`:`https://maps.apple.com/?q=${encodeURIComponent(o.name+' '+o.addr+' '+o.city+' '+(o.state||''))}`; }
function mapGLink(o){ return o.lat&&o.lng?`https://www.google.com/maps/search/?api=1&query=${o.lat},${o.lng}`:`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(o.name+' '+o.addr+' '+o.city+' '+(o.state||'')+' '+o.zip)}`; }

function saveForm(id,getScan,getVisits,getActive){
  const g=x=>{const el=document.getElementById(x);return el?el.value.trim():"";};
  // For an EXISTING office, fall back to its stored name/city if the field is
  // blank — so logging a visit never gets discarded just because a base record
  // happened to have an empty city. Only a brand-new office must type them in.
  const existing=id?officeById(id):null;
  let name=g('f_name'), city=g('f_city');
  if(!name&&existing)name=existing.name||"";
  if(!city&&existing)city=existing.city||"";
  if(!id){
    if(!name){toast("Name is required");return;}
    if(!city){toast("City is required");return;}
  } else if(!name){
    // editing but the name somehow blanked out — keep whatever was there
    name=(existing&&existing.name)||("Untitled "+CONFIG.entity.toLowerCase());
  }
  let visits=parseVisits(getVisits?getVisits():[]);
  // Auto-fill: a brand-new office implies a visit today if the rep didn't log one.
  if(!id && !visits.length) visits=[{date:todayStr(),color:"",note:"",rep:meName()}];
  const data={name,addr:g('f_addr'),city,zip:g('f_zip'),
    lat:parseFloat(g('f_lat'))||"",lng:parseFloat(g('f_lng'))||"",
    phone:g('f_phone'),email:g('f_email'),notes:g('f_notes'),visits,
    active:(getActive?getActive():true)};
  // Custom field slots, flag slots and the dropdown slot are read from the
  // rendered config-driven inputs. A slot the admin disabled keeps whatever
  // value the record already had (so turning a field off never wipes data).
  const cfSel=(getScan?getScan():{})||{};
  (CONFIG.fields||[]).forEach(f=>{
    if(f.on===false){ data[f.key]=(existing&&existing[f.key])||""; return; }
    if(f.type==="choices"){ data[f.key]=cfSel[f.key]||""; return; }
    const el=document.getElementById('f_cf_'+f.key);
    data[f.key]=el?el.value.trim():((existing&&existing[f.key])||"");
  });
  (CONFIG.flags||[]).forEach(f=>{
    const el=document.getElementById('f_flag_'+f.key);
    data[f.key]=el?(el.checked?'Yes':''):((existing&&existing[f.key])||'');
  });
  data.pricelist=(function(){ const sel=document.getElementById('f_pricelist');
    if(!sel)return (existing&&existing.pricelist)||"";
    const v=sel.value; if(v==='Other'){ return g('f_pricelist_other'); } return v; })();
  // AUTO-LOG A VISIT ON EDIT: if this is an existing office and the rep actually
  // changed a field (note, scanner, hours, etc. — or the visit list itself),
  // record a visit dated today (carrying the last status color), so they don't
  // have to tap "Log visit". One per day max (ensureVisitToday guards that).
  if(id && existing){
    const fields=["name","addr","city","zip","phone","email","scanner","lab","drs","hours","visitDay","notes","starterKit","welcomeEmail","pricelist"];
    const fieldChanged=fields.some(k=>String((data[k]==null?"":data[k]))!==String((existing[k]==null?"":existing[k])));
    const visitsChanged=visitsToString(visits)!==visitsToString(parseVisits(existing.visits));
    if(fieldChanged||visitsChanged){
      data.visits=ensureVisitToday(data.visits, lastColor(existing));
    }
  }
  pushUndo(id?"edit "+name:"add "+name);
  if(!id){
    data.id="c"+Date.now().toString(36)+Math.random().toString(36).slice(2,8);
    data.visited=true;
    data.addedBy=meName();   // stamp who created this office
    store.add.push(data);
  } else if(id[0]==="s"){
    const idx=parseInt(id.slice(1),10);
    store.over[idx]=Object.assign({},store.over[idx],data,{visited:true});
  } else {
    const a=store.add.find(x=>x.id===id); if(a)Object.assign(a,data);
  }
  save(true); rebuild(); render();
  toast("Saved",true);
  const newId=id||data.id;
  routeCheckoff(newId);
  openDetail(newId);
}

function delOffice(id){
  const o=officeById(id); if(!o)return;
  if(!confirm("Delete \""+o.name+"\"? This can be undone.")) return;
  pushUndo("delete "+o.name);
  if(id[0]==="s"){ store.del.push(parseInt(id.slice(1),10)); delete store.over[parseInt(id.slice(1),10)]; }
  else { store.add=store.add.filter(x=>x.id!==id); }
  save(true); rebuild(); render(); hideSheet();
  toast("Deleted",true);
}

// Add/append a note straight from a map pin popup (visiting a practice in the field)
function quickNote(id){
  const o=officeById(id); if(!o) return;
  const ta=document.getElementById('pq_'+id);
  const txt=(ta?ta.value:'').trim();
  if(!txt){ toast("Type a note first"); return; }
  pushUndo("note "+o.name);
  const stamp=new Date().toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
  const line=`[${stamp}] ${txt}`;
  const newNotes = o.notes ? (o.notes.trimEnd()+"\n"+line) : line;
  // A quick-note from the field IS a visit — auto-log today (carry last color, max one/day).
  const newVisits=ensureVisitToday(o.visits, lastColor(o));
  if(id[0]==="s"){
    const idx=parseInt(id.slice(1),10);
    // IMPORTANT: base the override on the office's CURRENT full fields. If this is
    // the first edit to this seed office, store.over[idx] is empty — writing only
    // {notes,visited,visits} would later serialize a BLANK name to the Sheet and
    // erase the office name on sync. Seeding from `o` keeps name/addr/city/coords.
    let base=store.over[idx];
    if(!base){ base={name:o.name,addr:o.addr,city:o.city,zip:o.zip,lat:o.lat,lng:o.lng,
        phone:o.phone,email:o.email,addedBy:o.addedBy,pricelist:o.pricelist};
      (CONFIG.fields||[]).forEach(f=>{ base[f.key]=o[f.key]; });
      (CONFIG.flags||[]).forEach(f=>{ base[f.key]=o[f.key]; }); }
    // Preserve follow-up flags: never let a quick note clear a ticked flag.
    const keepFlags={}; (CONFIG.flags||[]).forEach(f=>{ keepFlags[f.key]=(base[f.key]!=null&&base[f.key]!=="")?base[f.key]:(o[f.key]||""); });
    store.over[idx]=Object.assign({},base,{notes:newNotes,visited:true,visits:newVisits},keepFlags);
  } else {
    const a=store.add.find(x=>x.id===id); if(a){ a.notes=newNotes; a.visited=true; a.visits=newVisits; }
  }
  save(true); rebuild(); render();
  routeCheckoff(id);
  // re-open this marker's popup with the freshly saved note
  if(clusterLayer){
    clusterLayer.eachLayer(m=>{ if(m._oid===id){ try{ clusterLayer.zoomToShowLayer(m,()=>m.openPopup()); }catch(e){ m.openPopup(); } } });
  }
  toast("Note saved",true);
}

/* ---------- export / email ---------- */
function buildCSV(onlyVisited){
  const rows=DB.filter(o=>onlyVisited?isVisited(o):true);
  const head=[CONFIG.entity+" Name","Address","City","State","ZIP","Latitude","Longitude","County","Phone","Email"].concat(cfgFields().map(f=>f.label)).concat([cfgPL().on!==false?cfgPL().label:"", "Visited","Active","Added By","Last Visited","Latest Status","Logged By (latest)","Visit Count","All Visit Dates","Notes"]).filter(h=>h!=="");
  const q=v=>{v=(v==null?"":String(v));return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const lines=[head.join(",")];
  rows.forEach(o=>lines.push([o.name,o.addr,o.city,o.state||"",o.zip,o.lat,o.lng,o.county||"",o.phone,o.email].concat(cfgFields().map(f=>o[f.key]||"")).concat(cfgPL().on!==false?[o.pricelist||""]:[]).concat([isVisited(o)?"Yes":"No",o.active===false?"Inactive":"Active",o.addedBy||"",lastVisit(o)?fmtDate(lastVisit(o)):"",lastColor(o)?VLABEL[lastColor(o)]:"",(o.visits&&o.visits.length&&o.visits[0].rep)?o.visits[0].rep:"",(o.visits&&o.visits.length)||0,(o.visits&&o.visits.length)?o.visits.map(v=>fmtDate(v.date)+(v.color?" ("+VLABEL[v.color]+")":"")+(v.rep?" "+v.rep:"")).join(" | "):"",o.notes]).map(q).join(",")));
  return {csv:lines.join("\r\n"),count:rows.length};
}
function downloadCSV(onlyVisited){
  const {csv,count}=buildCSV(onlyVisited);
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=`${cfgSlug()}-${onlyVisited?'visited':'all'}-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast(`Exported ${count} ${CONFIG.entityPlural.toLowerCase()}`);
}
function emailCSV(){
  const {csv,count}=buildCSV(true);
  // try Web Share with file (iOS Safari supports navigator.share files)
  const file=new File([csv],`${cfgSlug()}-visited-${new Date().toISOString().slice(0,10)}.csv`,{type:"text/csv"});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    navigator.share({files:[file],title:`${CONFIG.appName} — Visited ${CONFIG.entityPlural}`,text:`${count} visited ${CONFIG.entityPlural.toLowerCase()} for marketing.`}).catch(()=>{});
  } else {
    // fallback: mailto with summary (CSV body truncated by mail clients, so also trigger download)
    downloadCSV(true);
    const body=encodeURIComponent(`${count} visited ${CONFIG.entityPlural.toLowerCase()} attached (downloaded as CSV — please attach the file).\n\nGenerated by ${CONFIG.appName}.`);
    location.href=`mailto:?subject=${encodeURIComponent(CONFIG.appName+' — Visited '+CONFIG.entityPlural+' ('+count+')')}&body=${body}`;
  }
}
function openRoute(){
  // Two ways to route:
  //  (A) anchor on a specific office (searchable) -> route nearest-next from it,
  //      drawing from ALL offices that match active status/rep filters (location-agnostic).
  //  (B) no anchor -> route the current on-screen filter, starting from GPS.
  const curSet=DB.filter(matchFilter).filter(o=>o.lat&&o.lng);
  document.getElementById('sheetTitle').textContent="Build Route";
  const haveGPS=!!userPos;
  let anchorId=null;           // chosen anchor office id (anchor mode) or null
  let stopN=9;

  document.getElementById('sheetBody').innerHTML=`
    <div class="fld"><label>Start from a specific office</label>
      <input type="text" id="rt_search" placeholder="Type an office name…" autocomplete="off" style="width:100%;">
      <div id="rt_results" style="margin-top:6px;"></div>
      <div id="rt_anchor" style="margin-top:6px;"></div>
    </div>
    <div id="rt_gpsnote" style="font-size:12px;color:var(--ink-faint);line-height:1.45;margin:2px 0 14px;"></div>
    <div class="fld"><label>How many stops?</label>
      <select id="rt_n"></select></div>
    <p style="color:var(--ink-faint);font-size:12px;line-height:1.45;margin:8px 0 16px;">Search an office to anchor the route there (stop #1) — it then fills in the nearest offices around it. Any Status/Rep filter still applies to the pool. Maps apps reliably handle ~9–10 stops; above that some may be dropped.</p>
    <div id="rt_list" style="margin-bottom:16px;"></div>
    <button class="btn btn-primary" id="rt_apple" style="width:100%;">Open in Apple Maps</button>`;

  const $=id=>document.getElementById(id);

  function currentPool(){
    if(anchorId) return DB.filter(poolMatch).filter(o=>o.lat&&o.lng);
    return curSet;
  }
  function rebuildStopOptions(poolLen){
    const maxN=Math.min(Math.max(poolLen,2),25);
    const sel=$('rt_n'); const prev=stopN;
    let html="";
    for(let n=2;n<=maxN;n++){ html+=`<option value="${n}">${n} stops${n>10?' — apps may drop some':''}</option>`; }
    sel.innerHTML=html;
    stopN=Math.min(prev,maxN); if(stopN<2)stopN=Math.min(2,maxN); sel.value=String(stopN);
  }
  // Final safety pass: remove duplicate stops from an ordered list by exact
// coordinates OR exact (normalized) address — independent of name — so the same
// place never appears twice in the list OR in the Apple Maps hand-off. Runs on the
// FINAL list both display and Apple Maps use, so they can never diverge.
function dedupeStops(list){
  const out=[]; const seenAddr=new Set(); const placed=[];
  const norm=v=>String(v||"").toLowerCase().replace(/[^a-z0-9]/g,"");
  for(const o of (list||[])){
    if(!o) continue;
    const addrKey=norm(o.addr);
    if(addrKey && seenAddr.has(addrKey)) continue;                    // same street address
    if(o.lat&&o.lng&&placed.some(p=>feetBetween(p.lat,p.lng,+o.lat,+o.lng)<60)) continue; // same spot
    if(addrKey) seenAddr.add(addrKey);
    if(o.lat&&o.lng) placed.push({lat:+o.lat,lng:+o.lng});
    out.push(o);
  }
  return out;
}
function computeOrdered(){
    const pool=currentPool();
    if(anchorId){
      const anchor=DB.find(o=>o.id===anchorId);
      if(!anchor||!anchor.lat||!anchor.lng) return [];
      const rest=pool.filter(o=>o.id!==anchorId);
      // Select stopN-1 offices closest to the anchor, deduped by address AND against
      // the anchor itself, so we always end up with stopN distinct stops (anchor + rest).
      const near=selectNearest(rest, +anchor.lat, +anchor.lng, Math.max(stopN-1,0), [anchor]);
      return routeOptimize(near, +anchor.lat, +anchor.lng, anchor);
    }
    if(haveGPS){
      const near=selectNearest(pool, userPos.lat, userPos.lng, stopN);
      return routeOptimize(near, userPos.lat, userPos.lng, null);
    }
    if(!pool.length) return [];
    const near=selectNearest(pool, +pool[0].lat, +pool[0].lng, stopN);
    return routeOptimize(near, +pool[0].lat, +pool[0].lng, null);
  }
  function renderRoute(){
    rebuildStopOptions(currentPool().length);
    let ordered=computeOrdered();
    // Always start the route from the rep's current location when we have GPS —
    // even with an anchor (the anchor becomes the first office to visit, but the
    // trip still begins where the rep physically is).
    const sLat=haveGPS?userPos.lat:null;
    const sLng=haveGPS?userPos.lng:null;
    paintRoute();
    // Ask ORS to optimize the stop ORDER by real driving distance, then re-render
    // with the better order so it flows into the list, the map, AND Apple Maps.
    // Anchor stays first. Falls back silently to the straight-line order on any failure.
    optimizeOrderORS(ordered, sLat, sLng, !!anchorId).then(better=>{
      if(better && better.length===ordered.length){ ordered=better; paintRoute(); }
    }).catch(()=>{});
    function paintRoute(){
    drawRouteOverlay(ordered, sLat, sLng);
    $('rt_list').innerHTML=ordered.length?ordered.map((o,i)=>`<div style="display:flex;gap:9px;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--line);">
      <span style="font-family:var(--mono);font-weight:700;color:var(--amber);min-width:20px;">${i+1}</span>
      <span style="font-size:13.5px;"><b>${esc(o.name||'(no name)')}</b> <span style="color:var(--ink-soft)">— ${esc(o.city||'')}</span></span></div>`).join('')
      :`<p style="color:var(--ink-soft);font-size:13px;">No mappable offices to route. Pick an anchor office or adjust your filters.</p>`;
    $('rt_gpsnote').textContent = anchorId
      ? "Routing from your chosen office through the nearest offices around it."
      : (haveGPS?"Routing from your current location. Or search an office above to anchor the route there."
                :"Tip: tap the locate button on the map to start from where you are, or search an office above to anchor the route.");
    $('rt_apple').onclick=()=>{ const u=routeAppleURL(ordered,sLat,sLng); startLiveRoute(ordered); if(u){ try{ location.href=u; }catch(e){ window.open(u,'_blank'); } } };
    }
  }
  function showAnchorChip(){
    const a=anchorId?DB.find(o=>o.id===anchorId):null;
    $('rt_anchor').innerHTML = a
      ? `<span class="subchip on" style="display:inline-flex;align-items:center;gap:7px;">Anchor: ${esc(a.name||'(no name)')} — ${esc(a.city||'')} <span id="rt_clear" style="cursor:pointer;font-weight:700;">✕</span></span>`
      : "";
    const clr=$('rt_clear'); if(clr) clr.onclick=()=>{ anchorId=null; $('rt_search').value=""; $('rt_results').innerHTML=""; showAnchorChip(); renderRoute(); };
  }
  $('rt_search').oninput=()=>{
    const q=$('rt_search').value.toLowerCase().trim();
    const box=$('rt_results');
    if(q.length<2){ box.innerHTML=""; return; }
    const S=v=>(v==null?"":String(v)).toLowerCase();
    const hits=DB.filter(o=>o.lat&&o.lng&&(S(o.name).includes(q)||S(o.city).includes(q)||S(o.addr).includes(q))).slice(0,8);
    box.innerHTML=hits.length?hits.map(o=>`<div class="rt-hit" data-id="${esc(o.id)}" style="padding:8px 10px;border:1px solid var(--line);border-radius:9px;margin-bottom:5px;cursor:pointer;font-size:13.5px;"><b>${esc(o.name||'(no name)')}</b> <span style="color:var(--ink-soft)">— ${esc(o.city||'')}</span></div>`).join('')
      :`<div style="font-size:13px;color:var(--ink-soft);padding:6px 2px;">No matches.</div>`;
    box.querySelectorAll('.rt-hit').forEach(el=>{ el.onclick=()=>{
      anchorId=el.getAttribute('data-id');
      $('rt_search').value=""; box.innerHTML="";
      showAnchorChip(); renderRoute();
    };});
  };
  $('rt_n').onchange=()=>{ stopN=parseInt($('rt_n').value,10)||9; renderRoute(); };

  showAnchorChip();
  renderRoute();
  showSheet();
}

    '  if(first[0]!=="id" || width<COLS.length){ sh.getRange(1,1,1,COLS.length).setValues([COLS]); sh.setFrozenRows(1); }',
    '}',
    'function doGet(e){',
    '  if(!authed_(e)) return deny_();',
    '  var sh=sheet_(); ensureHeader_(sh);',
    '  var last=sh.getLastRow(); var rows=[];',
    '  if(last>1){ rows=sh.getRange(2,1,last-1,COLS.length).getValues()',
    '    .filter(function(r){return String(r[0]).trim()!=="";}); }',
    '  var out=JSON.stringify({cols:COLS,rows:rows,config:readCfg_()});',
    '  return ContentService.createTextOutput(out).setMimeType(ContentService.MimeType.JSON);',
    '}',
    'function doPost(e){',
    '  if(!authed_(e)) return deny_();',
    '  var lock=LockService.getScriptLock();',
    '  try{ lock.waitLock(20000); }catch(err){ return out_("busy"); }',
    '  try{',
    '    var body=(e&&e.postData&&e.postData.contents)||"{}";',
    '    var doc=JSON.parse(body); var incoming=doc.rows||[];',
    '    if(doc.config){ try{ cfgSheet_().getRange(1,1).setValue(JSON.stringify(doc.config)); }catch(cfgErr){} }',
    '    var sh=sheet_(); ensureHeader_(sh);',
    '    var last=sh.getLastRow();',
    '    var map={}; var order=[];',
    '    if(last>1){',
    '      var cur=sh.getRange(2,1,last-1,COLS.length).getValues();',
    '      for(var i=0;i<cur.length;i++){ var id=String(cur[i][0]).trim(); if(id){ if(!map[id])order.push(id); map[id]=cur[i]; } }',
    '    }',
    '    var before=order.length;',
    '    // Snapshot the OLD onboarding flags (pre-merge) so we can email on transition.',
    '    var oldFlags={}; var ki=COLS.indexOf("starterKit"), wi=COLS.indexOf("welcomeEmail");',
    '    for(var oid in map){ if(map.hasOwnProperty(oid)){ oldFlags[oid]={kit:String(map[oid][ki]||""),wel:String(map[oid][wi]||"")}; } }',
    '    var toNotify=[];',
    '    for(var j=0;j<incoming.length;j++){',
    '      var r=incoming[j]; var rid=String(r[0]).trim(); if(!rid) continue;',
    '      var isDel=String(r[COLS.indexOf("visited")]).trim().toLowerCase()==="deleted";',
    '      if(isDel){ if(map[rid]){ delete map[rid]; order=order.filter(function(x){return x!==rid;}); } continue; }',
    '      if(!map[rid]) order.push(rid);',
    '      // Detect a flag flipping to "Yes" that wasn\'t before -> queue one email.',
    '      var newKit=String(r[ki]||""), newWel=String(r[wi]||"");',
    '      var was=oldFlags[rid]||{kit:"",wel:""};',
    '      var kitNew=(newKit==="Yes" && was.kit!=="Yes");',
    '      var welNew=(newWel==="Yes" && was.wel!=="Yes");',
    '      if(kitNew||welNew){ toNotify.push({row:padRow_(r), kit:kitNew, wel:welNew}); }',
    '      map[rid]=padRow_(r);',
    '    }',
    '    var explicitDeletes=0;',
    '    for(var k=0;k<incoming.length;k++){ if(String(incoming[k][COLS.indexOf("visited")]).trim().toLowerCase()==="deleted") explicitDeletes++; }',
    '    var after=order.length;',
    '    if(before-after > Math.max(explicitDeletes,0)){ return out_("refused: would remove unexplained rows"); }',
    '    if(before>0 && after===0){ return out_("refused: would empty sheet"); }',
    '    var write=order.map(function(id){return map[id];});',
    '    var lastNow=sh.getLastRow();',
    '    if(lastNow>1) sh.getRange(2,1,lastNow-1,COLS.length).clearContent();',
    '    if(write.length) sh.getRange(2,1,write.length,COLS.length).setValues(write);',
    '    // ---- APPEND new visits to the VisitLog tab (append-only, never cleared) ----',
    '    try{ appendVisitLog_(map, order); }catch(logErr){ /* logging must never break office sync */ }',
    '    try{ notifyOnboarding_(toNotify); }catch(notifyErr){ /* email must never break sync */ }',
    '    return out_("ok");',
    '  } finally { lock.releaseLock(); }',
    '}',
    '// Derive a stable per-visit id from officeId+date so each visit is logged ONCE,',
    '// even though the app re-sends the whole office on every push.',
    'function appendVisitLog_(map, order){',
    '  var lsh=logSheet_();',
    '  var have=existingLogIds_(lsh);',
    '  var vIdx=COLS.indexOf("visits");',
    '  var add=[];',
    '  for(var a=0;a<order.length;a++){',
    '    var row=map[order[a]]; if(!row) continue;',
    '    var officeId=String(row[0]).trim();',
    '    var officeName=String(row[COLS.indexOf("name")]||"");',
    '    var city=String(row[COLS.indexOf("city")]||"");',
    '    var cell=String(row[vIdx]||""); if(!cell) continue;',
    '    var parts=cell.split("|");',
    '    for(var p=0;p<parts.length;p++){',
    '      var seg=parts[p].trim(); if(!seg) continue;',
    '      var f=seg.split("~");',
    '      var date=(f[0]||"").trim(); if(!date) continue;',
    '      var color=(f[1]||"").trim(); var note=(f[2]||"").trim(); var rep=(f[3]||"").trim();',
    '      var logId=officeId+"|"+date;',
    '      if(have[logId]) continue;     // already logged this office+date',
    '      have[logId]=1;',
    '      var status=color==="green"?"Good":color==="yellow"?"Okay":color==="red"?"Poor":"";',
    '      add.push([logId, officeName, city, date, status, note, rep, officeId]);',
    '    }',
    '  }',
    '  if(add.length){ var start=lsh.getLastRow()+1; lsh.getRange(start,1,add.length,LOG_COLS.length).setValues(add); }',
    '  // Mirror each new visit into a per-rep tab ("Visits - <rep>"). The master',
    '  // VisitLog above stays the single source of truth; these are convenience copies.',
    '  try{ mirrorToRepTabs_(add); }catch(repErr){ /* per-rep mirror must never break sync */ }',
    '  try{ buildOnboardingTab_(); }catch(onbErr){ /* onboarding tab must never break sync */ }',
    '}',
    '// Email the admin once when an office is newly flagged for a Starter Kit and/or',
    '// Welcome Email. One email per office even if both boxes were just checked.',
    'function notifyOnboarding_(list){',
    '  if(!ADMIN_EMAIL || !list || !list.length) return;',
    '  var ni=COLS.indexOf("name"), ai=COLS.indexOf("addr"), ci=COLS.indexOf("city"),',
    '      ei=COLS.indexOf("email"), vi=COLS.indexOf("visits"), pli=COLS.indexOf("pricelist");',
    '  for(var i=0;i<list.length;i++){',
    '    var row=list[i].row;',
    '    var name=String(row[ni]||"(no name)");',
    '    var addr=String(row[ai]||""); var city=String(row[ci]||"");',
    '    var fullAddr=addr+(city?(", "+city):"");',
    '    var email=String(row[ei]||"");',
    '    // Pull the most recent visit\'s rep from the visits cell ("date~color~note~rep;...").',
    '    var rep=""; var vraw=String(row[vi]||"");',
    '    if(vraw){ var first=vraw.split(";")[0]; var parts=first.split("~"); if(parts.length>=4) rep=parts[3]; }',
    '    var what=[]; if(list[i].kit)what.push(flagLabel_("starterKit","Starter Kit")); if(list[i].wel)what.push(flagLabel_("welcomeEmail","Welcome Email"));',
    '    var subject="Onboarding: "+what.join(" + ")+" — "+name;',
    '    var lines=[];',
    '    lines.push("A rep has flagged a record for follow-up.");',
    '    lines.push("");',
    '    lines.push("Office: "+name);',
    '    if(fullAddr) lines.push("Address: "+fullAddr);',
    '    lines.push("Requested: "+what.join(" and "));',
    '    if(rep) lines.push("Rep: "+rep);',
    '    var pricelist=(pli>=0)?String(row[pli]||""):"";',
    '    if(pricelist) lines.push("Pricelist: "+pricelist);',
    '    if(email) lines.push("Office email: "+email);',
    '    try{ MailApp.sendEmail(ADMIN_EMAIL, subject, lines.join("\\n")); }catch(mailErr){ /* never break sync over an email */ }',
    '  }',
    '}',
    '// RUN THIS ONCE from the Apps Script editor (pick testOnboardingEmail in the',
    '// function dropdown, click Run) to confirm email works. It sends you a sample.',
    'function testOnboardingEmail(){',
    '  if(!ADMIN_EMAIL){ throw new Error("Set ADMIN_EMAIL at the top of the script first."); }',
    '  MailApp.sendEmail(ADMIN_EMAIL, "CRM follow-up email test", "If you got this, follow-up email notifications are working. Record flags will email you here.");',
    '}',
    '// Build a single "Onboarding" tab: one row per visit (like the rep tabs) with',
    '// full office info PLUS the per-office Starter Kit / Welcome Email status, so you',
    '// can fulfill kits/emails on the back end. Rebuilt fresh each sync. The master',
    '// VisitLog stays untouched as the backup.',
    'var ONB_COLS=["date","status","note","rep","office","city","officeId","addr","zip","phone","email","scanner","starterKit","welcomeEmail","pricelist"];',
    'function buildOnboardingTab_(){',
    '  var ss=SpreadsheetApp.getActiveSpreadsheet();',
    '  var lsh=logSheet_(); var last=lsh.getLastRow();',
    '  if(last<2) return;',
    '  var log=lsh.getRange(2,1,last-1,LOG_COLS.length).getValues();',
    '  var osh=sheet_(); var oLast=osh.getLastRow(); var office={};',
    '  if(oLast>1){ var od=osh.getRange(2,1,oLast-1,COLS.length).getValues(); for(var r=0;r<od.length;r++){ office[String(od[r][0]).trim()]=od[r]; } }',
    '  function col(o,name){ var i=COLS.indexOf(name); return (o&&i>=0)?o[i]:""; }',
    '  var liId=LOG_COLS.indexOf("officeId"), liDate=LOG_COLS.indexOf("date"), liStatus=LOG_COLS.indexOf("status"),',
    '      liNote=LOG_COLS.indexOf("note"), liRep=LOG_COLS.indexOf("rep"), liOffice=LOG_COLS.indexOf("office"), liCity=LOG_COLS.indexOf("city");',
    '  var out=[];',
    '  for(var i=0;i<log.length;i++){',
    '    var row=log[i]; var oid=String(row[liId]||"").trim(); var o=office[oid];',
    '    out.push([ row[liDate], row[liStatus], row[liNote], row[liRep], row[liOffice], row[liCity], oid,',
    '               col(o,"addr"), col(o,"zip"), col(o,"phone"), col(o,"email"), col(o,"scanner"),',
    '               col(o,"starterKit"), col(o,"welcomeEmail"), col(o,"pricelist") ]);',
    '  }',
    '  var sh=ss.getSheetByName("Onboarding");',
    '  if(!sh){ sh=ss.insertSheet("Onboarding"); }',
    '  sh.clearContents();',
    '  sh.getRange(1,1,1,ONB_COLS.length).setValues([ONB_COLS]); sh.setFrozenRows(1);',
    '  if(out.length) sh.getRange(2,1,out.length,ONB_COLS.length).setValues(out);',
    '}',
    '// is one VISIT, enriched with the full office record (name, addr, phone, email,',
    '// scanner, lab, drs, hours, etc.) looked up from the offices sheet. Rebuilt fresh',
    '// each sync so notes/fields added later always appear.',
    'var REPTAB_COLS=["date","status","note","rep","office","city","officeId","addr","zip","phone","email","scanner","lab","drs","hours","visitDay","officeNotes","pricelist"];',
    'function mirrorToRepTabs_(rows){',
    '  var ss=SpreadsheetApp.getActiveSpreadsheet();',
    '  var lsh=logSheet_();',
    '  var last=lsh.getLastRow();',
    '  if(last<2) return;                       // nothing logged yet',
    '  var log=lsh.getRange(2,1,last-1,LOG_COLS.length).getValues();',
    '  // Build officeId -> full office row lookup from the offices sheet.',
    '  var osh=sheet_(); var oLast=osh.getLastRow(); var office={};',
    '  if(oLast>1){',
    '    var od=osh.getRange(2,1,oLast-1,COLS.length).getValues();',
    '    for(var r=0;r<od.length;r++){ office[String(od[r][0]).trim()]=od[r]; }',
    '  }',
    '  function col(o,name){ var i=COLS.indexOf(name); return (o&&i>=0)?o[i]:""; }',
    '  var liId=LOG_COLS.indexOf("officeId"), liDate=LOG_COLS.indexOf("date"),',
    '      liStatus=LOG_COLS.indexOf("status"), liNote=LOG_COLS.indexOf("note"),',
    '      liRep=LOG_COLS.indexOf("rep"), liOffice=LOG_COLS.indexOf("office"), liCity=LOG_COLS.indexOf("city");',
    '  var byRep={};',
    '  for(var i=0;i<log.length;i++){',
    '    var row=log[i];',
    '    var rep=String(row[liRep]||"").trim(); if(!rep) continue;',
    '    var oid=String(row[liId]||"").trim();',
    '    var o=office[oid];',
    '    var out=[ row[liDate], row[liStatus], row[liNote], rep,',
    '              row[liOffice], row[liCity], oid,',
    '              col(o,"addr"), col(o,"zip"), col(o,"phone"), col(o,"email"),',
    '              col(o,"scanner"), col(o,"lab"), col(o,"drs"), col(o,"hours"),',
    '              col(o,"visitDay"), col(o,"notes"), col(o,"pricelist") ];',
    '    var safe=rep.replace(/[\\\\\\/\\?\\*\\[\\]:]/g,"").substring(0,80);',
    '    var tab="Visits - "+safe;',
    '    if(!byRep[tab]) byRep[tab]=[];',
    '    byRep[tab].push(out);',
    '  }',
    '  for(var name in byRep){',
    '    var sh=ss.getSheetByName(name);',
    '    if(!sh){ sh=ss.insertSheet(name); }',
    '    sh.clearContents();',
    '    sh.getRange(1,1,1,REPTAB_COLS.length).setValues([REPTAB_COLS]); sh.setFrozenRows(1);',
    '    var batch=byRep[name];',
    '    if(batch.length) sh.getRange(2,1,batch.length,REPTAB_COLS.length).setValues(batch);',
    '  }',
    '}',
    'function padRow_(r){ var o=r.slice(0,COLS.length); while(o.length<COLS.length)o.push(""); return o; }',
    'function out_(s){ return ContentService.createTextOutput(s).setMimeType(ContentService.MimeType.TEXT); }'
  ].join("\n");
  document.getElementById('sheetBody').innerHTML=`
    <div style="font-size:13px;color:var(--ink-soft);line-height:1.55;margin-bottom:14px;">
      Turn on shared mode so everyone with the link sees the same records, notes and visits. Each touched record is one editable row in your Google Sheet — you can change cells right in the Sheet and the app picks it up within about 15 seconds. Leave blank to keep data only on this device.
    </div>

    ${`<div class="fld"><label>Sync token (team password)</label>

    <div class="actions" style="margin-top:2px;">

    ${SEED.length?`<button class="btn btn-ghost" id="sy_restore" style="width:100%;margin-top:9px;">⟳ Restore full base list</button>
    <div style="font-size:11px;color:var(--ink-soft);margin-top:5px;line-height:1.5;">Brings back all ${SEED.length.toLocaleString()} base records if the list ever looks empty. Your added records and notes are kept.</div>`:''}
    <details style="margin-top:16px;">
      <summary style="font-size:12.5px;color:var(--teal-deep);font-weight:700;cursor:pointer;">One-time setup (≈5 min)</summary>
      <ol style="font-size:12px;color:var(--ink-soft);line-height:1.6;padding-left:18px;margin-top:8px;">
        <li>Create a new Google Sheet (sheets.new). This is where the data lives.</li>
        <li>In the Sheet, open <b>Extensions ▸ Apps Script</b>.</li>

      </ol>
      <div style="font-size:11.5px;color:var(--ink-soft);margin-top:6px;line-height:1.5;">Editing in the Sheet: each office is one row on the first tab. Change any cell (notes, scanner, lab, lat/lng…) and the app updates on its next check. To remove an office, type <b>DELETED</b> in its <b>visited</b> column. Don't change the <b>id</b> column or the header row. A second <b>VisitLog</b> tab fills in automatically — one row per visit (rep, office, date, status, note) — as a read-only activity ledger you can sort and filter. The app only ever adds to it; edits there won't sync back, so it's safe to slice however you like.</div>
      <div style="font-size:11px;color:var(--ink);font-weight:700;margin:8px 0 4px;">Apps Script to paste</div>
      <textarea readonly id="sy_code" style="width:100%;min-height:150px;font-family:var(--mono);font-size:10.5px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:8px;line-height:1.45;white-space:pre;color:var(--ink);">${esc(gsScript)}</textarea>
      <button class="btn btn-ghost" id="sy_copy" style="margin-top:8px;">Copy script</button>
      <div style="font-size:11.5px;color:var(--amber);margin-top:8px;">Note: "Anyone" access means anyone with the link can read &amp; edit (what you asked for). The marketing team can also open the Sheet directly. For a private team, add a password layer later.</div>

    const tEl=document.getElementById('sy_token'); const tok=tEl?tEl.value.trim():"";

    toast(pulled?"Connected — pulled team data":"Connected — sharing this device's data");

    hideSheet();
    toast("Restored "+DB.length.toLocaleString()+" offices");

  const nowBtn=document.getElementById('sy_now');

    toast("Synced");
  };
  const offBtn=document.getElementById('sy_off');
  if(offBtn) offBtn.onclick=()=>{
    cloudSaveConfig(""); cloudOn=false; cloudUnsubscribe();
    pulling=false; pushing=false;
    setSyncBadge(); hideSheet(); toast("Team sync turned off");
  };
  showSheet();

/* ---------- who am I (rep identity) ---------- */
function updateMeBadge(){

  if(ME){ el.textContent="I am: "+ME.name+(ME.role==="admin"?" (Admin)":""); }
  else { el.textContent="Set who you are"; }

// First-open / switch-identity picker. Pick once; remembered on this device.
function openWhoAmI(){
  document.getElementById('sheetTitle').textContent="Who are you?";
  const opts=REPS.map(r=>`<button class="exp-opt" data-me="${esc(r.id)}">
      <span class="exp-ic" style="font-family:var(--display);font-weight:700;color:var(--teal-deep);">${esc((r.name||'?').slice(0,1).toUpperCase())}</span>
      <span><span class="et">${esc(r.name)}${r.role==="admin"?' · Admin':''}</span><span class="ed">${esc(r.territory||'No territory set')}${ME&&ME.id===r.id?' · current':''}</span></span>
    </button>`).join('');
  document.getElementById('sheetBody').innerHTML=`
    <div style="font-size:13px;color:var(--ink-soft);line-height:1.55;margin-bottom:14px;">
      Pick who's using this device. Your visits and added offices get stamped with your name so the team can see who did what. You can switch anytime in Team settings. (This identifies you on this device — it isn't a password.)
    </div>
    ${opts}
    ${isAdmin()?`<button class="btn btn-ghost" id="wai_manage" style="width:100%;margin-top:8px;">Manage reps</button>`:''}`;
  REPS.forEach(r=>{
    const b=document.querySelector('[data-me="'+r.id+'"]');
    if(b) b.onclick=()=>{
      // Admin accounts are PIN-protected: a rep can't switch into admin without it.
      if(r.role==="admin" && r.pin && !(ME&&ME.id===r.id)){
        const entry=prompt("Enter the admin PIN to use "+r.name+":");
        if(entry===null) return;                 // cancelled
        if(String(entry).trim()!==String(r.pin).trim()){ toast("Incorrect PIN"); return; }
      }
      setMe(r.id); updateMeBadge(); rebuild(); render(); hideSheet(); toast("You're set as "+r.name);
    };
  });
  const mng=document.getElementById('wai_manage');
  if(mng) mng.onclick=openManageReps;
  showSheet();
}
function openManageReps(){

  const rows=REPS.map(r=>`<div class="dcard full" style="display:flex;align-items:center;gap:10px;">
      <div style="flex:1;"><div class="dv">${esc(r.name)}${r.role==="admin"?' · Admin':''}</div><div class="dl">${esc(r.territory||'No territory')}</div></div>

// RFC-4180-ish CSV parser: handles quoted cells, embedded commas/newlines, "" escapes.
function parseCSVText(text){
  const rows=[]; let row=[], cell="", q=false;
  text=String(text||"").replace(/^\uFEFF/,"");
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(q){
      if(ch==='"'){ if(text[i+1]==='"'){ cell+='"'; i++; } else q=false; }
      else cell+=ch;
    } else if(ch==='"'){ q=true; }
    else if(ch===','){ row.push(cell); cell=""; }
    else if(ch==='\n'||ch==='\r'){
      if(ch==='\r'&&text[i+1]==='\n')i++;
      row.push(cell); cell="";
      if(row.length>1||row[0]!=="") rows.push(row);
      row=[];
    } else cell+=ch;
  }
  row.push(cell);
  if(row.length>1||row[0]!=="") rows.push(row);
  return rows;
}
// Guess which app field a CSV header maps to.
function guessTarget(h){
  const s=String(h||"").toLowerCase().replace(/[^a-z0-9]/g,"");
  const has=(...ws)=>ws.some(w=>s.includes(w));
  if(has("companyname","businessname","practicename","accountname","prospectname","name","company","business","account"))return "name";
  if(has("streetaddress","address1","addressline","street","address","addr"))return "addr";
  if(has("city","town"))return "city";
  if(has("state","province","region"))return "state";
  if(has("zipcode","postalcode","postcode","zip"))return "zip";
  if(has("latitude","lat"))return "lat";
  if(has("longitude","lng","lon","long"))return "lng";
  if(has("phonenumber","telephone","phone","tel","mobile"))return "phone";
  if(has("emailaddress","email"))return "email";
  if(has("note","comment","description","remark"))return "notes";
  if(has("contact","person","owner","doctor","manager"))return "drs";
  if(has("hours","schedule"))return "hours";
  if(has("vendor","supplier","currentprovider","provider","competitor","lab"))return "lab";
  if(has("category","type","segment","industry","scanner"))return "scanner";
  if(has("tier","pricelist","pricing","plan"))return "pricelist";
  if(has("visitday","bestday","besttime"))return "visitDay";
  if(has("county"))return "county";
  return "";
}
let _impRows=null, _impHeaders=null, _impStop=false;

      <b>Name, Address, City, State, ZIP</b> works best — you'll map the columns on the next step.
      Rows without coordinates can be geocoded automatically from their address.
    </div>
    <input type="file" id="imp_file" accept=".csv,text/csv" style="display:block;width:100%;font-size:14px;margin-bottom:10px;">
    <div id="imp_map"></div>

    }).join('')}

      <input type="checkbox" id="imp_geo" checked> Geocode rows missing coordinates (OpenStreetMap, ~1 per second)
    </label>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;margin:0 0 12px;">
      <input type="checkbox" id="imp_dedupe" checked> Skip rows that match an existing ${esc(CONFIG.entity.toLowerCase())} (name + address + city)
    </label>
    <div class="actions"><button class="btn btn-primary" id="imp_go" style="width:100%;">Import ${_impRows.length.toLocaleString()} rows</button></div>`;
  document.getElementById('imp_go').onclick=runImport;
}
async function runImport(){
  const mapSel={}; document.querySelectorAll('[data-impcol]').forEach(s=>{ mapSel[+s.getAttribute('data-impcol')]=s.value; });
  const cols=Object.keys(mapSel).map(Number);
  const hasName=cols.some(i=>mapSel[i]==="name");
  if(!hasName){ toast("Map one column to \""+CONFIG.entity+" name\" first"); return; }
  const wantGeo=document.getElementById('imp_geo')&&document.getElementById('imp_geo').checked;
  const dedupe=document.getElementById('imp_dedupe')&&document.getElementById('imp_dedupe').checked;
  const existing={}; if(dedupe) DB.forEach(o=>{ existing[((o.name||"")+"|"+(o.addr||"")+"|"+(o.city||"")).toLowerCase().replace(/\s+/g," ").trim()]=1; });
  const goBtn=document.getElementById('imp_go'); if(goBtn)goBtn.disabled=true;
  const prog=document.getElementById('imp_prog');
  const added=[], needGeo=[];
  let skipped=0;
  _impRows.forEach(r=>{
    const rec={};
    cols.forEach(i=>{ const t=mapSel[i]; if(!t)return; const v=String(r[i]==null?"":r[i]).trim(); if(!v)return;
      if(rec[t]) rec[t]+= (t==="notes"?"\n":" ")+v; else rec[t]=v; });
    if(!rec.name){ skipped++; return; }
    const key=((rec.name||"")+"|"+(rec.addr||"")+"|"+(rec.city||"")).toLowerCase().replace(/\s+/g," ").trim();
    if(dedupe&&existing[key]){ skipped++; return; }
    existing[key]=1;
    const rowObj={id:"c"+Date.now().toString(36)+Math.random().toString(36).slice(2,8),
      name:rec.name, addr:rec.addr||"", city:rec.city||"", zip:rec.zip||"",
      state:rec.state||"", county:rec.county||"",
      lat:parseFloat(rec.lat)||"", lng:parseFloat(rec.lng)||"",
      phone:rec.phone||"", email:rec.email||"", notes:rec.notes||"",
      pricelist:rec.pricelist||"", visits:[], visited:false, active:true,
      addedBy:meName()||"", seed:false};
    (CONFIG.fields||[]).forEach(f=>{ rowObj[f.key]=rec[f.key]||""; });
    (CONFIG.flags||[]).forEach(f=>{ rowObj[f.key]=""; });
    added.push(rowObj);
    if(wantGeo && !(rowObj.lat&&rowObj.lng) && (rowObj.addr||rowObj.city)) needGeo.push(rowObj);
  });
  if(!added.length){ toast("Nothing to import"+(skipped?(" — "+skipped+" skipped"):"")); if(goBtn)goBtn.disabled=false; return; }
  // Geocode sequentially, respecting Nominatim's 1 req/sec policy.
  if(needGeo.length){
    _impStop=false;
    prog.innerHTML=`<div style="margin-top:10px;font-size:12.5px;color:var(--ink-soft);">Geocoding <b id="gc_done">0</b> / ${needGeo.length} addresses… <button class="btn btn-ghost" id="gc_stop" style="padding:4px 10px;font-size:12px;margin-left:8px;">Stop &amp; import</button></div>
      <div style="height:6px;background:var(--line);border-radius:4px;margin-top:6px;overflow:hidden;"><div id="gc_bar" style="height:100%;width:0%;background:var(--teal);"></div></div>`;
    const stopBtn=document.getElementById('gc_stop'); if(stopBtn)stopBtn.onclick=()=>{_impStop=true;};
    for(let i=0;i<needGeo.length;i++){
      if(_impStop)break;
      const o=needGeo[i];
      try{
        const qy=[o.addr,o.city,o.state,o.zip].filter(Boolean).join(", ");
        const res=await fetch("https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&q="+encodeURIComponent(qy),{headers:{"Accept":"application/json"}});
        if(res.ok){ const d=await res.json(); if(d&&d[0]){ o.lat=parseFloat(d[0].lat)||""; o.lng=parseFloat(d[0].lon)||""; } }
      }catch(e){}
      const dEl=document.getElementById('gc_done'); if(dEl)dEl.textContent=String(i+1);
      const bEl=document.getElementById('gc_bar'); if(bEl)bEl.style.width=(((i+1)/needGeo.length)*100).toFixed(1)+"%";
      await new Promise(r=>setTimeout(r,1100));
    }
  }
  pushUndo("import "+added.length);
  added.forEach(a=>store.add.push(a));
  save(true); rebuild(); render(); hideSheet();
  const noPin=added.filter(a=>!(a.lat&&a.lng)).length;
  toast("Imported "+added.length+" "+CONFIG.entityPlural.toLowerCase()+(skipped?(" · "+skipped+" skipped"):"")+(noPin?(" · "+noPin+" without a map pin yet"):""),true);
}

        <input type="checkbox" id="wsg_on_${i}" ${f.on!==false?'checked':''}>
        <input id="wsg_label_${i}" value="${esc(f.label)}" style="flex:1;font-size:14px;padding:7px;border-radius:8px;border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);">
      </div>`).join('')}
    <div class="actions" style="margin-top:14px;">
      <button class="btn btn-ghost" id="ws_cancel">Cancel</button>
      <button class="btn btn-primary" id="ws_save">Save workspace</button>
    </div>
    <div style="font-size:11px;color:var(--ink-soft);margin-top:8px;line-height:1.5;">Renaming a field only changes its label — data already saved in that slot is kept. Turning a field off hides it without deleting data.</div>`;
  F.forEach((f,i)=>{
    const t=document.getElementById('wsf_type_'+i), o=document.getElementById('wsf_opts_'+i);
    if(t&&o) t.onchange=()=>{ o.style.display=(t.value==='choices')?'':'none'; };
  });
  document.getElementById('ws_cancel').onclick=hideSheet;
  document.getElementById('ws_save').onclick=()=>{
    const g=id=>{const el=document.getElementById(id);return el?el.value.trim():"";};
    const splitOpts=v=>String(v||"").split(",").map(s=>s.trim()).filter(Boolean);
    const next={
      appName:g('ws_app')||DEFAULT_CFG.appName,
      entity:g('ws_ent')||DEFAULT_CFG.entity,
      entityPlural:g('ws_entp')||((g('ws_ent')||DEFAULT_CFG.entity)+"s"),
      contactLabel:g('ws_ct')||DEFAULT_CFG.contactLabel,
      defaultState:g('ws_ds'),
      fields:F.map((f,i)=>({key:f.key,
        on:!!(document.getElementById('wsf_on_'+i)&&document.getElementById('wsf_on_'+i).checked),
        label:g('wsf_label_'+i)||f.label,
        type:(document.getElementById('wsf_type_'+i)&&document.getElementById('wsf_type_'+i).value==='choices')?'choices':'text',
        options:splitOpts(g('wsf_opts_'+i)), ph:f.ph||""})),
      flags:FL.map((f,i)=>({key:f.key,
        on:!!(document.getElementById('wsg_on_'+i)&&document.getElementById('wsg_on_'+i).checked),
        label:g('wsg_label_'+i)||f.label})),
      pricelist:{on:!!(document.getElementById('ws_pl_on')&&document.getElementById('ws_pl_on').checked),
        label:g('ws_pl_label')||PL.label, options:splitOpts(g('ws_pl_opts'))}
    };
    CONFIG=sanitizeCfg(next);
    saveConfigLocal(); applyBranding(); render(); hideSheet();
    if(cloudOn){ cloudPush(true).then(()=>{try{setSyncBadge();}catch(e){}}); toast("Workspace saved — syncing to the team",true); }
    else toast("Workspace saved on this device",true);
  };
  showSheet();
}
/* ================= END ADMIN FEATURES ================= */

(async function init(){
  load();
  loadConfig(); applyBranding();   // white-label: brand + field schema before anything renders
  loadReps(); loadMe();           // rep registry + this device's identity
  // For non-admin reps, detect their current state from GPS once on load so the
  // location-based office scoping is ready without needing to start Follow mode.
  try{
    if(ME && !(isAdmin&&isAdmin()) && navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        p=>{ try{ detectGeoState(p.coords.latitude,p.coords.longitude,true); }catch(e){} },
        ()=>{}, {enableHighAccuracy:false,timeout:12000,maximumAge:300000});
    }
  }catch(e){}
  cloudInit();
  setSyncBadge();                 // reflect saved sync state immediately

  // Wire up all buttons/handlers IMMEDIATELY, before any heavy work. The sync
  // pill, Add, Export, search, filters etc. must respond even while the office
  // list is still decompressing (or if decompression stalls). Previously wire()
  // ran only AFTER decompressSeed(), so a slow/stuck decompress left every
  // button dead — which looked like "clicking sync does nothing" / blank app.
  wire();
  setSyncBadge();

  // Start cloud sync in parallel — it doesn't depend on the base list being ready.
  if(cloudOn){
    (async()=>{ try{ await cloudPull(); }catch(e){} cloudSubscribe(); try{rebuild();render();}catch(e){} setSyncBadge(); })();
  }

  // Build the base list. If it stalls/fails, the UI above is already alive and
  // usable; show whatever synced data exists rather than a dead blank screen.
  try{ SEED=await decompressSeed(); }
  catch(e){ SEED=[]; try{rebuild();render();}catch(_){}
    const m=document.getElementById('main');
    if(m && !DB.length){ m.innerHTML='<div class="empty"><h3>Couldn\'t load the list</h3><p>Pull to refresh or reopen the app. Your synced records and the menu still work.</p></div>'; }
    setSyncBadge(); return; }
  rebuild(); render();
  loadRoute(); renderRouteBar();   // restore an in-progress route after reopen/refresh
  setSyncBadge();
  updateMeBadge();
  if(!ME) setTimeout(openWhoAmI,400);   // first-open identity prompt

  // ---- Startup: open straight to the map and begin following your location ----
  // Runs on every launch / reopen / refresh. The map shows immediately; we then
  // try to start GPS follow mode. iOS Safari may require a tap for the FIRST
  // location permission, so if the auto-start can't get a fix we leave you on the
  // map with the locate button ready (one tap then begins following).
  startOnMapFollowing();
})();

// Open the map and kick off follow mode. Safe to call repeatedly.
function startOnMapFollowing(){
  try{
    if(state.view!=="map") setView("map");
    // Give the map container a beat to lay out, then start following.
    setTimeout(()=>{ try{ if(!followMode) startFollow(); }catch(e){} }, 250);
    // iOS Chrome often silently ignores a geolocation request that wasn't started
    // by a user tap, so the auto-start can leave us "following" with no fix ever
    // arriving (banner never appears, button stuck pulsing). If that happens,
    // reset to a clean state after a few seconds so the user's first tap on the
    // locate button cleanly starts follow via a real gesture (which Chrome honors).
    setTimeout(()=>{
      try{ if(followMode && !userPos){ stopFollow(); } }catch(e){}
    }, 5200);
  }catch(e){}
}

// Re-assert map+follow when the app is brought back to the foreground (iOS
// "reopen" from the home-screen icon often fires pageshow rather than a full
// reload). Only re-follows if you'd been on the map.
window.addEventListener('pageshow',(e)=>{
  if(state.view==="map" && !followMode){ startOnMapFollowing(); }
});

// Mobile Chrome (and Safari) show/hide their toolbars as you scroll, which changes
// the VISIBLE viewport height. Leaflet measures its container once and won't notice,
// so the map can end up sized to the wrong height — tiles overflow / controls overlap.
// Re-fit the map (debounced) whenever the viewport changes or the device rotates.
let _vpResizeT=null;
function _refitMapSoon(){
  if(_vpResizeT) clearTimeout(_vpResizeT);
  _vpResizeT=setTimeout(()=>{
    try{ if(mapObj && state.view==="map"){ mapObj.invalidateSize(false); } }catch(e){}
  },180);
}
window.addEventListener('resize', _refitMapSoon);
window.addEventListener('orientationchange', ()=>{ _refitMapSoon(); setTimeout(_refitMapSoon,500); });
if(window.visualViewport){ window.visualViewport.addEventListener('resize', _refitMapSoon); }
// ---- PWA: register the offline service worker ----
// Defensive: if the browser lacks support, or sw.js is missing, or registration
// fails, the app keeps working exactly as before — this only ADDS offline/caching.
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* no-op: app works without it */ });
  });
}
</script>
